// Check for updates: compare the live PokéAPI species count to what we
// downloaded, and report whether anything has changed.
function checkForUpdates(){
  var statusEl=document.getElementById('off-update-status');
  if(!statusEl)return;
  statusEl.innerHTML='<div style="color:var(--tx2);font-size:12px;padding:6px 0">Checking…</div>';
  // Fetch the live dex count from PokéAPI
  fetch(API+'/pokemon?limit=1&offset=0').then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(d){
    var liveCount=d.count||0;
    // Compare to our cached list
    return idbGet(IDB_STORE_KV,API+'/pokemon?limit=1500&offset=0').then(function(cached){
      var cachedCount=0;
      if(cached){try{cachedCount=JSON.parse(cached).results.length;}catch(e){}}
      if(!cachedCount){
        statusEl.innerHTML='<div style="color:#FFB300;font-size:12px;padding:6px 0;font-weight:600">No cached data found. Download offline data first.</div>';
      } else if(liveCount>cachedCount){
        statusEl.innerHTML='<div style="color:#5B8DEF;font-size:12px;padding:6px 0;font-weight:600">Update available! PokéAPI now has '+liveCount+' entries (you have '+cachedCount+' cached). Re-download to get the latest data.</div>';
      } else {
        statusEl.innerHTML='<div style="color:#22C55E;font-size:12px;padding:6px 0;font-weight:600">✓ You\u2019re up to date! '+cachedCount+' Pokémon cached, PokéAPI has '+liveCount+'.</div>';
      }
    });
  }).catch(function(e){
    statusEl.innerHTML='<div style="color:#EF4444;font-size:12px;padding:6px 0;font-weight:600">Can\u2019t reach PokéAPI. Check your internet connection.</div>';
  });
}

// Worker: chunked Promise.all-style runner that processes a list of items
// with limited concurrency and updates progress after each. Items can be any
// async unit of work; their resolution increments offlineDl.done.
function offlineRunBatch(items,concurrency,fn){
  var idx=0,active=0,resolveAll;
  if(!offlineDl.failedUrls)offlineDl.failedUrls=[];
  return new Promise(function(resolve){
    resolveAll=resolve;
    function next(){
      if(offlineDl.cancel){if(active===0)resolveAll();return;}
      while(active<concurrency&&idx<items.length){
        var it=items[idx++];
        active++;
        (function(item){
          Promise.resolve().then(function(){return fn(item);})
            .catch(function(e){
              offlineDl.errors++;
              offlineDl.failedUrls.push(item);
              console.error('Download failed:',item,e.message||e);
            })
            .then(function(){
              active--;offlineDl.done++;
              if(offlineDl.done%5===0||offlineDl.done===offlineDl.total){
                if(S.modal==='offline')renderOfflineModal();
              }
              next();
            });
        })(it);
      }
      if(active===0&&idx>=items.length)resolveAll();
    }
    next();
  });
}

// Bulk download: walks the entire dataset and pre-warms IDB.
//   Phase 1: dex list (1 fetch) + region list + item list
//   Phase 2: per-pokémon /pokemon/{id} + /pokemon-species/{id} (2 × 1025)
//   Phase 3: evolution chains (deduped from species)
//   Phase 4: encounters (1 × 1025)
//   Phase 5: moves /move?limit=1000 + per-move /move/{name} (1 + ~920)
//   Phase 6: sprites (front normal + front shiny) + artwork (normal + shiny)
//
// Each phase is mostly independent; on cancel we stop spawning new requests
// but let in-flight ones complete so IDB writes aren't truncated.
function startOfflineDownload(){
  if(offlineDl.running)return;
  offlineDl={running:true,phase:'Preparing…',done:0,total:0,bytes:0,errors:0,cancel:false};
  renderOfflineModal();

  // Helpers that fetch+save and bump bytes. Retry with exponential backoff
  // so we survive PokéAPI rate limits and transient failures.
  function fetchWithRetry(url,attempt){
    attempt=attempt||1;
    return fetch(url).then(function(r){
      if(r.status===429||r.status===503){
        // Rate limited or server busy — wait longer before retry
        if(attempt<4){
          var delay=1000*Math.pow(2,attempt); // 2s, 4s, 8s
          return new Promise(function(resolve){setTimeout(resolve,delay);})
            .then(function(){return fetchWithRetry(url,attempt+1);});
        }
      }
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r;
    }).catch(function(e){
      if(attempt<4){
        var delay=500*Math.pow(2,attempt-1); // 500ms, 1s, 2s
        return new Promise(function(resolve){setTimeout(resolve,delay);})
          .then(function(){return fetchWithRetry(url,attempt+1);});
      }
      throw e;
    });
  }
  function fetchJSON(url){
    url=url.replace(/\/$/,''); // normalize key (strip trailing slash)
    return idbGet(IDB_STORE_KV,url).then(function(hit){
      if(hit){offlineDl.bytes+=hit.length*2;return;}
      return fetchWithRetry(url).then(function(r){
        return r.text();
      }).then(function(txt){
        offlineDl.bytes+=txt.length*2;
        return idbPut(IDB_STORE_KV,url,txt);
      }).catch(function(e){
        if(e.message&&e.message.indexOf('404')>=0)return;
        throw e;
      });
    });
  }
  function fetchBlob(url){
    url=url.replace(/\/$/,'');
    return idbGet(IDB_STORE_BLOBS,url).then(function(hit){
      if(hit){offlineDl.bytes+=hit.size;return;}
      return fetchWithRetry(url).then(function(r){
        return r.blob();
      }).then(function(b){
        offlineDl.bytes+=b.size;
        return idbPut(IDB_STORE_BLOBS,url,b);
      }).catch(function(e){
        // 404s on sprites/artwork are expected — many variant forms don't
        // have images. Don't count as errors, just skip silently.
        if(e.message&&e.message.indexOf('404')>=0)return;
        throw e;
      });
    });
  }

  // Phase 1: top-level lists. We fetch two smaller pokemon list chunks and
  // merge them into the full list key the app uses at boot. This avoids the
  // single large pokemon?limit=1500 request that consistently failed.
  offlineDl.phase='Fetching index lists…';
  if(S.modal==='offline')renderOfflineModal();
  var indexUrls=[
    API+'/pokemon?limit=1025&offset=0',
    API+'/pokemon?limit=500&offset=1025',
    API+'/region?limit=20',
    API+'/item?limit=500&offset=0',
    API+'/move?limit=1000&offset=0'
  ];
  for(var pdId=1;pdId<=32;pdId++)indexUrls.push(API+'/pokedex/'+pdId);

  offlineDl.total=indexUrls.length;
  // Index lists are non-critical — failures here don't prevent offline use.
  // Don't count them as errors (avoids the annoying "1 files failed" message).
  var savedErrorCount=offlineDl.errors;
  return offlineRunBatch(indexUrls,4,fetchJSON).then(function(){
    offlineDl.errors=savedErrorCount; // reset — ignore any index failures
    // Merge the two pokemon list chunks into the full list key the app uses
    return Promise.all([
      idbGet(IDB_STORE_KV,(API+'/pokemon?limit=1025&offset=0').replace(/\/$/,'')),
      idbGet(IDB_STORE_KV,(API+'/pokemon?limit=500&offset=1025').replace(/\/$/,''))
    ]).then(function(parts){
      try{
        var a=JSON.parse(parts[0]||'{"results":[]}');
        var b=JSON.parse(parts[1]||'{"results":[]}');
        var merged={count:(a.count||0),results:(a.results||[]).concat(b.results||[])};
        var key=(API+'/pokemon?limit=1500&offset=0').replace(/\/$/,'');
        return idbPut(IDB_STORE_KV,key,JSON.stringify(merged));
      }catch(e){console.error('Merge failed:',e);}
    });
  }).then(function(){
    if(offlineDl.cancel)return finishOfflineDownload();

    // Phase 2: per-pokémon details + species. Includes base species (1-1025)
    // AND variant forms (10001+) so alternate forms work offline.
    offlineDl.phase='Fetching Pokémon details (1/3)…';
    if(S.modal==='offline')renderOfflineModal();
    offlineDl.done=0;
    var pokeUrls=[];
    for(var i=1;i<=1025;i++){
      pokeUrls.push(API+'/pokemon/'+i);
      pokeUrls.push(API+'/pokemon-species/'+i);
    }
    // Add variant forms — discover from the cached pokemon list
    return idbGet(IDB_STORE_KV,(API+'/pokemon?limit=500&offset=1025').replace(/\/$/,'')).then(function(varTxt){
      if(varTxt){
        try{
          var vd=JSON.parse(varTxt);
          (vd.results||[]).forEach(function(p){
            var vid=gid(p.url);
            if(vid>1025)pokeUrls.push(API+'/pokemon/'+vid);
          });
        }catch(e){}
      }
      offlineDl.total=pokeUrls.length;
      return offlineRunBatch(pokeUrls,4,fetchJSON);
    });
  }).then(function(){
    if(offlineDl.cancel)return finishOfflineDownload();

    // Phase 3: evolution chains. We discover them by reading already-cached
    // species records and extracting their evolution_chain.url.
    offlineDl.phase='Fetching evolution chains (2/3)…';
    if(S.modal==='offline')renderOfflineModal();
    offlineDl.done=0;
    var evoSet={};
    var lookups=[];
    for(var i=1;i<=1025;i++){
      lookups.push(idbGet(IDB_STORE_KV,API+'/pokemon-species/'+i).then(function(txt){
        if(!txt)return;
        try{var sp=JSON.parse(txt);if(sp&&sp.evolution_chain&&sp.evolution_chain.url)evoSet[sp.evolution_chain.url]=true;}catch(e){}
      }));
    }
    return Promise.all(lookups).then(function(){
      var evoUrls=Object.keys(evoSet);
      offlineDl.total=evoUrls.length;
      return offlineRunBatch(evoUrls,4,fetchJSON);
    });
  }).then(function(){
    if(offlineDl.cancel)return finishOfflineDownload();

    // Phase 4: encounters
    offlineDl.phase='Fetching encounter data (3/3)…';
    if(S.modal==='offline')renderOfflineModal();
    offlineDl.done=0;
    var encUrls=[];
    for(var i=1;i<=1025;i++)encUrls.push(API+'/pokemon/'+i+'/encounters');
    offlineDl.total=encUrls.length;
    return offlineRunBatch(encUrls,4,fetchJSON);
  }).then(function(){
    if(offlineDl.cancel)return finishOfflineDownload();

    // Phase 5: per-move details + ability details.
    offlineDl.phase='Fetching moves & abilities…';
    if(S.modal==='offline')renderOfflineModal();
    offlineDl.done=0;
    return idbGet(IDB_STORE_KV,API+'/move?limit=1000&offset=0').then(function(txt){
      var urls=[];
      try{
        var d=JSON.parse(txt||'{}');
        (d.results||[]).forEach(function(m){urls.push(m.url);});
      }catch(e){}
      // Also fetch all abilities (~300). We discover them from the already-
      // cached pokemon data to get the exact URLs.
      var abilSet={};
      var abilLookups=[];
      for(var ab=1;ab<=1025;ab++){
        abilLookups.push(idbGet(IDB_STORE_KV,API+'/pokemon/'+ab).then(function(ptxt){
          if(!ptxt)return;
          try{
            var p=JSON.parse(ptxt);
            if(p.abilities)p.abilities.forEach(function(a){if(a.ability&&a.ability.url)abilSet[a.ability.url]=true;});
          }catch(e){}
        }));
      }
      return Promise.all(abilLookups).then(function(){
        var abilUrls=Object.keys(abilSet);
        urls=urls.concat(abilUrls);
        offlineDl.total=urls.length;
        return offlineRunBatch(urls,4,fetchJSON);
      });
    });
  }).then(function(){
    if(offlineDl.cancel)return finishOfflineDownload();

    // Phase 5b: create name-indexed aliases for moves.
    // The download fetched moves by ID (/move/1, /move/2, ...) but the app
    // looks them up by name (/move/tackle, /move/pound, ...). Create aliases
    // so offline lookups by name find the cached data.
    offlineDl.phase='Indexing move data…';
    if(S.modal==='offline')renderOfflineModal();
    return idbGet(IDB_STORE_KV,(API+'/move?limit=1000&offset=0').replace(/\/$/,'')).then(function(listTxt){
      if(!listTxt)return;
      var moveList;
      try{moveList=JSON.parse(listTxt);}catch(e){return;}
      var aliasTasks=[];
      (moveList.results||[]).forEach(function(m){
        var idUrl=(m.url||'').replace(/\/$/,'');
        var nameUrl=API+'/move/'+m.name;
        aliasTasks.push(
          idbGet(IDB_STORE_KV,nameUrl).then(function(existing){
            if(existing)return; // already aliased
            return idbGet(IDB_STORE_KV,idUrl).then(function(data){
              if(data)return idbPut(IDB_STORE_KV,nameUrl,data);
            });
          }).catch(function(){})
        );
      });
      offlineDl.done=0;offlineDl.total=aliasTasks.length;
      // Process in batches to avoid IDB overload
      var idx2=0;
      function nextAlias(){
        var batch=[];
        while(idx2<aliasTasks.length&&batch.length<20){batch.push(aliasTasks[idx2++]);}
        if(!batch.length)return Promise.resolve();
        return Promise.all(batch).then(function(){
          offlineDl.done=idx2;
          if(offlineDl.done%50===0&&S.modal==='offline')renderOfflineModal();
          return nextAlias();
        });
      }
      return nextAlias();
    });
  }).then(function(){
    if(offlineDl.cancel)return finishOfflineDownload();

    // Phase 6: sprites + artwork (binaries). 4 images per pokémon.
    // Includes variant sprites so alternate forms show images offline.
    offlineDl.phase='Downloading sprites & artwork…';
    if(S.modal==='offline')renderOfflineModal();
    offlineDl.done=0;
    var imgUrls=[];
    for(var i=1;i<=1025;i++){
      imgUrls.push('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/'+i+'.png');
      imgUrls.push('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/'+i+'.png');
      imgUrls.push('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/'+i+'.png');
      imgUrls.push('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/'+i+'.png');
    }
    // Add variant form sprites + artwork (IDs 10001+).
    // Discover from cached variant list.
    return idbGet(IDB_STORE_KV,(API+'/pokemon?limit=500&offset=1025').replace(/\/$/,'')).then(function(varTxt){
      if(varTxt){
        try{
          var vd=JSON.parse(varTxt);
          (vd.results||[]).forEach(function(p){
            var vid=gid(p.url);
            if(vid>1025){
              imgUrls.push('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/'+vid+'.png');
              imgUrls.push('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/'+vid+'.png');
            }
          });
        }catch(e){}
      }
      offlineDl.total=imgUrls.length;
      return offlineRunBatch(imgUrls,6,fetchBlob);
    });
  }).then(function(){
    finishOfflineDownload();
  }).catch(function(e){
    finishOfflineDownload();
  });
}
function finishOfflineDownload(){
  var wasCancelled=offlineDl.cancel;
  var errors=offlineDl.errors;
  offlineDl.running=false;
  // Persist download state so the UI can show "Downloaded" on next visit
  if(!wasCancelled){
    try{localStorage.setItem('pokeguide.offline.state',JSON.stringify({
      downloadedAt:Date.now(),
      errors:errors,
      bytes:offlineDl.bytes
    }));}catch(e){}
  }
  if(S.modal==='offline')renderOfflineModal();
  setTimeout(function(){
    if(wasCancelled){
      uiAlert('Download Cancelled','Resume any time — already-cached items will be skipped.');
    } else {
      uiAlert('Download Complete','All Pokémon, sprites, and artwork are now available offline.');
    }
  },200);
}

// ── POKÉDEX ──
function dexFilt(){
  var l=S.dexList;
  if(S.game){
    // Use the game's actual regional pokédex (e.g. Hoenn = 202 specific
    // entries) rather than a gen-based cap (which would include all Kanto +
    // Johto + Hoenn pokémon for any gen 3 game). regionalIdsForGame is
    // sourced from PokéAPI's /pokedex resource and cached in localStorage.
    var ids=regionalIdsForGame(S.game);
    if(ids&&ids.length){
      var idSet={};for(var i=0;i<ids.length;i++)idSet[ids[i]]=true;
      l=l.filter(function(p){return idSet[gid(p.url)];});
    }
  }
  if(S.dexQ.trim()){var q=S.dexQ.toLowerCase().trim();l=l.filter(function(p){return p.name.indexOf(q)>=0||String(gid(p.url)).indexOf(q)>=0;});
    // Also search variant forms (Alolan, Galarian, Mega, etc.)
    if(S.dexVariants&&S.dexVariants.length){
      var variants=S.dexVariants.filter(function(p){return p.name.indexOf(q)>=0;});
      if(variants.length)l=l.concat(variants);
    }
  }
  // Apply type filter
  if(S.dexFilterType&&S.dexTypeIndex[S.dexFilterType]){
    var typeIds=S.dexTypeIndex[S.dexFilterType];
    l=l.filter(function(p){return typeIds[gid(p.url)];});
  }
  // Apply generation filter
  if(S.dexFilterGen){
    var gr=GEN_RANGES[S.dexFilterGen-1];
    if(gr)l=l.filter(function(p){var id=gid(p.url);return id>=gr.min&&id<=gr.max;});
  }
  // Apply legendary/mythical filter (requires species data — check cache)
  if(S.dexFilterSpecial){
    var specKey=S.dexFilterSpecial;
    l=l.filter(function(p){
      var id=gid(p.url);
      // Check in-memory cache for species data
      var spKey=API+'/pokemon-species/'+id;
      var spNorm=spKey.replace(/\/$/,'');
      if(cache[spNorm]&&cache[spNorm].then){return true;} // still loading, include for now
      // Check known legendary/mythical IDs
      var LEGENDARY=[144,145,146,150,243,244,245,249,250,377,378,379,380,381,382,383,384,480,481,482,483,484,485,486,487,488,638,639,640,641,642,643,644,645,646,716,717,718,772,773,785,786,787,788,789,790,791,792,800,888,889,890,891,892,894,895,896,897,898,905,1001,1002,1003,1004,1007,1008,1009,1010,1014,1015,1016,1017,1024];
      var MYTHICAL=[151,251,385,386,489,490,491,492,493,494,647,648,649,719,720,721,801,802,807,808,809,893,1025];
      var STARTERS=[1,2,3,4,5,6,7,8,9,152,153,154,155,156,157,158,159,160,252,253,254,255,256,257,258,259,260,387,388,389,390,391,392,393,394,395,495,496,497,498,499,500,501,502,503,650,651,652,653,654,655,656,657,658,722,723,724,725,726,727,728,729,730,810,811,812,813,814,815,816,817,818,906,907,908,909,910,911,912,913,914];
      if(specKey==='legendary')return LEGENDARY.indexOf(id)>=0;
      if(specKey==='mythical')return MYTHICAL.indexOf(id)>=0;
      if(specKey==='starters')return STARTERS.indexOf(id)>=0;
      return true;
    });
  }
  return l;
}
function renderDexListItems(){
  var filt=dexFilt(),maxPg=Math.max(0,Math.ceil(filt.length/PER())-1);
  if(S.dexPage>maxPg)S.dexPage=0;
  var paged=filt.slice(S.dexPage*PER(),(S.dexPage+1)*PER());
  var listHtml;
  if(S.dexList.length===0){

// Floating page buttons: hide on scroll down, show on scroll up.
// Uses ONE document-level capture listener — scroll events don't bubble but DO fire
// during capture phase, so this catches scrolls from any list view regardless of how
// often the scroll container gets re-rendered.
// Float-hide listener — fires on scroll inside ANY screen (.scroll, .scroll-* containers).
// Hides the FAB and any floating page buttons on scroll-down; shows on scroll-up or near top.
function setupFloatHideListener(){
  if(window._floatHideBound)return;
  window._floatHideBound=true;
  document.addEventListener('scroll',function(e){
    var sc=e.target;
    if(!sc||!sc.scrollTop&&sc.scrollTop!==0)return;
    // Only listen to scroll containers inside a .screen (skip page-level scroll, modal scrolls, etc.)
    var screen=sc.closest&&sc.closest('.screen');
    if(!screen)return;
    var lastY=sc._lastFloatY||0;
    var y=sc.scrollTop;
    var dy=y-lastY;
    var atTop=y<8;
    var floats=screen.querySelectorAll('.pg-float');
    var fab=document.getElementById('qfab');
    if(atTop||dy<-2){
      for(var i=0;i<floats.length;i++)floats[i].classList.remove('hidden');
      if(fab)fab.classList.remove('hidden');
    } else if(dy>4){
      for(var i=0;i<floats.length;i++)floats[i].classList.add('hidden');
      if(fab)fab.classList.add('hidden');
    }
    sc._lastFloatY=y;
  },true); // capture phase — scroll doesn't bubble
}

      btn.className='srch-clear';btn.setAttribute('aria-label','Clear');

function renderDetInfo(d,sp,types){

  var rs=Object.keys(mu).filter(function(t){return mu[t]>0&&mu[t]<1;});
  var im=Object.keys(mu).filter(function(t){return mu[t]===0;});
  var flav='';
  if(sp&&sp.flavor_text_entries){var fe=sp.flavor_text_entries.filter(function(e){return e.language.name==='en';});if(fe.length)flav=(fe[fe.length-1].flavor_text||'').replace(/[\f\n]/g,' ');}
  var tot=d.stats.reduce(function(a,s){return a+s.base_stat;},0);
  var html='';
  if(flav)html+='<p style="font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:11px;background:var(--card);border-radius:13px;padding:11px 13px;font-style:italic;border:0.5px solid var(--border)">'+esc(flav)+'</p>';

    '<div style="display:flex;justify-content:flex-end;border-top:0.5px solid var(--border);padding-top:6px;margin-top:3px"><span style="font-size:11px;color:var(--tx3);font-weight:700">TOTAL · '+tot+'</span></div>');
  var matchHtml='';
  if(im.length)matchHtml+='<div style="margin-bottom:10px"><div style="font-size:10px;font-weight:800;color:var(--tx3);letter-spacing:.05em;margin-bottom:6px">IMMUNE (x0)</div><div style="display:flex;flex-wrap:wrap;gap:8px">'+im.map(function(t){return tcir(t,0);}).join('')+'</div></div>';
  if(wk.length)matchHtml+='<div style="margin-bottom:10px"><div style="font-size:10px;font-weight:800;color:#CE4265;letter-spacing:.05em;margin-bottom:6px">WEAK</div><div style="display:flex;flex-wrap:wrap;gap:8px">'+wk.map(function(t){return tcir(t,mu[t]);}).join('')+'</div></div>';
  if(rs.length)matchHtml+='<div><div style="font-size:10px;font-weight:800;color:#5DAA56;letter-spacing:.05em;margin-bottom:6px">RESISTS</div><div style="display:flex;flex-wrap:wrap;gap:8px">'+rs.map(function(t){return tcir(t,mu[t]);}).join('')+'</div></div>';
  if(matchHtml)html+=card('Type Matchups',matchHtml);
  html+=card('Abilities','<div style="display:flex;flex-direction:column;gap:9px" id="ability-list">'+d.abilities.map(function(a){
    var aSlug=a.ability.name;
    return '<div id="abil-'+aSlug+'"><div style="font-size:14px;font-weight:700;color:'+(a.is_hidden?'#FF9F0A':'var(--tx)')+';text-transform:capitalize">'+cap(a.ability.name)+'</div>'+(a.is_hidden?'<div style="font-size:10px;color:var(--tx3);margin-top:1px">Hidden Ability</div>':'')+
    '<div class="abil-desc" style="font-size:11px;color:var(--tx2);margin-top:3px;line-height:1.4">Loading…</div></div>';
  }).join('')+'</div>');
  // Async-fetch ability descriptions after render
  setTimeout(function(){
    d.abilities.forEach(function(a){
      var slug=a.ability.name;
      af(a.ability.url).then(function(ad){
        var desc='';
        if(ad.effect_entries){
          var en=ad.effect_entries.filter(function(e){return e.language.name==='en';});
          if(en.length)desc=en[0].short_effect||en[0].effect||'';
        }
        if(!desc&&ad.flavor_text_entries){
          var en2=ad.flavor_text_entries.filter(function(e){return e.language.name==='en';});

}
function describeEvo(det){
  // Returns {label, info} describing evolution requirements from evolution_details entry
  if(!det)return{label:'Unknown',info:''};
  var trigger=det.trigger?det.trigger.name:'';
  // Stone/item evolution (use-item)
  if(det.item)return{label:cap(det.item.name),info:''};
  // Trade
  if(trigger==='trade'){
    if(det.held_item)return{label:'Trade holding '+cap(det.held_item.name),info:''};
    if(det.trade_species)return{label:'Trade for '+cap(det.trade_species.name),info:''};
    return{label:'Trade',info:'Evolves when traded'};
  }
  // Shed (Shedinja)
  if(trigger==='shed')return{label:'Shed',info:'Shedinja appears in an empty party slot'};
  // Spin (Alcremie)
  if(trigger==='spin')return{label:'Spin',info:'Level up while spinning with a Sweet'};
  // Level up
  if(trigger==='level-up'||!trigger){
    if(det.min_level)return{label:'Level '+det.min_level,info:''};
    if(det.min_happiness){
      var t=det.time_of_day?' ('+det.time_of_day+')':'';
      return{label:'Friendship'+t,info:'Level up with high friendship'};
    }
    if(det.min_affection)return{label:'High Affection',info:'Level up with high affection'};
    if(det.min_beauty)return{label:'High Beauty',info:'Level up with high beauty stat'};
    if(det.known_move)return{label:'Knows '+cap(det.known_move.name),info:'Level up knowing this move'};
    if(det.known_move_type)return{label:cap(det.known_move_type.name)+'-type move',info:'Level up knowing a move of this type'};
    if(det.held_item){
      var ti=det.time_of_day?' ('+det.time_of_day+')':'';
      return{label:'Hold '+cap(det.held_item.name)+ti,info:'Level up holding this item'};
    }
    if(det.location)return{label:'At '+cap(det.location.name),info:'Level up at this location'};
    if(det.needs_overworld_rain)return{label:'While Raining',info:'Level up in the rain'};
    if(det.time_of_day)return{label:'Level up ('+det.time_of_day+')',info:''};
    if(det.relative_physical_stats!==null&&det.relative_physical_stats!==undefined){
      var r=det.relative_physical_stats;
      return{label:r===1?'Atk > Def':r===-1?'Atk < Def':'Atk = Def',info:'Level up with this stat balance'};
    }
    if(det.gender){var g=det.gender===1?'Female':'Male';return{label:g+' only',info:'Only this gender evolves'};}
    if(det.party_species)return{label:'With '+cap(det.party_species.name)+' in party',info:''};
    if(det.party_type)return{label:cap(det.party_type.name)+' Pokémon in party',info:''};
    return{label:'Special',info:'Level up under specific conditions'};
  }
  // Use-item (fallback)
  if(trigger==='use-item'&&det.item)return{label:cap(det.item.name),info:''};
  // Other triggers
  return{label:cap(trigger||'Special'),info:''};
}
function getEvoTransitions(chain){
  var out=[];
  function walk(node){
    (node.evolves_to||[]).forEach(function(next){
      var det=(next.evolution_details||[])[0]||null;
      out.push({
        from:{name:node.species.name,id:gid(node.species.url)},
        to:{name:next.species.name,id:gid(next.species.url)},
        det:det
      });
      walk(next);
    });
  }
  walk(chain);
  return out;
}

      }).join('')+'</div></div>';

// Map our internal game IDs to PokéAPI version names (used for encounter filtering).

// Fetch move data for a list of move names, then refresh matching DOM rows
function enrichMoveNames(names,idPrefix){
  names.forEach(function(name){
    if(mvDetCache[name]){
      // Already cached but row may not have been built with cache — refresh anyway
      var row=document.getElementById(idPrefix+name);
      if(row)refreshMoveRow(row,name,idPrefix);
      return;
    }
    af(API+'/move/'+name).then(function(d){
      var short='';
      if(d.effect_entries){
        var ee=d.effect_entries.filter(function(e){return e.language.name==='en';})[0];
        if(ee)short=(ee.short_effect||ee.effect||'').replace(/\$effect_chance/g,d.effect_chance||'');
      }
      if(!short&&d.flavor_text_entries){
        var fe=d.flavor_text_entries.filter(function(e){return e.language.name==='en';});
        if(fe.length)short=(fe[fe.length-1].flavor_text||'').replace(/[\f\n]/g,' ');
      }
      mvDetCache[name]={
        power:d.power,accuracy:d.accuracy,type:d.type.name,
        dmgClass:d.damage_class?d.damage_class.name:'status',
        short:short
      };
      var row=document.getElementById(idPrefix+name);
      if(row)refreshMoveRow(row,name,idPrefix);
    }).catch(function(){});
  });
}
function refreshMoveRow(row,name,idPrefix){
  // Only swap the parts that depend on cached data, preserving the row's existing structure (badges differ between dex detail and compare)
  var c=mvDetCache[name];if(!c)return;

  var cells=row.querySelectorAll('.mv-stat-cell');
  if(cells.length>=2){
    cells[0].textContent=c.power!=null?String(c.power):'-';
    cells[1].textContent=c.accuracy!=null?String(c.accuracy):'-';

  var phs=row.querySelectorAll('.mv-ph');
  if(phs.length>=2){
    phs[0].outerHTML=tcIcon(c.type);
    phs[1].outerHTML=dcIcon(c.dmgClass);
  } else {
    // Already has tc/dc — just update them
    var tc=row.querySelector('.mv-tc');

    if(dc)dc.outerHTML=dcIcon(c.dmgClass);

function renderDetMoves(d){
  var mode=S.dexMvMode;
  var vgFilter=S.game;
  // Level-up moves:
  //   Game filter ON  → only entries whose version_group matches the active game.
  //                     Show the exact level learned for that game, sorted by level.
  //   Game filter OFF → union across ALL version groups. Show every move learnable
  //                     by level-up in ANY game, but do NOT show levels (since they
  //                     vary across games and would be misleading). Sort alphabetically.
  var lvM;
  if(vgFilter){
    lvM=(d.moves||[]).map(function(m){
      var vds=m.version_group_details||[];
      var v=vds.filter(function(x){return x.move_learn_method.name==='level-up'&&x.version_group.name===vgFilter;})[0];
      return v?{name:m.move.name,lv:v.level_learned_at}:null;
    }).filter(Boolean).sort(function(a,b){return a.lv-b.lv;});
  } else {
    var lvSeen={};
    (d.moves||[]).forEach(function(m){
      var vds=m.version_group_details||[];
      if(vds.some(function(x){return x.move_learn_method.name==='level-up';}))lvSeen[m.move.name]=true;
    });
    lvM=Object.keys(lvSeen).sort().map(function(n){return {name:n,lv:null};});
  }
  // TM/HM moves: same logic — single-game filter or union across all.
  var tmM;
  if(vgFilter){
    tmM=(d.moves||[]).map(function(m){
      var vds=m.version_group_details||[];
      var v=vds.filter(function(x){return x.move_learn_method.name==='machine'&&x.version_group.name===vgFilter;})[0];
      return v?{name:m.move.name}:null;
    }).filter(Boolean);
  } else {
    var tmSeen={};
    (d.moves||[]).forEach(function(m){
      var vds=m.version_group_details||[];
      if(vds.some(function(x){return x.move_learn_method.name==='machine';}))tmSeen[m.move.name]=true;
    });
    tmM=Object.keys(tmSeen).sort().map(function(n){return {name:n};});
  }
  var moves=mode==='level'?lvM:tmM;
  var visibleNames=moves.slice(0,80).map(function(m){return m.name;});
  // Trigger background fetch for any moves we don't have details for
  setTimeout(function(){enrichMoveNames(visibleNames,'dmvr-');},0);
  var rowsHtml=moves.length===0?
    '<div style="padding:20px;text-align:center;color:var(--tx3)">No moves found.</div>':
    moves.slice(0,80).map(function(m){
      // Badge: game-filtered level-up → "Lv 12" or "Evo."; all-games level-up → no badge;
      // TM → "TM" always.
      var badge;
      if(mode==='level'){
        if(m.lv!==null)badge=m.lv===0?'Evo.':'Lv '+m.lv;
        else badge=null; // no badge in all-games mode
      } else {
        badge='TM';
      }
      return moveRowWithBadgeHTML(m,badge);
    }).join('');
  return '<div class="seg">'+
    '<button class="seg-btn'+(mode==='level'?' act':'')+'" onclick="setMvMode(\'level\')">Level Up</button>'+
    '<button class="seg-btn'+(mode==='tm'?' act':'')+'" onclick="setMvMode(\'tm\')">TM / HM</button></div>'+
    '<div style="background:var(--card);border-radius:13px;overflow:hidden;border:0.5px solid var(--border)">'+
    rowsHtml+
    '</div>';
}

// Extract a nice display name for a form variant
// e.g. "oricorio-pom-pom" → {base:"Oricorio", form:"Pom Pom"}
// e.g. "ponyta-galar" → {base:"Ponyta", form:"Galarian"}
// e.g. "pikachu" → {base:"Pikachu", form:null}
function parseFormName(fullName,speciesName){
  if(!speciesName)speciesName=fullName;
  if(fullName===speciesName)return {base:cap(speciesName),form:null};
  var suffix=fullName.replace(speciesName+'-','');
  // Map common regional suffixes to proper names
  var regionMap={alola:'Alolan',galar:'Galarian',hisui:'Hisuian',paldea:'Paldean'};
  if(regionMap[suffix])return {base:cap(speciesName),form:regionMap[suffix]};
  // Otherwise capitalize each word
  return {base:cap(speciesName),form:cap(suffix.replace(/-/g,' '))};
}

// Render the forms strip for the detail view
function renderFormsStrip(d,sp){
  if(!sp||!sp.varieties||sp.varieties.length<=1)return '';
  var currentName=d.name;
  var speciesName=sp.name;
  var items=sp.varieties.map(function(v){
    var vName=v.pokemon.name;
    var vUrl=v.pokemon.url;
    var vId=gid(vUrl);
    var isActive=vName===currentName;
    var parsed=parseFormName(vName,speciesName);
    var label=parsed.form||'Standard';
    return '<div class="forms-strip-item'+(isActive?' active':'')+'" onclick="switchForm(\''+vName.replace(/'/g,"\\'")+'\',\''+vUrl+'\')">'+
      '<img src="'+spr(vId)+'" onerror="this.style.opacity=0.3" alt=""/>'+
      '<div class="forms-strip-name">'+esc(label)+'</div>'+
    '</div>';
  }).join('');
  return '<div class="forms-strip">'+
    '<div class="forms-strip-label">Forms</div>'+
    '<div class="forms-strip-row">'+items+'</div>'+
  '</div>';
}

function cmpPick(name,url){
  var id=gid(url);

  // Swapping a specific slot (tapped "TAP TO CHANGE" from result view)
  if(S.cmpSwapping==='a'){
    S.cmpA={name:name,id:id};
    S.cmpADet=null;S.cmpASp=null;
    S.cmpSwapping=null;
    S.cmpView='result';S.cmpTab=S.cmpTab||'stats';
    pane('dex').innerHTML=renderCompareResult();
    af(url).then(function(d){S.cmpADet=d;pane('dex').innerHTML=renderCompareResult();return af(d.species.url);})
      .then(function(sp){S.cmpASp=sp;pane('dex').innerHTML=renderCompareResult();}).catch(function(){});
    return;
  }
  if(S.cmpSwapping==='b'){
    S.cmpB={name:name,id:id};
    S.cmpBDet=null;S.cmpBSp=null;
    S.cmpSwapping=null;
    S.cmpView='result';S.cmpTab=S.cmpTab||'stats';
    pane('dex').innerHTML=renderCompareResult();
    af(url).then(function(d){S.cmpBDet=d;pane('dex').innerHTML=renderCompareResult();return af(d.species.url);})
      .then(function(sp){S.cmpBSp=sp;pane('dex').innerHTML=renderCompareResult();}).catch(function(){});
    return;
  }

  // Normal flow — picking A then B for a new comparison
  if(!S.cmpA){
    S.cmpA={name:name,id:id};
    S.cmpADet=null;S.cmpASp=null;
    af(url).then(function(d){S.cmpADet=d;return af(d.species.url);}).then(function(sp){S.cmpASp=sp;}).catch(function(){});
    S.cmpQ='';S.cmpPage=0;
    pane('dex').innerHTML=renderComparePicker();
    setTimeout(bindAllFloatHide,0);
    return;
  }
  S.cmpB={name:name,id:id};
  S.cmpBDet=null;S.cmpBSp=null;
  S.cmpView='result';S.cmpTab='stats';
  pane('dex').innerHTML=renderCompareResult();
  af(url).then(function(d){
    S.cmpBDet=d;
    pane('dex').innerHTML=renderCompareResult();
    return af(d.species.url);
  }).then(function(sp){
    S.cmpBSp=sp;
    pane('dex').innerHTML=renderCompareResult();
  }).catch(function(e){console.error(e);});
}

// Calculate max type effectiveness multiplier of attacker's STAB types vs defender's types
function calcTypeAdvantage(atkTypes,defTypes){
  // Type chart: effectiveness[atk][def] = multiplier
  var E={
    normal:{rock:0.5,ghost:0,steel:0.5},
    fire:{fire:0.5,water:0.5,grass:2,ice:2,bug:2,rock:0.5,dragon:0.5,steel:2},
    water:{fire:2,water:0.5,grass:0.5,ground:2,rock:2,dragon:0.5},
    grass:{fire:0.5,water:2,grass:0.5,poison:0.5,ground:2,flying:0.5,bug:0.5,rock:2,dragon:0.5,steel:0.5},
    electric:{water:2,grass:0.5,electric:0.5,ground:0,flying:2,dragon:0.5},
    ice:{fire:0.5,water:0.5,grass:2,ice:0.5,ground:2,flying:2,dragon:2,steel:0.5},
    fighting:{normal:2,ice:2,poison:0.5,flying:0.5,psychic:0.5,bug:0.5,rock:2,ghost:0,dark:2,steel:2,fairy:0.5},
    poison:{grass:2,poison:0.5,ground:0.5,rock:0.5,ghost:0.5,steel:0,fairy:2},
    ground:{fire:2,grass:0.5,electric:2,poison:2,flying:0,bug:0.5,rock:2,steel:2},
    flying:{grass:2,electric:0.5,fighting:2,bug:2,rock:0.5,steel:0.5},
    psychic:{fighting:2,poison:2,psychic:0.5,dark:0,steel:0.5},
    bug:{fire:0.5,grass:2,fighting:0.5,poison:0.5,flying:0.5,psychic:2,ghost:0.5,dark:2,steel:0.5,fairy:0.5},
    rock:{fire:2,ice:2,fighting:0.5,ground:0.5,flying:2,bug:2,steel:0.5},
    ghost:{normal:0,psychic:2,ghost:2,dark:0.5},
    dragon:{dragon:2,steel:0.5,fairy:0},
    dark:{fighting:0.5,psychic:2,ghost:2,dark:0.5,fairy:0.5},
    steel:{fire:0.5,water:0.5,electric:0.5,ice:2,rock:2,steel:0.5,fairy:2},
    fairy:{fire:0.5,fighting:2,poison:0.5,dragon:2,dark:2,steel:0.5}
  };
  var bestMult=1;
  atkTypes.forEach(function(atk){
    var mult=1;
    defTypes.forEach(function(def){
      mult*=(E[atk]&&E[atk][def]!==undefined)?E[atk][def]:1;
    });
    if(mult>bestMult)bestMult=mult;
  });
  return bestMult;
}

// Returns a small sword SVG if the attacker has type advantage
function matchupSword(atkTypes,defTypes){
  if(!atkTypes.length||!defTypes.length)return '';
  var mult=calcTypeAdvantage(atkTypes,defTypes);
  if(mult>=2){
    var label=mult>=4?'×4':'×2';
    return '<div style="display:flex;align-items:center;gap:2px;margin-top:3px" title="Super effective">'+
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 3L21 3L21 9.5M21 3L10 14M3 21L7 17M10 14L7 17"/></svg>'+
      '<span style="font-size:9px;font-weight:800;color:#22C55E">'+label+'</span>'+
    '</div>';
  }
  return '';
}

      (loadingB?'<div style="width:56px;height:56px;display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:11px">…</div>':'<img src="'+spr(b.id)+'" width="56" height="56" style="image-rendering:pixelated"/>')+
      '<div class="dex-num" style="margin-top:2px">#'+(b?String(b.id).padStart(4,'0'):'????')+'</div>'+
      '<div style="font-size:13px;font-weight:800;text-transform:capitalize;text-align:center;line-height:1.15">'+(b?cap(b.name):'?')+'</div>'+
      (!loadingA&&!loadingB?matchupSword(bTypes,aTypes):'')+
      '<div style="font-size:9px;color:var(--tx3);margin-top:3px;letter-spacing:.05em">TAP TO CHANGE</div>'+
    '</div>'+
  '</div>';
  // Sub-tabs — kept pinned (sticky) since they're the navigation control
  var subTabs='<div style="display:flex;background:var(--card2);border-bottom:0.5px solid var(--border);flex-shrink:0">'+
    [['stats','Stats'],['type','Type'],['moves','Moves']].map(function(t){
      var act=S.cmpTab===t[0];
      return '<button onclick="setCmpTab(\''+t[0]+'\')" style="flex:1;padding:9px 4px;background:'+(act?'var(--bg)':'transparent')+';border:none;border-bottom:2px solid '+(act?'#3A8AD6':'transparent')+';color:'+(act?'var(--tx)':'var(--tx3)')+';font-weight:700;font-size:13px;cursor:pointer">'+t[1]+'</button>';
    }).join('')+
  '</div>';
  var body='';
  if(loadingA||loadingB)body='<div class="empty">Loading…</div>';
  else if(S.cmpTab==='stats')body=cmpRenderStats(a,b,aSp,bSp);
  else if(S.cmpTab==='type')body=cmpRenderType(a,b,aTypes,bTypes);
  else body=cmpRenderMoves(a,b);
  return '<div class="screen">'+
    '<div class="topbar">'+
      (S.cmpReturnTo?'<button class="back-btn" onclick="exitCompare()">‹</button>':'')+
      homeBtnHTML()+
      '<div class="topbar-title">Compare</div>'+
      '<button class="icon-btn cmp-cancel-btn" onclick="cancelCompareFully()" title="Cancel comparison" aria-label="Cancel comparison">Cancel</button>'+
    '</div>'+
    subTabs+
    '<div class="scroll" style="padding:0 0 100px 0;position:relative">'+
      '<div style="position:relative;min-height:100%;padding:12px 14px">'+
      // Type-color atmospheric backdrop — A's colors anchor LEFT side, B's anchor RIGHT, full content height
      (S.glass&&!loadingA&&!loadingB?'<div aria-hidden="true" class="cmp-atmosphere" style="position:absolute;inset:0;pointer-events:none;background:'+
        // Top zone (strongest)
        'radial-gradient(ellipse 70% 240px at 0% 0px,'+aCol+'70,transparent 70%),'+
        'radial-gradient(ellipse 70% 240px at 100% 0px,'+bCol+'70,transparent 70%),'+
        // Persistent side bands — color along left & right edges all the way down
        'linear-gradient(90deg,'+aCol+'33 0%,transparent 35%,transparent 65%,'+bCol+'33 100%),'+
        // Mid-page accents at percentage positions (auto-scale with content)
        'radial-gradient(ellipse 60% 30% at 0% 30%,'+aCol+'48,transparent 70%),'+
        'radial-gradient(ellipse 60% 30% at 100% 45%,'+bCol+'48,transparent 70%),'+
        'radial-gradient(ellipse 60% 30% at 0% 65%,'+(aTypes[1]?TC[aTypes[1]]:aCol)+'40,transparent 70%),'+
        'radial-gradient(ellipse 60% 30% at 100% 80%,'+(bTypes[1]?TC[bTypes[1]]:bCol)+'40,transparent 70%),'+
        // Subtle horizontal wash
        'linear-gradient(90deg,'+aCol+'14,transparent 50%,'+bCol+'14);z-index:0"></div>':'')+
      '<div style="position:relative;z-index:1">'+header+body+'</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

// Stats view: side-by-side bars, winners highlighted
function cmpRenderStats(a,b,aSp,bSp){
  var STATS=['hp','attack','defense','special-attack','special-defense','speed'];
  var L={hp:'HP',attack:'ATK',defense:'DEF','special-attack':'SATK','special-defense':'SDEF',speed:'SPE'};
  function statOf(p,name){var s=p.stats.filter(function(x){return x.stat.name===name;})[0];return s?s.base_stat:0;}
  var aTot=a.stats.reduce(function(x,s){return x+s.base_stat;},0);
  var bTot=b.stats.reduce(function(x,s){return x+s.base_stat;},0);
  var rows=STATS.map(function(name){
    var av=statOf(a,name),bv=statOf(b,name);
    var aw=av>bv,bw=bv>av;
    var aBar=Math.min(100,(av/255)*100),bBar=Math.min(100,(bv/255)*100);
    return '<div style="display:flex;align-items:center;gap:6px;margin-bottom:9px">'+
      // A value
      '<span style="width:30px;text-align:right;font-size:13px;font-weight:800;color:'+(aw?'#5DAA56':'var(--tx)')+';font-variant-numeric:tabular-nums">'+av+'</span>'+
      // A bar (mirrored)
      '<div style="flex:1;height:7px;background:var(--card2);border-radius:3px;overflow:hidden;display:flex;flex-direction:row-reverse"><div style="height:100%;width:'+aBar+'%;background:'+(aw?'linear-gradient(90deg,#5DAA56,#7DCA76)':'linear-gradient(90deg,#FF9F0A,#FFCA50)')+'"></div></div>'+
      // Label
      '<span style="width:42px;text-align:center;font-size:10px;font-weight:800;color:var(--tx3);letter-spacing:.04em">'+(L[name]||name)+'</span>'+
      // B bar
      '<div style="flex:1;height:7px;background:var(--card2);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+bBar+'%;background:'+(bw?'linear-gradient(90deg,#5DAA56,#7DCA76)':'linear-gradient(90deg,#FF9F0A,#FFCA50)')+'"></div></div>'+
      // B value
      '<span style="width:30px;text-align:left;font-size:13px;font-weight:800;color:'+(bw?'#5DAA56':'var(--tx)')+';font-variant-numeric:tabular-nums">'+bv+'</span>'+
    '</div>';
  }).join('');
  // Total row
  var totWin=aTot>bTot?'a':bTot>aTot?'b':'';
  var totalRow='<div style="display:flex;align-items:center;gap:6px;border-top:0.5px solid var(--border);padding-top:9px;margin-top:4px">'+
    '<span style="width:30px;text-align:right;font-size:14px;font-weight:900;color:'+(totWin==='a'?'#5DAA56':'var(--tx)')+';font-variant-numeric:tabular-nums">'+aTot+'</span>'+
    '<div style="flex:1"></div>'+
    '<span style="width:42px;text-align:center;font-size:10px;font-weight:800;color:var(--tx3);letter-spacing:.04em">TOTAL</span>'+
    '<div style="flex:1"></div>'+
    '<span style="width:30px;text-align:left;font-size:14px;font-weight:900;color:'+(totWin==='b'?'#5DAA56':'var(--tx)')+';font-variant-numeric:tabular-nums">'+bTot+'</span>'+
  '</div>';
  // Physical info
  function cell(label,va,vb,higherWins){
    var aWin=higherWins===true?va>vb:higherWins===false?va<vb:false;
    var bWin=higherWins===true?vb>va:higherWins===false?vb<va:false;
    return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border2)">'+
      '<span style="flex:1;text-align:right;font-size:13px;font-weight:700;color:'+(aWin?'#5DAA56':'var(--tx)')+'">'+va+'</span>'+
      '<span style="font-size:10px;color:var(--tx3);font-weight:700;width:90px;text-align:center;letter-spacing:.03em">'+label+'</span>'+
      '<span style="flex:1;text-align:left;font-size:13px;font-weight:700;color:'+(bWin?'#5DAA56':'var(--tx)')+'">'+vb+'</span>'+
    '</div>';
  }
  var phys=
    cell('HEIGHT',(a.height/10).toFixed(1)+' m',(b.height/10).toFixed(1)+' m')+
    cell('WEIGHT',(a.weight/10).toFixed(1)+' kg',(b.weight/10).toFixed(1)+' kg')+
    cell('BASE XP',a.base_experience||'?',b.base_experience||'?')+
    cell('CATCH RATE',(aSp&&aSp.capture_rate!==undefined?aSp.capture_rate:'?'),(bSp&&bSp.capture_rate!==undefined?bSp.capture_rate:'?'),false);
  // Abilities
  function abilList(p){
    return p.abilities.map(function(x){
      return '<div style="font-size:12px;font-weight:700;color:'+(x.is_hidden?'#FF9F0A':'var(--tx)')+';text-transform:capitalize;line-height:1.45">'+cap(x.ability.name)+(x.is_hidden?' <span style="font-size:9px;color:var(--tx3);font-weight:600">(hidden)</span>':'')+'</div>';
    }).join('');
  }
  var abilities=card('Abilities',
    '<div style="display:flex;gap:8px">'+
      '<div style="flex:1;text-align:center">'+abilList(a)+'</div>'+
      '<div style="width:1px;background:var(--border)"></div>'+
      '<div style="flex:1;text-align:center">'+abilList(b)+'</div>'+
    '</div>'
  );
  return card('Base Stats',rows+totalRow)+
    card('Characteristics',phys)+
    abilities;
}

// Type view: type pills, plus matchup grid
function cmpRenderType(a,b,aTypes,bTypes){
  var aMu=calcMu(aTypes),bMu=calcMu(bTypes);
  function pillRow(types){return types.map(tpill).join(' ');}
  var typesRow='<div style="display:flex;gap:8px;align-items:center">'+
    '<div style="flex:1;text-align:center">'+pillRow(aTypes)+'</div>'+
    '<div style="width:1px;height:30px;background:var(--border)"></div>'+
    '<div style="flex:1;text-align:center">'+pillRow(bTypes)+'</div>'+
  '</div>';
  function group(label,filterFn,color){
    var aSet=Object.keys(aMu).filter(function(t){return filterFn(aMu[t]);});
    var bSet=Object.keys(bMu).filter(function(t){return filterFn(bMu[t]);});
    if(aSet.length===0&&bSet.length===0)return '';
    function chips(set,mu){
      if(set.length===0)return '<div style="font-size:11px;color:var(--tx3);font-style:italic">None</div>';
      return '<div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center">'+set.map(function(t){
        return '<div style="display:flex;align-items:center;gap:3px;background:'+TC[t]+';border-radius:99px;padding:3px 9px"><span style="font-size:9px;font-weight:900;color:#fff;text-transform:uppercase">'+t.slice(0,3)+'</span><span style="font-size:9px;font-weight:700;color:rgba(255,255,255,0.85)">'+multLbl(mu[t])+'</span></div>';
      }).join('')+'</div>';
    }
    return '<div style="margin-bottom:11px">'+
      '<div style="font-size:10px;font-weight:800;color:'+color+';letter-spacing:.05em;margin-bottom:6px;text-align:center">'+label+'</div>'+
      '<div style="display:flex;gap:8px">'+
        '<div style="flex:1">'+chips(aSet,aMu)+'</div>'+
        '<div style="width:1px;background:var(--border)"></div>'+
        '<div style="flex:1">'+chips(bSet,bMu)+'</div>'+
      '</div>'+
    '</div>';
  }
  var matchups=
    group('IMMUNE TO (×0)',function(v){return v===0;},'#9B9BA8')+
    group('WEAK TO',function(v){return v>1;},'#CE4265')+
    group('RESISTS',function(v){return v>0&&v<1;},'#5DAA56');
  return card('Types',typesRow)+
    card('Defensive Matchups',matchups||'<div style="text-align:center;color:var(--tx3);font-size:12px">No notable matchups.</div>');
}

// Moves view: shared moves first, then unique to each
function cmpRenderMoves(a,b){
  var vg=S.game;
  // Same union-vs-filter logic as renderDetMoves: with a game filter, only
  // moves learned in that game; without, union across all games picking the
  // lowest level seen so the comparison shows the most generous timing.
  function levelMoves(p){
    if(vg){
      return (p.moves||[]).map(function(m){
        var vds=m.version_group_details||[];
        var v=vds.filter(function(x){return x.move_learn_method.name==='level-up'&&x.version_group.name===vg;})[0];
        return v?{name:m.move.name,lv:v.level_learned_at}:null;
      }).filter(Boolean).sort(function(a,b){return a.lv-b.lv;});
    }
    // All games: show every move learned by level-up in any game, no levels.
    var seen={};
    (p.moves||[]).forEach(function(m){
      var vds=m.version_group_details||[];
      if(vds.some(function(x){return x.move_learn_method.name==='level-up';}))seen[m.move.name]=true;
    });
    return Object.keys(seen).sort().map(function(n){return {name:n,lv:null};});
  }
  var aMoves=levelMoves(a),bMoves=levelMoves(b);
  var aNames={};aMoves.forEach(function(m){aNames[m.name]=m.lv;});
  var bNames={};bMoves.forEach(function(m){bNames[m.name]=m.lv;});
  var shared=Object.keys(aNames).filter(function(n){return bNames[n]!==undefined;}).sort();
  var aOnly=Object.keys(aNames).filter(function(n){return bNames[n]===undefined;}).sort(function(x,y){return aNames[x]!==null&&aNames[y]!==null?aNames[x]-aNames[y]:x.localeCompare(y);});
  var bOnly=Object.keys(bNames).filter(function(n){return aNames[n]===undefined;}).sort(function(x,y){return bNames[x]!==null&&bNames[y]!==null?bNames[x]-bNames[y]:x.localeCompare(y);});

  // Trigger lazy fetch for all visible move details (so type/cat/power/acc populate)
  var allNames=shared.concat(aOnly).concat(bOnly);
  setTimeout(function(){enrichMoveNames(allNames,'cmv-');},0);

  function levelBadgeText(lv){
    if(lv===null||lv===undefined)return '';
    return lv===0?'Evo':'Lv '+lv;
  }
  function moveRow(name,lvA,lvB){
    var c=mvDetCache[name];
    var power=c?(c.power!=null?String(c.power):'-'):'-';
    var acc=c?(c.accuracy!=null?String(c.accuracy):'-'):'-';
    var desc=c?esc(c.short||''):'';
    var typeHTML=c?tcIcon(c.type):'<div class="mv-ph"></div>';
    var dcHTML=c?dcIcon(c.dmgClass):'<div class="mv-ph"></div>';
    var aTxt=levelBadgeText(lvA);
    var bTxt=levelBadgeText(lvB);
    var aCol=(lvA===undefined||lvA===null)?'var(--tx3)':'#5C9EFF';
    var bCol=(lvB===undefined||lvB===null)?'var(--tx3)':'#5C9EFF';
    return '<div class="mv-row" id="cmv-'+name+'" onclick="openMoveByName(\''+name+'\')">'+
      // Slot A badge (left)
      '<span style="width:38px;text-align:center;font-size:11px;font-weight:700;color:'+aCol+';font-variant-numeric:tabular-nums;flex-shrink:0">'+aTxt+'</span>'+
      // Center: name, desc, type/cat, stat pill
      '<div class="mv-row-main">'+
        '<div class="mv-row-name">'+cap(name)+'</div>'+
        (desc?'<div class="mv-row-desc">'+desc+'</div>':'<div class="mv-row-desc">&nbsp;</div>')+
      '</div>'+
      '<div class="mv-stat-pill">'+
        '<div class="mv-stat-cell">'+power+'</div>'+
        '<div class="mv-stat-cell">'+acc+'</div>'+
      '</div>'+
      typeHTML+dcHTML+
      // Slot B badge (right)
      '<span style="width:38px;text-align:center;font-size:11px;font-weight:700;color:'+bCol+';font-variant-numeric:tabular-nums;flex-shrink:0">'+bTxt+'</span>'+
    '</div>';
  }
  // Header: A's name on the left, "MOVE" in the middle, B's name on the right
  var hdr='<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card2);border-bottom:0.5px solid var(--border);font-size:10px;font-weight:800;color:var(--tx2);letter-spacing:.04em">'+
    '<span style="width:38px;text-align:center;text-transform:uppercase;line-height:1.1;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(cap(a.name))+'</span>'+
    '<span style="flex:1;text-align:left">MOVE</span>'+
    '<span style="width:62px;text-align:center">PWR · ACC</span>'+
    '<span style="width:60px"></span>'+
    '<span style="width:38px;text-align:center;text-transform:uppercase;line-height:1.1;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(cap(b.name))+'</span>'+
  '</div>';
  function section(title,arr,renderRow){
    if(arr.length===0)return '';
    return '<div style="background:var(--card);border-radius:13px;overflow:hidden;border:0.5px solid var(--border);margin-bottom:11px">'+
      '<div style="padding:10px 12px;font-size:11px;font-weight:800;color:var(--tx);letter-spacing:.04em;background:var(--card2);text-transform:capitalize">'+esc(title)+' <span style="color:var(--tx3);font-weight:600">· '+arr.length+'</span></div>'+
      hdr+
      arr.map(renderRow).join('')+
    '</div>';
  }
  var sharedHtml=section('Shared Moves',shared,function(n){return moveRow(n,aNames[n],bNames[n]);});
  var aOnlyHtml=section(cap(a.name)+' Only',aOnly,function(n){return moveRow(n,aNames[n],undefined);});
  var bOnlyHtml=section(cap(b.name)+' Only',bOnly,function(n){return moveRow(n,undefined,bNames[n]);});
  if(!sharedHtml&&!aOnlyHtml&&!bOnlyHtml){
    return '<div class="empty">No level-up moves found'+(vg?' for the selected game':'')+'.</div>';
  }
  var note=vg?'<div style="font-size:10px;color:var(--tx3);text-align:center;margin-bottom:10px">Filtered to '+(gameById(vg)?gameById(vg).sh:vg)+' · level-up moves only</div>':'';
  return note+sharedHtml+aOnlyHtml+bOnlyHtml;
}

        '<span><span class="tc-leg-dot" style="background:#2A1F0D"></span>½× / ¼×</span>'+
        '<span><span class="tc-leg-dot" style="background:#2A0D1A"></span>0×</span>'+
      '</div>'+
      '<table class="tc-table"><thead>'+chdr+'</thead><tbody>'+rows+'</tbody></table>'+

function setTypeMode(m){S.typeMode=m;pane('types').innerHTML=renderTypes();}

// ── BOSSES (Gym Leaders + Elite Four + Champion) ──
function renderBosses(){
  var list=bossesForGame(S.game);
  // When a specific game is filtered, sort by progression: gym 1..N, then E4 1..4, then champion
  var ROLE_ORDER={gym:0,kahuna:1,e4:2,champion:3};
  if(S.game){
    list=list.slice().sort(function(a,b){
      if(ROLE_ORDER[a.role]!==ROLE_ORDER[b.role])return ROLE_ORDER[a.role]-ROLE_ORDER[b.role];
      return (a.n||0)-(b.n||0);
    });
  } else {
    // No filter — group by game in the GAMES array order (oldest first feels natural here, but we'll respect GAMES list)
    list=list.slice().sort(function(a,b){
      // Use the FIRST game id in each entry's games[] for grouping
      var ai=GAMES.findIndex(function(g){return a.games[0]===g.id;});
      var bi=GAMES.findIndex(function(g){return b.games[0]===g.id;});
      if(ai!==bi)return bi-ai; // higher index = older gen → flip so newest first matches GAMES order
      if(ROLE_ORDER[a.role]!==ROLE_ORDER[b.role])return ROLE_ORDER[a.role]-ROLE_ORDER[b.role];
      return (a.n||0)-(b.n||0);
    });
  }
  var g=S.game?gameById(S.game):null;
  var rows='';
  var lastGameKey=null;
  list.forEach(function(b){
    // When showing all games, insert a section header whenever the game group changes
    if(!S.game){
      var firstGameId=b.games[0];
      if(firstGameId!==lastGameKey){
        var gObj=gameById(firstGameId);
        rows+='<div class="bs-section-h">'+
          '<span>'+gameBadge(gObj,22)+'</span>'+
          '<span>'+(gObj?gObj.n:firstGameId)+'</span>'+
        '</div>';
        lastGameKey=firstGameId;
      }
    }
    var roleLabel=b.role==='gym'?('Gym '+b.n):(b.role==='kahuna'?('Kahuna '+b.n):(b.role==='e4'?('Elite Four #'+b.n):'Champion'));
    var typePill=b.type?'<span class="bs-type" style="background:'+(TC[b.type]||'#888')+'">'+b.type+'</span>':'';
    rows+='<div class="bs-row" onclick="openBoss(\''+b.id+'\')">'+
      '<div class="bs-role-ic '+b.role+'">'+(b.role==='champion'?'★':(b.role==='e4'?'◆':(b.role==='kahuna'?'K'+b.n:b.n)))+'</div>'+
      '<div class="bs-info">'+
        '<div class="bs-name">'+esc(b.name)+'</div>'+
        '<div class="bs-meta">'+roleLabel+(b.city?' · '+esc(b.city):'')+'</div>'+
      '</div>'+
      typePill+
      '<span style="color:var(--tx3);font-size:18px">›</span>'+
    '</div>';
  });
  if(!list.length){
    if(!BOSSES.length){
      rows='<div class="empty">No boss data loaded.<br/><br/><span style="font-size:11px;opacity:0.7">Run scripts/scrape-bosses.js to generate bosses.js.</span></div>';
    } else {
      rows='<div class="empty">No bosses listed for this game yet.<br/><br/><span style="font-size:11px;opacity:0.7">Run scripts/scrape-bosses.js to refresh data from PokémonDB.</span></div>';
    }
  }
  return '<div class="screen">'+
    '<div class="topbar">'+
      homeBtnHTML()+
      '<div class="topbar-title" style="text-align:left;flex:0 0 auto">Bosses</div>'+

  '</div>';
}
function bossById(id){for(var i=0;i<BOSSES.length;i++)if(BOSSES[i].id===id)return BOSSES[i];return null;}
// Returns the ordered list of bosses for the same game/progression as the current boss.
// Used to find prev/next within the same game so users don't accidentally jump games.
function bossesInSameProgression(b){
  if(!b)return [];
  // Find a single game shared with `b` to anchor progression. Prefer the active game filter
  // if the boss appears in it; otherwise use the first game in b.games.
  var anchorGame=(S.game&&b.games.indexOf(S.game)>=0)?S.game:b.games[0];
  var ROLE_ORDER={gym:0,kahuna:1,e4:2,champion:3};
  return BOSSES.filter(function(x){return x.games.indexOf(anchorGame)>=0;}).sort(function(a,c){
    if(ROLE_ORDER[a.role]!==ROLE_ORDER[c.role])return ROLE_ORDER[a.role]-ROLE_ORDER[c.role];
    return (a.n||0)-(c.n||0);
  });
}
function bossSiblings(b){
  var arr=bossesInSameProgression(b);
  var idx=arr.findIndex(function(x){return x.id===b.id;});
  return {arr:arr,idx:idx,prev:idx>0?arr[idx-1]:null,next:idx>=0&&idx<arr.length-1?arr[idx+1]:null};
}
function bossNav(dir){
  var b=bossById(S.bossSelId);
  if(!b)return;
  var sib=bossSiblings(b);
  var target=dir<0?sib.prev:sib.next;
  if(!target)return; // already at edge
  S.bossSelId=target.id;
  pane('bosses').innerHTML=renderBossDetail();
}
function openBoss(id){
  S.bossSelId=id;
  pane('bosses').innerHTML=renderBossDetail();
}
function closeBoss(){
  // If we entered the boss detail from the Progress hub, return there instead
  // of falling through to the all-games Bosses tab. This keeps the user inside
  // the per-game progress flow they were tracking.
  if(S.bossReturnTo==='progress'){
    S.bossReturnTo=null;
    S.bossSelId=null;
    S.tab='progress';renderNav();
    document.body.setAttribute('data-active-tab','progress');
    document.querySelectorAll('.tab-pane').forEach(function(p){p.className='tab-pane'+(p.dataset.tab==='progress'?' act':'');});
    pane('progress').innerHTML=renderProgress();
    return;
  }
  S.bossSelId=null;
  pane('bosses').innerHTML=renderBosses();
}
function renderBossDetail(){
  var b=bossById(S.bossSelId);
  if(!b)return '<div class="screen"><div class="topbar"><button class="back-btn" onclick="closeBoss()">‹</button>'+homeBtnHTML()+'<div class="topbar-title">Boss</div></div><div class="empty">Not found.</div></div>';
  var roleLabel=b.role==='gym'?('Gym Leader #'+b.n):(b.role==='kahuna'?('Island Kahuna #'+b.n):(b.role==='e4'?('Elite Four #'+b.n):'Champion'));

  var headerColor=b.type&&TC[b.type]?TC[b.type]:'#888';
  var gamesList=b.games.map(function(gid){var go=gameById(gid);return go?'<span class="bs-game-pill">'+gameBadge(go,18)+go.sh+'</span>':gid;}).join('');
  // Single team → one block. Variant boss (e.g. Blue with 3 starter-dependent
  // teams) → render each variant as its own labelled block. The variants share
  // an id, so beaten state is the same for all.
  function renderOneTeam(team){
    return team.map(function(p){
      var t1Color=TC[p.t1]||'#888';
      var t2Color=p.t2?TC[p.t2]:null;
      var typesHtml='<span class="bs-team-type" style="background:'+t1Color+'">'+p.t1+'</span>'+(p.t2?'<span class="bs-team-type" style="background:'+t2Color+'">'+p.t2+'</span>':'');
      return '<div class="bs-team-row" onclick="openDexByName(\''+p.n+'\')">'+
        '<img src="'+sprByName(p.n)+'" width="56" height="56" style="image-rendering:pixelated;flex-shrink:0" onerror="this.style.opacity=0.3"/>'+
        '<div class="bs-team-info">'+
          '<div class="bs-team-name">'+cap(p.n.replace(/-/g,' '))+'</div>'+
          '<div class="bs-team-types">'+typesHtml+'</div>'+
        '</div>'+
        '<div class="bs-team-lvl">Lv. '+p.l+'</div>'+
      '</div>';
    }).join('');
  }
  var variants=bossVariants(b);
  var teamHtml;
  if(variants.length>1){
    teamHtml=variants.map(function(v){
      var label=v.variant?'<div class="bs-variant-label">'+esc(v.variant)+'</div>':'';
      return label+renderOneTeam(v.team);
    }).join('<div class="bs-variant-sep"></div>');
  } else {
    teamHtml=renderOneTeam(b.team);
  }
  // Edge note + prev/next siblings within the same game progression
  var sib=bossSiblings(b);
  var edgeNote='';
  if(!sib.next){
    // Determine which game we're at the end of
    var anchorGame=(S.game&&b.games.indexOf(S.game)>=0)?S.game:b.games[0];
    var go=gameById(anchorGame);
    edgeNote='<div class="bs-edge-note">🏁 End of '+(go?go.n:'this game')+'\u2019s progression</div>';
  } else if(!sib.prev){
    var anchorGame2=(S.game&&b.games.indexOf(S.game)>=0)?S.game:b.games[0];
    var go2=gameById(anchorGame2);
    edgeNote='<div class="bs-edge-note">🚩 First boss of '+(go2?go2.n:'this game')+'</div>';
  }
  // If this boss detail was opened from the Progress hub, surface a
  // "Mark Complete / Beaten" toggle right in the topbar so the user can mark
  // the boss without backing out to the list.
  var markBtn='';
  if(S.bossReturnTo==='progress'&&S.progGame){
    var alreadyBeaten=progFor(S.progGame).beaten.indexOf(b.id)>=0;
    markBtn='<button class="bs-mark-btn '+(alreadyBeaten?'on':'')+'" onclick="bossDetailToggleBeaten()" aria-label="'+(alreadyBeaten?'Beaten':'Mark Complete')+'">'+
      (alreadyBeaten?'✓ Beaten':'Mark Complete')+
    '</button>';
  }
  return '<div class="screen">'+
    '<div class="topbar" style="background:linear-gradient(135deg,'+headerColor+'CC,'+headerColor+'88)">'+
      '<button class="back-btn" onclick="closeBoss()" style="background:rgba(0,0,0,0.3);color:#fff">‹</button>'+
      homeBtnHTML()+
      '<div class="topbar-title" style="color:#fff;flex:1">'+esc(b.name)+'</div>'+
      markBtn+
    '</div>'+
    '<div class="scroll" id="boss-scroll" style="padding:14px 14px 100px">'+
      '<div class="card bs-hero" style="border-left:5px solid '+headerColor+'">'+
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">'+
          '<div class="bs-role-ic '+b.role+'" style="width:42px;height:42px;font-size:18px">'+(b.role==='champion'?'★':(b.role==='e4'?'◆':(b.role==='kahuna'?'K'+b.n:b.n)))+'</div>'+
          '<div style="flex:1">'+
            '<div style="font-size:13px;color:var(--tx3);font-weight:700">'+roleLabel+'</div>'+
            '<div style="font-size:22px;font-weight:900;letter-spacing:-0.01em">'+esc(b.name)+'</div>'+
            (b.city?'<div style="font-size:12px;color:var(--tx2)">'+esc(b.city)+'</div>':'')+
          '</div>'+
        '</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:6px">'+
          typePill+
          (b.badge?'<span class="bs-badge-pill">🎖 '+esc(b.badge)+'</span>':'')+
        '</div>'+
        '<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">'+gamesList+'</div>'+
      '</div>'+
      '<div class="card bs-team-card">'+
        '<div style="font-size:14px;font-weight:800;margin-bottom:10px;color:var(--tx)">Team</div>'+
        teamHtml+

      (b.note?'<div class="card" style="font-size:12px;color:var(--tx2);line-height:1.5;font-style:italic">📝 '+esc(b.note)+'</div>':'')+
      edgeNote+
    '</div>'+
    // Floating prev/next — same UX as Pokédex page-floats
    '<button id="boss-prev" class="pg-float prev"'+(sib.prev?'':' disabled')+' onclick="bossNav(-1)" aria-label="Previous boss">‹</button>'+
    '<button id="boss-next" class="pg-float next"'+(sib.next?'':' disabled')+' onclick="bossNav(1)" aria-label="Next boss">›</button>'+
  '</div>';
}
// Open a Pokémon dex detail by name (for tapping team members)
function openDexByName(name){
  // Find the URL from S.dexList; fall back to constructing one

// ════════════════════════════════════════════════════════════════════════════
// PROGRESS HUB — per-game catch/boss/wanted tracker with completion reward.
// Entry: renderProgress() routes to picker/dashboard/sub-views based on state.
// Persistence: see PROG_KEY storage block above (state init, helpers, toggles).
// ════════════════════════════════════════════════════════════════════════════

// Tracks whether we've already done the once-per-session auto-restore from
// PROG.lastViewed. Without this guard, hitting "Switch game" (which nulls out
// S.progGame) would immediately re-fill it from lastViewed on the very next
// render — making the back button look like a no-op.
var progAutoRestoreDone=false;
function renderProgress(){
  // First entry into the Progress hub for this session — restore the last-viewed
  // game if any so the user doesn't have to pick again every time they switch tabs.
  // After that, S.progGame===null is treated as an explicit "I want the picker".
  if(!S.progGame && !progAutoRestoreDone){
    progLoad();
    if(PROG.lastViewed&&PROG.games[PROG.lastViewed]){
      S.progGame=PROG.lastViewed;S.progView='dashboard';
    }
  }
  progAutoRestoreDone=true;
  if(!S.progGame){
    return renderProgGamePicker();
  }
  // Make sure the regional dex is being fetched (no-op if already cached)
  regionalIdsForGame(S.progGame);
  if(S.progView==='detail'&&S.progDexDetId)return renderProgDexDetail(S.progGame,S.progDexDetId);
  if(S.progView==='pokedex')return renderProgPokedex(S.progGame);
  if(S.progView==='bosses')return renderProgBosses(S.progGame);
  if(S.progView==='wanted')return renderProgWanted(S.progGame);
  return renderProgDashboard(S.progGame);
}

// ── Game picker ─────────────────────────────────────────────────────────────
function renderProgGamePicker(){
  progLoad();
  // Order from oldest to newest (gen ascending). Within the same gen, keep the
  // GAMES-array order (which itself is hand-ordered by release within a gen).
  var sortedGames=GAMES.slice().sort(function(a,b){
    if(a.gen!==b.gen)return a.gen-b.gen;
    return GAMES.indexOf(b)-GAMES.indexOf(a);
  });
  // A row builder we can reuse in both sections.
  function rowFor(g,opts){
    opts=opts||{};
    var hasProg=PROG.games[g.id];
    var caught=hasProg?Object.keys(hasProg.caught||{}).filter(function(k){return hasProg.caught[k].n;}).length:0;
    var max=dexCountForGame(g.id);
    var stat=hasProg?(caught+'/'+max+' caught'):'No progress yet';
    var support=progSupportLevel(g.id);
    var supportNote=support==='catch-only'?' · Catch tracker only':'';
    var beatenCount=hasProg?(hasProg.beaten||[]).length:0;
    // In-Progress section gets a richer subtitle that includes boss-beaten count too.
    var subtitle=opts.inProgress
      ? (caught+'/'+max+' caught · '+beatenCount+' boss'+(beatenCount===1?'':'es')+' beaten'+supportNote)
      : (stat+supportNote);
    var pinHtml=opts.inProgress?'<span class="prog-pick-pin" title="In progress">●</span>':'';
    return '<div class="prog-pick-row '+(opts.inProgress?'in-progress':'')+'" onclick="progPickGame(\''+g.id+'\')">'+
        gameBadge(g,40)+
        '<div class="prog-pick-info">'+
          '<div class="prog-pick-name">'+g.n+pinHtml+'</div>'+
          '<div class="prog-pick-sub">'+subtitle+'</div>'+
        '</div>'+
        '<span class="lp-list-arrow">›</span>'+
      '</div>';
  }
  // Split the games into "In Progress" (PROG.games[id].inProgress === true)
  // and the rest. In-progress games are pinned at the top; once a game is in
  // that section it doesn't appear in the regular list below until the user
  // un-marks it from inside the game's hub.
  var inProgress=sortedGames.filter(function(g){return PROG.games[g.id]&&PROG.games[g.id].inProgress;});
  var notInProgress=sortedGames.filter(function(g){return !(PROG.games[g.id]&&PROG.games[g.id].inProgress);});

  var inProgHtml='';
  if(inProgress.length){
    inProgHtml=
      '<div class="prog-pick-section-head">'+
        '<span class="prog-pick-section-dot"></span>IN PROGRESS'+
      '</div>'+
      '<div class="prog-pick-list prog-pick-list-active">'+
        inProgress.map(function(g){return rowFor(g,{inProgress:true});}).join('')+
      '</div>';
  }
  var allGamesHtml=
    '<div class="prog-pick-section-head'+(inProgress.length?' with-spacing':'')+'">ALL GAMES</div>'+
    '<div class="prog-pick-list">'+
      notInProgress.map(function(g){return rowFor(g);}).join('')+
    '</div>';

  return '<div class="screen">'+
    '<div class="topbar">'+
      homeBtnHTML()+
      '<div class="topbar-title" style="text-align:left;flex:1">Progress</div>'+
    '</div>'+
    '<div class="scroll" style="padding:14px">'+
      '<div class="prog-pick-intro">Pick a game to track your progress. Each game keeps its own slot — pokémon caught, bosses beaten, and a wanted list.</div>'+
      inProgHtml+
      allGamesHtml+
    '</div>'+
  '</div>';
}

function progPickGame(gameId){
  S.progGame=gameId;S.progView='dashboard';
  S.progDexDetId=null;     // ensure no stale detail view from a prior game
  progLoad();PROG.lastViewed=gameId;progSave();
  // Kick off a background fetch of this game's regional dex if we don't have it
  // cached yet — by the time the user opens the checklist, the list should be
  // ready and the dashboard counts will be accurate.
  regionalIdsForGame(gameId);
  pane('progress').innerHTML=renderProgress();
}
function progSwitchGame(){
  // Returns to the game picker. Reset all per-game view state so the next
  // pick starts on a fresh dashboard at the top of the scroll.
  S.progGame=null;S.progView='dashboard';
  S.progDexDetId=null;S.progDexQ='';S.progDexFilter='all';S.progDexScrollY=0;
  pane('progress').innerHTML=renderProgress();
}
// Re-render the progress pane but preserve scroll position of its `.scroll`
// container. Use this instead of `pane('progress').innerHTML=renderProgress()`
// for any handler triggered by the user mid-list (toggling caught/shiny/wanted
// from the checklist) — otherwise the user gets bounced to the top of the list
// every time, which is unusable for a 200-pokémon checklist.
function progRender(){
  var p=pane('progress');if(!p)return;
  var sc=p.querySelector('.scroll');
  var y=sc?sc.scrollTop:0;
  p.innerHTML=renderProgress();
  // Restore scroll on the next frame so the new DOM has been laid out
  if(y>0){
    requestAnimationFrame(function(){
      var ns=p.querySelector('.scroll');
      if(ns)ns.scrollTop=y;
    });
  }
}
function progSetView(v){
  // When leaving the checklist (or entering a different sub-view), reset:
  //   - scroll-position memory (so we don't restore a stale Y)
  //   - bulk-action selection (selection is per-visit and shouldn't persist
  //     across navigation; otherwise users would tap "Mark as caught" later
  //     and accidentally apply it to a stale set)
  if(v!==S.progView){
    S.progDexScrollY=0;
    S.progDexSel={};
  }
  S.progView=v;
  pane('progress').innerHTML=renderProgress();
}
function progResetConfirm(gameId){
  var g=gameById(gameId);
  uiConfirm({
    title:'Reset progress?',
    message:'This will clear caught Pokémon, beaten bosses, wanted entries, and certificates for '+(g?g.n:'this game')+'. This cannot be undone.',
    confirmLabel:'Reset',
    cancelLabel:'Cancel',
    danger:true,
    onConfirm:function(){
      progReset(gameId);
      pane('progress').innerHTML=renderProgress();
    }
  });
}

// ── Dashboard ───────────────────────────────────────────────────────────────
function renderProgDashboard(gameId){
  var g=gameById(gameId);if(!g)return '<div class="empty">Game not found.</div>';
  var prog=progFor(gameId);
  var support=progSupportLevel(gameId);
  var dexMax=dexCountForGame(gameId);
  var dexCaught=progDexCaughtCount(gameId);
  var shinyCaught=progShinyCaughtCount(gameId);
  var dexPct=Math.round(dexCaught/dexMax*100);
  var bosses=uniqueBossesForGame(gameId);
  // Count beaten ONLY among the deduped set. With variant champions sharing an
  // id (e.g. 3 Blue starter teams), prog.beaten could contain at most one entry
  // per canonical boss, so the total is bounded by the unique count.
  var beatenSet={};
  for(var bi=0;bi<prog.beaten.length;bi++)beatenSet[prog.beaten[bi]]=true;
  var beaten=0;
  for(var bj=0;bj<bosses.length;bj++)if(beatenSet[bosses[bj].id])beaten++;
  var bossMax=bosses.length;
  var nextB=progNextBoss(gameId);

  // Certificate banner — only visible if pokédex is fully complete
  var certHtml='';
  if(prog.completedAt){
    var date=new Date(prog.completedAt);
    var dateStr=date.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});
    certHtml='<div class="prog-cert">'+
      '<div class="prog-cert-deco">🏆</div>'+
      '<div class="prog-cert-body">'+
        '<div class="prog-cert-title">POKÉDEX MASTER</div>'+
        '<div class="prog-cert-sub">All '+dexMax+' Pokémon caught · '+dateStr+'</div>'+
      '</div>'+
    '</div>';
  }

  // Champion badge — separate from the dex cert, shown alongside it. Persists
  // forever once earned. Region name comes from regionForGame().
  var champHtml='';
  if(prog.championedAt){
    var champDate=new Date(prog.championedAt);
    var champDateStr=champDate.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});
    var region=regionForGame(gameId)||'the League';
    champHtml='<div class="prog-cert prog-cert-champ">'+
      '<div class="prog-cert-deco">🏅</div>'+
      '<div class="prog-cert-body">'+
        '<div class="prog-cert-title">CHAMPION OF '+region.toUpperCase()+'</div>'+
        '<div class="prog-cert-sub">Defeated the Champion · '+champDateStr+'</div>'+
      '</div>'+
    '</div>';
  }

  // What's next card
  var nextHtml='';
  if(nextB){
    var roleLabel=nextB.role==='gym'?('Gym '+nextB.n+(nextB.city?' · '+nextB.city:'')):
                  (nextB.role==='kahuna'?('Kahuna '+nextB.n):
                  (nextB.role==='e4'?('Elite Four #'+nextB.n):'Champion'));
    var typeColor=nextB.type&&TC[nextB.type]?TC[nextB.type]:'#666';
    var teamPreview=nextB.team.slice(0,6).map(function(p){

    }).join('');
    nextHtml='<div class="prog-card prog-card-next" onclick="progSetView(\'bosses\')" style="border-left:4px solid '+typeColor+'">'+
      '<div class="prog-card-head">'+
        '<div class="prog-card-eyebrow">UP NEXT</div>'+
        '<div class="prog-card-title">'+nextB.name+'</div>'+
        '<div class="prog-card-sub">'+roleLabel+'</div>'+
      '</div>'+
      '<div class="prog-team-strip">'+teamPreview+'</div>'+
    '</div>';
  } else if(bossMax>0){
    nextHtml='<div class="prog-card prog-card-done">'+
      '<div class="prog-card-title">🏆 All bosses beaten!</div>'+
      '<div class="prog-card-sub">'+beaten+' of '+bossMax+' complete</div>'+
    '</div>';
  }

  // Pokédex card
  var dexCardHtml='<div class="prog-card prog-card-stat" onclick="progSetView(\'pokedex\')">'+
    '<div class="prog-stat-head">'+
      '<div>'+
        '<div class="prog-card-eyebrow">POKÉDEX</div>'+

        '<div class="prog-stat-pct">'+dexPct+'%</div>'+
        (shinyCaught>0?'<div class="prog-stat-shiny">★ '+shinyCaught+' shiny</div>':'')+
      '</div>'+
    '</div>'+
    '<div class="prog-bar"><div class="prog-bar-fill" style="width:'+dexPct+'%"></div></div>'+
  '</div>';

  // Bosses card. If we have data for this game, show the progress card.
  // If not (Arceus uses Wardens, not gym leaders; some legacy games' boss
  // data isn't bundled), show a small empty state instead of hiding the
  // section silently.
  var bossCardHtml='';
  if(bossMax>0){
    var bpct=bossMax?Math.round(beaten/bossMax*100):0;
    bossCardHtml='<div class="prog-card prog-card-stat" onclick="progSetView(\'bosses\')">'+
      '<div class="prog-stat-head">'+
        '<div>'+
          '<div class="prog-card-eyebrow">BOSSES</div>'+
