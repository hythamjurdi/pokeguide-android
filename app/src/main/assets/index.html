        '</div>'+
        '<div class="prog-stat-side"><div class="prog-stat-pct">'+bpct+'%</div></div>'+
      '</div>'+
      '<div class="prog-bar"><div class="prog-bar-fill" style="width:'+bpct+'%"></div></div>'+
    '</div>';
  } else {
    // Special-case Arceus: it has Wardens (Path of Solitude), not gyms/E4.
    // PokémonDB doesn't list them under the standard gym-leaders page, so
    // they're not in our scraped data. Make this explicit rather than show
    // a generic "data missing" message.
    var emptyMsg=gameId==='legends-arceus'
      ? 'Legends: Arceus uses Wardens instead of Gyms — boss tracking is not available for this game.'
      : 'Boss data not yet bundled for '+esc(g.n)+'.';
    bossCardHtml='<div class="prog-card prog-card-info">'+
      '<div class="prog-card-eyebrow">BOSSES</div>'+
      '<div class="prog-card-empty-msg">'+emptyMsg+'</div>'+
    '</div>';
  }

  // Wanted list card — every game gets this.
  var wantedHtml='';
  var wn=prog.wanted.length;
  if(wn>0){
    var preview=prog.wanted.slice(0,4).map(function(id){
      return '<img src="'+spr(id)+'" alt="" class="prog-wanted-thumb" onerror="this.style.opacity=0.3"/>';
    }).join('')+(wn>4?'<span class="prog-wanted-more">+'+(wn-4)+'</span>':'');
    wantedHtml='<div class="prog-card" onclick="progSetView(\'wanted\')">'+
      '<div class="prog-card-head">'+
        '<div class="prog-card-eyebrow">WANTED</div>'+
        '<div class="prog-card-title">'+wn+' on the wishlist</div>'+
      '</div>'+
      '<div class="prog-team-strip">'+preview+'</div>'+
    '</div>';
  } else {
    wantedHtml='<div class="prog-card prog-card-empty" onclick="progSetView(\'pokedex\')">'+
      '<div class="prog-card-eyebrow">WANTED</div>'+
      '<div class="prog-card-empty-msg">Tap any pokémon\u2019s ♡ in the checklist to add it here.</div>'+
    '</div>';
  }

  return '<div class="screen">'+
    '<div class="topbar prog-topbar">'+
      '<button class="back-btn" onclick="progSwitchGame()" aria-label="Switch game">‹</button>'+
      homeBtnHTML()+
      // The game badge AND title are tappable to switch games — gives users
      // a more discoverable way to swap than hunting for the small back arrow.
      '<div onclick="progSwitchGame()" style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;cursor:pointer">'+
        gameBadge(g,30)+
        '<div class="topbar-title" style="text-align:left;flex:1;font-size:18px;margin:0;min-width:0">'+g.n+' <span style="font-size:11px;font-weight:600;color:var(--tx3);margin-left:4px">tap to switch ›</span></div>'+
      '</div>'+
      '<button class="prog-reset-btn" onclick="progResetConfirm(\''+gameId+'\')" aria-label="Reset progress">⟲</button>'+
    '</div>'+
    '<div class="scroll" style="padding:12px;display:flex;flex-direction:column;gap:12px">'+
      certHtml+
      champHtml+
      // In-Progress toggle pill — surfaces the game in the picker's "In
      // Progress" section. Auto-set when the user catches a pokémon or beats
      // a boss; can also be flipped manually here. Manual unmark is the only
      // way to remove a game from In Progress (so playthroughs that pause at
      // 0/100 caught for a bit don't lose their pinned spot).
      '<button class="prog-ip-card '+(prog.inProgress?'on':'')+'" onclick="progToggleInProgressCard(\''+gameId+'\')">'+
        '<span class="prog-ip-dot"></span>'+
        '<div class="prog-ip-text">'+
          '<div class="prog-ip-title">'+(prog.inProgress?'Currently playing':'Not playing')+'</div>'+
          '<div class="prog-ip-sub">'+(prog.inProgress?'Pinned to top of game picker. Tap to unpin.':'Tap to mark this as your active playthrough.')+'</div>'+
        '</div>'+
      '</button>'+
      // Pin-to-Launchpad toggle — when ON, surfaces this game's progress on
      // the home screen (a "Currently Playing" strip + a live progress ring).
      // Only one game can be pinned at a time; pinning a new one auto-unpins
      // the previous. Independent of the inProgress flag above (which is for
      // the picker), so users can be "playing" a game without its progress
      // dominating the launchpad if they want a cleaner home screen.
      '<button class="prog-ip-card '+(progIsPinned(gameId)?'on':'')+'" onclick="progTogglePinned(\''+gameId+'\')">'+
        '<span class="prog-ip-dot" style="'+(progIsPinned(gameId)?'background:#5B8DEF;box-shadow:0 0 0 4px rgba(91,141,239,0.25)':'')+'"></span>'+
        '<div class="prog-ip-text">'+
          '<div class="prog-ip-title">'+(progIsPinned(gameId)?'Pinned to launchpad':'Pin to launchpad')+'</div>'+
          '<div class="prog-ip-sub">'+(progIsPinned(gameId)?'Your home screen shows this game\u2019s progress. Tap to unpin.':'Show this playthrough\u2019s ring on the home screen.')+'</div>'+
        '</div>'+
      '</button>'+
      nextHtml+
      dexCardHtml+
      bossCardHtml+
      wantedHtml+
    '</div>'+
  '</div>';
}
// Toggles the inProgress flag for a game from inside its dashboard.
function progToggleInProgressCard(gameId){
  var g=progFor(gameId);
  progSetInProgress(gameId,!g.inProgress);
  pane('progress').innerHTML=renderProgress();
}
// Toggles the launchpad-pin from inside the dashboard.
function progTogglePinned(gameId){
  progSetPinned(gameId);
  pane('progress').innerHTML=renderProgress();
}

// ── Pokédex checklist ───────────────────────────────────────────────────────
function renderProgPokedex(gameId){
  var g=gameById(gameId);
  var ids=regionalIdsForGame(gameId);
  var prog=progFor(gameId);
  var support=progSupportLevel(gameId);
  var q=(S.progDexQ||'').toLowerCase().trim();
  var f=S.progDexFilter||'all';
  var mode=S.progDexViewMode||'list';

  // Build the visible list. We index against S.dexList where possible (it's the
  // canonical PokéAPI name list, loaded once on app boot). If it isn't loaded,
  // fall back to numeric IDs and rely on lazy fetch.
  //
  // Each row is a tap target — tapping anywhere on it opens the in-progress
  // detail view (renderProgDexDetail) where the user can mark caught / shiny /
  // wanted alongside the full pokémon info. Inline mark-as buttons are
  // intentionally NOT on the row anymore — having them there caused the entire
  // checklist to re-render every tap, which scrolled the user back to the top.
  // Status indicators (caught pokéball, shiny star, wanted heart) are still
  // shown as small read-only badges on the row.
  var rows=[];
  var caughtCount=0;
  var visibleIds=[];           // IDs that pass the current filter+search — used by "Select all visible"
  var sel=S.progDexSel||{};
  // Whether ANY pokémon is currently selected. Used to flip the row tap
  // handler from "open detail" to "toggle select", so once you start
  // selecting, taps anywhere on the row continue the selection rather than
  // dropping you into a detail view.
  var anySelected=Object.keys(sel).length>0;
  for(var iIdx=0;iIdx<ids.length;iIdx++){
    var id=ids[iIdx];
    var entry=S.dexList[id-1];
    var name=entry?entry.name:''+id;
    var caught=prog.caught[id]||{n:false,s:false};
    if(caught.n)caughtCount++;
    if(q&&name.indexOf(q)<0&&(''+id).indexOf(q)<0)continue;
    if(f==='caught'&&!caught.n)continue;
    if(f==='missing'&&caught.n)continue;
    if(f==='shiny'&&!caught.s)continue;
    if(f==='wanted'&&prog.wanted.indexOf(''+id)<0)continue;
    visibleIds.push(id);
    var isWanted=prog.wanted.indexOf(''+id)>=0;
    var sprUrl=caught.s?'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/'+id+'.png':spr(id);
    var isSel=!!sel[id];
    // If any pokémon is currently selected, the whole list is in "select mode"
    // — tapping a row toggles its selection state instead of opening the
    // detail view. Tapping a checkbox always toggles selection (entering
    // select mode if nothing was selected yet). Once the user clears the
    // selection, taps go back to opening the detail view.
    var rowHandler=anySelected?'progDexToggleSel('+id+')':'progOpenDetail(\''+gameId+'\','+id+')';

    // Status badges — caught (pokéball), shiny ★, wanted ♥. The pokéball badge
    // is the source of truth for "this pokémon is registered as caught" — the
    // checkbox is now strictly for SELECTION, decoupled from caught state.
    var badges='';
    if(caught.n)badges+='<span class="prog-badge prog-badge-caught" aria-label="Caught"><svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true"><circle cx="12" cy="12" r="11" fill="#ED5340" stroke="#171717" stroke-width="1.5"/><path d="M1.5 12h21" stroke="#171717" stroke-width="1.5"/><circle cx="12" cy="12" r="3.4" fill="#F2EEEB" stroke="#171717" stroke-width="1.3"/><circle cx="12" cy="12" r="1.4" fill="#171717"/></svg></span>';
    if(caught.s)badges+='<span class="prog-badge prog-badge-shiny" aria-label="Shiny">'+shinyGlyphSvg(12)+'</span>';
    if(isWanted)badges+='<span class="prog-badge prog-badge-want" aria-label="Wanted">♥</span>';

    // Selection checkbox — toggles whether this row is in the bulk-action set.
    // Tapping it does NOT affect caught state on its own. Tapping it from a
    // not-yet-selected list also enters select mode (so the row's onclick
    // goes from "open detail" to "toggle select" until the selection clears).
    var checkSvg=isSel?'<svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M5 12 L10 17 L19 7" stroke="#fff" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':'';
    var checkboxHtml='<button class="prog-dex-check '+(isSel?'on':'')+'" onclick="event.stopPropagation();progDexToggleSel('+id+')" aria-label="'+(isSel?'Selected':'Select')+'">'+checkSvg+'</button>';

    if(mode==='grid'){
      var checkboxGridHtml='<button class="prog-dex-check prog-dex-check-grid '+(isSel?'on':'')+'" onclick="event.stopPropagation();progDexToggleSel('+id+')" aria-label="'+(isSel?'Selected':'Select')+'">'+checkSvg+'</button>';
      rows.push(
        '<div class="prog-dex-card '+(caught.n?'caught':'')+(isSel?' selected':'')+'" onclick="'+rowHandler+'">'+
          '<div class="prog-dex-card-thumbwrap">'+
            checkboxGridHtml+
            '<img src="'+sprUrl+'" alt="" class="prog-dex-card-thumb" loading="lazy" onerror="this.style.opacity=0.25"/>'+
            (badges?'<div class="prog-dex-card-badges">'+badges+'</div>':'')+
          '</div>'+
          '<div class="prog-dex-card-num">#'+(''+id).padStart(3,'0')+'</div>'+
          '<div class="prog-dex-card-name">'+cap(name.replace(/-/g,' '))+'</div>'+
        '</div>'
      );
    } else {
      rows.push(
        '<div class="prog-dex-row '+(caught.n?'caught':'')+(isSel?' selected':'')+'" onclick="'+rowHandler+'">'+
          checkboxHtml+
          '<img src="'+sprUrl+'" alt="" class="prog-dex-thumb" loading="lazy" onerror="this.style.opacity=0.25"/>'+
          '<div class="prog-dex-info">'+
            '<div class="prog-dex-num">#'+(''+id).padStart(3,'0')+'</div>'+
            '<div class="prog-dex-name">'+cap(name.replace(/-/g,' '))+'</div>'+
          '</div>'+
          (badges?'<div class="prog-dex-badges">'+badges+'</div>':'')+
          (anySelected?'':'<span class="prog-dex-arrow">›</span>')+
        '</div>'
      );
    }
  }
  var max=ids.length;
  var pct=max?Math.round(caughtCount/max*100):0;
  var filterPills=['all','caught','missing','shiny'].concat(support==='full'?['wanted']:[]).map(function(k){
    var l=k.charAt(0).toUpperCase()+k.slice(1);
    return '<button class="prog-filter '+(f===k?'on':'')+'" onclick="progDexFilter(\''+k+'\')">'+l+'</button>';
  }).join('');
  // Floating action pill — sits at bottom-center of the screen, only visible
  // when at least one pokémon is selected. The "Select all / Deselect all"
  // toggle stays inline (as a header control next to the filter pills) since
  // it's needed BEFORE there's a selection.
  // Action buttons offered when the user has selected something:
  //   - ✓ Caught     — toggle caught state for selection
  //   - ✦ Shiny      — toggle shiny-caught state for selection
  //   - ♥ Wanted     — toggle wanted state for selection (full-feature games only)
  // Tapping any action applies it to ALL selected and clears the selection.
  var totalSel=Object.keys(sel).length;
  var allVisibleSelected=visibleIds.length>0;
  for(var vk=0;vk<visibleIds.length;vk++)if(!sel[visibleIds[vk]]){allVisibleSelected=false;break;}
  var selectAllLabel=allVisibleSelected&&visibleIds.length>0?'Deselect all':'Select all';
  // Inline header control — just the select-all toggle and selection count.
  var bulkActions='<div class="prog-bulk">'+
    '<button class="prog-bulk-btn prog-bulk-secondary" onclick="progDexSelectAllToggle()">'+esc(selectAllLabel)+(visibleIds.length?' ('+visibleIds.length+')':'')+'</button>'+
    (totalSel?'<div class="prog-sel-count">'+totalSel+' selected</div>':'<div class="prog-sel-hint">Tap circles to select</div>')+
  '</div>';
  // Floating action bar — only rendered when there's a selection. Three pill
  // buttons inside a single rounded container, fixed near the bottom of the
  // viewport so the user doesn't have to scroll back up to commit changes.
  var floatingBar='';
  if(totalSel){
    floatingBar='<div class="prog-fab-bar" id="prog-fab-bar">'+
      '<button class="prog-fab-action prog-fab-caught" onclick="progDexApplyToSel(\'caught\')" aria-label="Mark selected as caught">'+
        '<svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="12" cy="12" r="11" fill="#ED5340" stroke="#fff" stroke-width="1.6"/><path d="M1.5 12h21" stroke="#fff" stroke-width="1.6"/><circle cx="12" cy="12" r="3.4" fill="#fff" stroke="#171717" stroke-width="1.3"/><circle cx="12" cy="12" r="1.4" fill="#171717"/></svg>'+
        '<span>Caught</span>'+
      '</button>'+
      '<button class="prog-fab-action prog-fab-shiny" onclick="progDexApplyToSel(\'shiny\')" aria-label="Mark selected as shiny">'+
        shinyGlyphSvg(18)+
        '<span>Shiny</span>'+
      '</button>'+
      (support==='full'?'<button class="prog-fab-action prog-fab-want" onclick="progDexApplyToSel(\'wanted\')" aria-label="Mark selected as wanted">'+
        '<span style="font-size:18px;line-height:1">♥</span>'+
        '<span>Wanted</span>'+
      '</button>':'')+
      '<div class="prog-fab-divider"></div>'+
      '<button class="prog-fab-action prog-fab-clear" onclick="progDexClearSel()" aria-label="Clear selection">'+
        '<span style="font-size:18px;line-height:1">✕</span>'+
      '</button>'+
    '</div>';
  }
  // View-mode toggle button — flips between list and grid like the regular Pokédex
  var viewBtn='<button class="icon-btn" onclick="progDexToggleView()" aria-label="Toggle view" style="font-size:15px">'+(mode==='grid'?'☰':'⊞')+'</button>';

  // The header strip (progress bar, search, filters, bulk-actions) used to be
  // pinned above the scroll container, but on a tall checklist that ate ~half
  // the screen and made it hard to actually see pokémon. We now render those
  // controls INSIDE the .scroll container so they scroll out of view when the
  // user starts browsing the list.
  var headerInner=
    '<div class="prog-summary">'+
      '<div class="prog-bar"><div class="prog-bar-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="prog-summary-text">'+caughtCount+' / '+max+' caught · '+pct+'%</div>'+
    '</div>'+
    '<div class="prog-search">'+
      '<input type="search" placeholder="Search by name or #" value="'+q.replace(/"/g,'&quot;')+'" oninput="progDexSearch(this.value)" />'+
    '</div>'+
    '<div class="prog-filters">'+filterPills+'</div>'+
    bulkActions;

  var listOrGridHtml = mode==='grid'
    ? '<div class="scroll" id="prog-dex-scroll" style="padding:0 0 16px">'+headerInner+'<div class="prog-dex-grid">'+(rows.length?rows.join(''):'<div class="empty" style="grid-column:1/-1">No pokémon match this filter.</div>')+'</div></div>'
    : '<div class="scroll" id="prog-dex-scroll" style="padding:0 8px 16px">'+headerInner+(rows.length?rows.join(''):'<div class="empty">No pokémon match this filter.</div>')+'</div>';

  return '<div class="screen">'+
    '<div class="topbar prog-topbar">'+
      '<button class="back-btn" onclick="progSetView(\'dashboard\')" aria-label="Back">‹</button>'+
      homeBtnHTML()+
      '<div class="topbar-title" style="text-align:left;flex:1;font-size:17px;margin-left:8px">Pokédex · '+g.sh+'</div>'+
      viewBtn+
    '</div>'+
    listOrGridHtml+
    floatingBar+
  '</div>';
}
// Search: re-render but preserve the user's typing focus + caret position.
// (Scroll position is not preserved here — searching SHOULD jump to the top of
// the filtered list since the visible set changes.)
function progDexSearch(v){
  S.progDexQ=v;
  pane('progress').innerHTML=renderProgress();
  setTimeout(function(){var el=document.querySelector('.prog-search input');if(el){el.focus();el.setSelectionRange(v.length,v.length);}},0);
}
// Filter change: same — re-render but don't preserve scroll (visible set changes).
function progDexFilter(f){S.progDexFilter=f;pane('progress').innerHTML=renderProgress();}
// View-mode toggle (list ↔ grid) — preserve scroll because the same items
// are visible, just laid out differently.
function progDexToggleView(){
  S.progDexViewMode=S.progDexViewMode==='grid'?'list':'grid';
  progRender();
}
// Toggle one row in/out of the bulk-action selection set. Selection is
// in-memory only (S.progDexSel) — it does not write to localStorage and does
// not affect caught state until the user taps "Mark as caught".
function progDexToggleSel(id){
  if(!S.progDexSel)S.progDexSel={};
  if(S.progDexSel[id])delete S.progDexSel[id];else S.progDexSel[id]=true;
  progRender();
}
// "Select all" / "Deselect all" toggle. If every currently-visible row is
// already in the selection, this clears them; otherwise it adds them all.
// Operates on visible rows only — items hidden by the filter aren't affected.
function progDexSelectAllToggle(){
  if(!S.progGame)return;
  var ids=regionalIdsForGame(S.progGame);
  var prog=progFor(S.progGame);
  var q=(S.progDexQ||'').toLowerCase().trim();
  var f=S.progDexFilter||'all';
  var visible=[];
  for(var i=0;i<ids.length;i++){
    var id=ids[i];
    var entry=S.dexList[id-1];
    var name=entry?entry.name:''+id;
    var c=prog.caught[id]||{n:false,s:false};
    if(q&&name.indexOf(q)<0&&(''+id).indexOf(q)<0)continue;
    if(f==='caught'&&!c.n)continue;
    if(f==='missing'&&c.n)continue;
    if(f==='shiny'&&!c.s)continue;
    if(f==='wanted'&&prog.wanted.indexOf(''+id)<0)continue;
    visible.push(id);
  }
  if(!visible.length)return;
  if(!S.progDexSel)S.progDexSel={};
  // Are all visible already selected? → clear (deselect-all on visible).
  // Otherwise → add all (select-all on visible).
  var allSelected=true;
  for(var v=0;v<visible.length;v++)if(!S.progDexSel[visible[v]]){allSelected=false;break;}
  if(allSelected){
    for(var w=0;w<visible.length;w++)delete S.progDexSel[visible[w]];
  } else {
    for(var x=0;x<visible.length;x++)S.progDexSel[visible[x]]=true;
  }
  progRender();
}
// Render the canonical "shiny" glyph as inline SVG. Two pinch sparkles in a
// diagonal cluster, gold-coloured — same shape used by the official games to
// indicate a shiny encounter. Reused on row badges, the detail-view shiny
// pill, and the floating action bar.
function shinyGlyphSvg(size,color){
  var c=color||'#FFB300';
  return '<svg viewBox="0 0 24 24" width="'+(size||14)+'" height="'+(size||14)+'" aria-hidden="true">'+
    // Big sparkle (top-right) — 4-point star
    '<path d="M16 2 L17.4 6.6 L22 8 L17.4 9.4 L16 14 L14.6 9.4 L10 8 L14.6 6.6 Z" fill="'+c+'"/>'+
    // Small sparkle (bottom-left) — 4-point star
    '<path d="M7 12 L7.9 14.6 L10.5 15.5 L7.9 16.4 L7 19 L6.1 16.4 L3.5 15.5 L6.1 14.6 Z" fill="'+c+'"/>'+
    // Tiny sparkle (mid-right) — small dot/diamond
    '<path d="M19 16 L19.6 17.4 L21 18 L19.6 18.6 L19 20 L18.4 18.6 L17 18 L18.4 17.4 Z" fill="'+c+'"/>'+
  '</svg>';
}
// Unified "apply selection" — kind is 'caught' | 'shiny' | 'wanted'.
// Applies the toggle to every selected pokémon in one batch save, then clears
// the selection. The semantics mirror the per-pokémon toggles in the detail
// view: this *toggles*, so re-selecting and applying again undoes the change.
//
// We compute a single target value for the whole batch based on the FIRST
// selected pokémon — i.e. if the first selected is currently caught, applying
// "caught" to all turns them ALL OFF; if the first is uncaught, it turns them
// ALL ON. This avoids the case where mixing on/off rows leaves the user
// unsure what happened.
function progDexApplyToSel(kind){
  if(!S.progGame)return;
  var sel=S.progDexSel||{};
  var keys=Object.keys(sel);
  if(!keys.length)return;
  var gameId=S.progGame;
  var prog=progFor(gameId);
  // Determine the action's direction based on the WHOLE selection, not the
  // first item. Behaviour the user expects:
  //   - "Mark caught" with mixed selection → catches the un-caught ones,
  //     leaves the already-caught ones alone (skipped, not flipped off).
  //   - "Mark caught" with all-already-caught selection → toggles them off,
  //     so the action is still reversible when the user selects only caught
  //     pokémon to undo a previous accidental mark.
  // Same logic for shiny and wanted.
  function isApplied(vid){
    if(kind==='caught')return !!(prog.caught[vid]&&prog.caught[vid].n);
    if(kind==='shiny') return !!(prog.caught[vid]&&prog.caught[vid].s);
    return prog.wanted.indexOf(vid)>=0;
  }
  var allApplied=keys.every(isApplied);
  var targetOn=!allApplied;   // if all already applied → turn off; otherwise turn on (and skip those already on)
  var anyChanged=false;
  for(var i=0;i<keys.length;i++){
    var vid=keys[i];
    var currently=isApplied(vid);
    if(targetOn){
      // Turning ON: skip rows that are already on. They stay caught/shiny/wanted
      // and the action behaves as "fill in the missing ones".
      if(currently)continue;
    } else {
      // Turning OFF: skip rows that are already off (no-ops).
      if(!currently)continue;
    }
    anyChanged=true;
    if(kind==='caught'){
      if(targetOn){
        if(!prog.caught[vid])prog.caught[vid]={n:false,s:false};
        prog.caught[vid].n=true;
        // Marking caught also clears any wanted entry — user has it now.
        var wIdx=prog.wanted.indexOf(vid);
        if(wIdx>=0)prog.wanted.splice(wIdx,1);
      } else {
        if(prog.caught[vid]){prog.caught[vid].n=false;
          if(!prog.caught[vid].n&&!prog.caught[vid].s)delete prog.caught[vid];}
      }
    } else if(kind==='shiny'){
      if(targetOn){
        if(!prog.caught[vid])prog.caught[vid]={n:false,s:false};
        prog.caught[vid].s=true;
        var wsIdx=prog.wanted.indexOf(vid);
        if(wsIdx>=0)prog.wanted.splice(wsIdx,1);
      } else {
        if(prog.caught[vid]){prog.caught[vid].s=false;
          if(!prog.caught[vid].n&&!prog.caught[vid].s)delete prog.caught[vid];}
      }
    } else { // wanted
      var widx=prog.wanted.indexOf(vid);
      if(targetOn){if(widx<0)prog.wanted.push(vid);}
      else {if(widx>=0)prog.wanted.splice(widx,1);}
    }
  }
  if(anyChanged){
    progSave();
    // Bulk action turning items ON counts as activity — promote the game to
    // In Progress just like the single-row toggles do.
    if(targetOn)progMarkInProgress(gameId);
  }
  S.progDexSel={};
  // Dex-completion check — only for catches that crossed the line
  if(kind==='caught'&&targetOn&&!prog.completedAt&&progDexCaughtCount(gameId)>=dexCountForGame(gameId)){
    prog.completedAt=Date.now();progSave();
    setTimeout(fireConfetti,200);
  }
  progRender();
}

// Open the in-progress detail view for a specific pokémon. Captures the
// checklist scroll position so the back button can restore it.
function progOpenDetail(gameId,id){
  var sc=document.getElementById('prog-dex-scroll');
  if(sc)S.progDexScrollY=sc.scrollTop;
  S.progDexDetId=id;
  S.progDexDet=null;S.progDexDetSp=null;S.progDexDetTab='info';S.progDexDetLoading=true;
  S.progView='detail';
  pane('progress').innerHTML=renderProgress();
  // Lazy-load PokéAPI details for this pokémon, then re-render the detail
  // (without disturbing the checklist's saved scroll).
  af(API+'/pokemon/'+id).then(function(d){
    if(S.progDexDetId!==id)return; // user navigated away
    S.progDexDet=d;
    return af(d.species.url);
  }).then(function(sp){
    if(S.progDexDetId!==id)return;
    S.progDexDetSp=sp;
    S.progDexDetLoading=false;
    if(S.tab==='progress'&&S.progView==='detail')pane('progress').innerHTML=renderProgress();
  }).catch(function(){
    S.progDexDetLoading=false;
    if(S.tab==='progress'&&S.progView==='detail')pane('progress').innerHTML=renderProgress();
  });
}

  var y=S.progDexScrollY||0;

// Detail view itself — lays out the same kind of pokémon information the
// regular Pokédex tab shows, but with progress controls (Caught / Shiny /
// Wanted toggle pills) replacing the Compare button on the topbar's right.
function renderProgDexDetail(gameId,id){
  var g=gameById(gameId);
  var prog=progFor(gameId);
  var support=progSupportLevel(gameId);
  var entry=S.dexList[id-1];
  var name=entry?entry.name:''+id;
  var caught=prog.caught[id]||{n:false,s:false};
  var isWanted=prog.wanted.indexOf(''+id)>=0;
  // Defensive: if the user had the (now-removed) Evos sub-tab active from a
  // previous session, fall back to Info so they don't see a blank body.
  if(S.progDexDetTab==='evos')S.progDexDetTab='info';
  var det=S.progDexDet;
  var sp=S.progDexDetSp;

  // Hero artwork — flips to shiny artwork if shiny is checked. Falls back to
  // sprite while the higher-quality artwork loads.
  var artUrl=caught.s?artSh(id):artN(id);

  // Type pills come from /pokemon/{id} (S.progDexDet.types). Use blank while loading.
  var typePillsHtml='';
  if(det&&det.types){
    typePillsHtml=det.types.map(function(t){return tpill(t.type.name);}).join(' ');
  }

  // Hero gradient based on first type, matching the regular dex detail aesthetic
  var firstType=(det&&det.types&&det.types[0])?det.types[0].type.name:null;
  var heroBg=firstType&&TC[firstType]?'linear-gradient(135deg,'+TC[firstType]+'aa,'+TC[firstType]+'66)':'var(--card2)';

  // Body sections
  var infoHtml='';
  if(S.progDexDetLoading){
    infoHtml='<div class="empty" style="padding:32px">Loading…</div>';
  } else if(det){
    if(S.progDexDetTab==='info'){
      // Abilities, height, weight, species, plus the flavor text from species
      var abil=det.abilities.map(function(a){
        return '<span class="ability-pill">'+cap(a.ability.name.replace(/-/g,' '))+(a.is_hidden?' <span class="hidden-ab">(Hidden)</span>':'')+'</span>';
      }).join(' ');
      var flavor='';
      if(sp&&sp.flavor_text_entries){
        var en=sp.flavor_text_entries.find(function(e){return e.language.name==='en';});
        if(en)flavor='<div class="flavor-text">'+esc(en.flavor_text.replace(/[\f\n\r]/g,' '))+'</div>';
      }
      infoHtml=
        flavor+
        card('Abilities', abil)+
        card('Profile',
          '<div class="info-grid">'+
            iitem('Height', (det.height/10)+' m')+
            iitem('Weight', (det.weight/10)+' kg')+
            iitem('Base XP', det.base_experience||'—')+
            iitem('Species', sp&&sp.genera?(sp.genera.find(function(x){return x.language.name==='en';})||{}).genus||'—':'—')+
          '</div>'
        );
    } else if(S.progDexDetTab==='stats'){
      var stats=det.stats.map(function(s){return sbar(s.stat.name,s.base_stat);}).join('');
      var total=det.stats.reduce(function(a,s){return a+s.base_stat;},0);
      infoHtml=card('Base Stats', stats+'<div class="stat-total">Total: '+total+'</div>');
    }
  }

  // Sub-tabs — Info and Stats. Evolutions / encounters live in the main
  // Pokédex; we surface a "View in Pokédex" link inside the Info card so the
  // user can jump there for the full entry.
  var tabs=['info','stats'].map(function(t){
    var l={info:'Info',stats:'Stats'}[t];
    return '<button class="dt-tab '+(S.progDexDetTab===t?'on':'')+'" onclick="progDetailSetTab(\''+t+'\')">'+l+'</button>';
  }).join('');

  // Three primary toggle pills — Caught (most prominent), Shiny, and Wanted
  // (Wanted only on full-feature games — gen 1-5).
  var togglesHtml=
    '<div class="prog-detail-toggles">'+
      '<button class="prog-detail-pill prog-detail-pill-caught '+(caught.n?'on':'')+'" onclick="progDetailToggleCaught()">'+
        (caught.n?'<svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" style="vertical-align:-3px;margin-right:4px"><circle cx="12" cy="12" r="11" fill="#ED5340" stroke="#fff" stroke-width="1.5"/><path d="M1.5 12h21" stroke="#fff" stroke-width="1.5"/><circle cx="12" cy="12" r="3.4" fill="#fff" stroke="#171717" stroke-width="1.3"/><circle cx="12" cy="12" r="1.4" fill="#171717"/></svg>Caught':'<span style="font-size:18px;margin-right:4px;vertical-align:-1px">○</span>Mark Caught')+
      '</button>'+
      '<button class="prog-detail-pill prog-detail-pill-shiny '+(caught.s?'on':'')+'" onclick="progDetailToggleShiny()">'+
        '<span style="display:inline-flex;align-items:center;gap:5px">'+shinyGlyphSvg(15,caught.s?'#fff':'#FFB300')+(caught.s?'Shiny':'Mark Shiny')+'</span>'+
      '</button>'+
      (support==='full'?'<button class="prog-detail-pill prog-detail-pill-want '+(isWanted?'on':'')+'" onclick="progDetailToggleWanted()">'+(isWanted?'♥ Wanted':'♡ Want')+'</button>':'')+
    '</div>';

  // Title shown in the topbar — display name (capitalised) + dex#
  var displayName=cap((entry?entry.name:''+id).replace(/-/g,' '));

  return '<div class="screen">'+
    '<div class="topbar prog-topbar">'+
      '<button class="back-btn" onclick="progCloseDetail()" aria-label="Back to checklist">‹</button>'+
      homeBtnHTML()+
      '<div class="topbar-title" style="text-align:left;flex:1;font-size:17px;margin-left:8px">'+
        displayName+' <span style="opacity:0.5;font-weight:600">#'+(''+id).padStart(3,'0')+'</span>'+
      '</div>'+
    '</div>'+
    '<div class="scroll" style="padding:0">'+
      // Hero
      '<div class="prog-detail-hero" style="background:'+heroBg+'">'+
        '<img src="'+artUrl+'" alt="" class="prog-detail-art" onerror="this.src=\''+spr(id)+'\'"/>'+
        '<div class="prog-detail-types">'+typePillsHtml+'</div>'+
        // Quick link to the full pokédex entry (evolutions, locations, full
        // moveset). Sits inside the hero so it's always visible without
        // hunting for a sub-tab.
        '<button class="prog-detail-view-link" onclick="progDetailGoToDex()" aria-label="View in Pokédex">'+
          '<svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true" style="vertical-align:-2px;margin-right:5px"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M2 12h6m8 0h6" stroke="currentColor" stroke-width="1.8"/></svg>'+
          'View in Pokédex'+
        '</button>'+
      '</div>'+
      // Toggles row directly below hero — primary action of this view
      togglesHtml+
      // Sub-tabs
      '<div class="dt-tabs">'+tabs+'</div>'+
      // Body
      '<div style="padding:0 12px 16px">'+infoHtml+'</div>'+
    '</div>'+
  '</div>';
}

// ── Bosses checklist ────────────────────────────────────────────────────────
function renderProgBosses(gameId){
  var g=gameById(gameId);
  var prog=progFor(gameId);
  var bosses=uniqueBossesForGame(gameId);
  var ROLE_ORDER={gym:0,kahuna:1,e4:2,champion:3};
  bosses=bosses.slice().sort(function(a,b){
    if(ROLE_ORDER[a.role]!==ROLE_ORDER[b.role])return ROLE_ORDER[a.role]-ROLE_ORDER[b.role];
    return (a.n||0)-(b.n||0);
  });
  var rows=bosses.map(function(b){
    var beaten=prog.beaten.indexOf(b.id)>=0;
    var typeColor=b.type&&TC[b.type]?TC[b.type]:'#666';
    var roleLabel=b.role==='gym'?('Gym '+b.n+(b.city?' · '+b.city:'')):
                  (b.role==='kahuna'?('Kahuna '+b.n):
                  (b.role==='e4'?('Elite Four #'+b.n):'Champion'));
    var typeBadge=b.type?'<span class="prog-boss-type" style="background:'+typeColor+'">'+b.type+'</span>':'';
    // Whole row is the tap target → opens the boss detail. The check toggle on
    // the left is its own button and stops propagation so tapping it doesn't
    // also open detail. The › is now decorative (no longer a button).
    return '<div class="prog-boss-row '+(beaten?'beaten':'')+'" onclick="openBossFromProg(\''+b.id+'\')">'+
        '<button class="prog-toggle prog-toggle-big '+(beaten?'on':'')+'" onclick="event.stopPropagation();progRowToggleBeaten(\''+gameId+'\',\''+b.id+'\')" aria-label="Beaten">'+
          (beaten?'✓':'')+
        '</button>'+
        '<div class="prog-boss-info">'+
          '<div class="prog-boss-name">'+b.name+'</div>'+
          '<div class="prog-boss-meta">'+roleLabel+typeBadge+'</div>'+
        '</div>'+
        '<span class="prog-boss-arrow" aria-hidden="true">›</span>'+
      '</div>';
  }).join('');
  return '<div class="screen">'+
    '<div class="topbar prog-topbar">'+
      '<button class="back-btn" onclick="progSetView(\'dashboard\')" aria-label="Back">‹</button>'+
      homeBtnHTML()+
      '<div class="topbar-title" style="text-align:left;flex:1;font-size:17px;margin-left:8px">Bosses · '+g.sh+'</div>'+
    '</div>'+
    '<div class="scroll" style="padding:0">'+
      (rows||'<div class="empty">No bosses for this game.</div>')+
    '</div>'+
  '</div>';
}

// ── Helper: PokéAPI ID from species name (used by What's-Next sprite preview) ─
function idFromName(name){
  var found=S.dexList.find(function(p){return p.name===name;});
  if(found)return gid(found.url);
  // Fall back to base form (e.g. "ninetales-alola" → "ninetales")
  var base=name.split('-')[0];
  var bf=S.dexList.find(function(p){return p.name===base;});
  return bf?gid(bf.url):0;
}

// ── Confetti / completion celebration ───────────────────────────────────────
function fireConfetti(){
  // Full-screen overlay with falling emoji particles + a centered congrats card.
  // Tap anywhere or wait 6s to auto-dismiss. Builds DOM directly (no innerHTML
  // because we don't want to clobber the Progress pane while the user is in it).
  var ov=document.createElement('div');
  ov.className='confetti-overlay';
  var EMOJIS=['🎉','🎊','⭐','✨','🎇','🌟','💫','🏆','🎈'];
  for(var i=0;i<80;i++){
    var p=document.createElement('div');
    p.className='confetti-particle';
    p.style.left=(Math.random()*100)+'%';
    p.style.animationDelay=(Math.random()*0.8)+'s';
    p.style.animationDuration=(2.2+Math.random()*1.8)+'s';
    p.textContent=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
    p.style.fontSize=(18+Math.random()*16)+'px';
    ov.appendChild(p);
  }
  var banner=document.createElement('div');
  banner.className='congrats-banner';
  banner.innerHTML='<div class="congrats-title">CONGRATS!</div>'+
    '<div class="congrats-sub">YOU\'VE COMPLETED THE POKÉDEX!</div>'+
    '<div class="congrats-tap">Tap to dismiss</div>';
  ov.appendChild(banner);
  function dismiss(){
    ov.classList.add('fade');
    setTimeout(function(){if(ov.parentNode)ov.parentNode.removeChild(ov);},500);
  }
  ov.onclick=dismiss;
  document.body.appendChild(ov);
  setTimeout(dismiss,6000);
}

function sprByName(name){
  // Best-effort sprite from PokéAPI sprites repo. Many forms exist; we use the basic name.
  // For form variants like "ninetales-alola", strip suffix to get the base ID via a name→id lookup.
  var found=S.dexList.find(function(p){return p.name===name;});
  if(found)return spr(gid(found.url));
  // Fallback: try the base name with form stripped
  var base=name.split('-')[0];
  var baseFound=S.dexList.find(function(p){return p.name===base;});
  if(baseFound)return spr(gid(baseFound.url));
  // Last fallback: a placeholder pokeball icon
  return 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png';
}

  if(/graveyard|cemetery/.test(n))return '⚰️';
  // default
  return '📍';
}
// Map game IDs to their canonical region name (PokéAPI region slug).
// Used by Locations tab to scope the region list when a game filter is active.
// Note: HGSS goes to Johto (it's a Johto remake). Legends: Arceus uses Hisui
// which is ancient Sinnoh, treated as a separate region by PokéAPI.
var GAME_TO_REGION={
  'red-blue':'kanto','yellow':'kanto','firered-leafgreen':'kanto','lets-go-pikachu-lets-go-eevee':'kanto',
  'gold-silver':'johto','crystal':'johto','heartgold-soulsilver':'johto',
  'ruby-sapphire':'hoenn','emerald':'hoenn','omega-ruby-alpha-sapphire':'hoenn',
  'diamond-pearl':'sinnoh','platinum':'sinnoh','brilliant-diamond-and-shining-pearl':'sinnoh',
  'legends-arceus':'hisui',
  'black-white':'unova','black-2-white-2':'unova',
  'x-y':'kalos',
  'sun-moon':'alola','ultra-sun-ultra-moon':'alola',
  'sword-shield':'galar',
  'scarlet-violet':'paldea'
};
function regionForGame(gameId){
  if(!gameId)return null;
  if(GAME_TO_REGION[gameId])return GAME_TO_REGION[gameId];
  // Fallback: use generation → region mapping for any game we missed above.
  var g=gameById(gameId);if(!g)return null;
  return ({1:'kanto',2:'johto',3:'hoenn',4:'sinnoh',5:'unova',6:'kalos',7:'alola',8:'galar',9:'paldea'})[g.gen]||null;
}

function renderLocs(){
  if(S.locView==='encs')return renderLocEncs();
  if(S.locView==='locs')return renderLocList();
  // When a game filter is active, narrow to that game's region only. This
  // keeps the locations browse experience focused on what's relevant to the
  // current filter scope. If no filter, show all regions.
  var regionsToShow=S.locRegions;
  var activeRegion=S.game?regionForGame(S.game):null;
  if(activeRegion){
    regionsToShow=S.locRegions.filter(function(r){return r.name===activeRegion;});
    // If the active game's region isn't in the loaded list (shouldn't happen
    // unless API returned partial data), fall back to all regions.
    if(!regionsToShow.length)regionsToShow=S.locRegions;
  }
  var items=regionsToShow.length===0?'<div class="empty">Loading regions…</div>':
    regionsToShow.map(function(r){var col=RCOL[r.name]||'#888';
      return '<div class="list-item" onclick="selReg(\''+r.name+'\',\''+r.url+'\')">'+
        '<div style="width:42px;height:42px;border-radius:12px;background:'+col+';display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🗾</div>'+
        '<span style="font-size:16px;font-weight:700;flex:1;text-transform:capitalize">'+cap(r.name)+'</span>'+
        '<span style="color:var(--tx3);font-size:18px">›</span></div>';
    }).join('');
  // Show a "filtered to X" pill when we've narrowed by game; lets the user
  // see WHY they're seeing only one region and dismiss the filter from here.
  var filterPill='';
  if(activeRegion&&regionsToShow.length<S.locRegions.length){
    filterPill='<div style="padding:8px 14px;display:flex;align-items:center;gap:8px;background:var(--card2);border-bottom:0.5px solid var(--border)"><span style="font-size:11px;color:var(--tx2);font-weight:600">Showing '+cap(activeRegion)+' only</span><button onclick="selectGame(null);pane(\'locs\').innerHTML=renderLocs()" style="margin-left:auto;background:transparent;border:none;color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;padding:4px 8px">Show all</button></div>';
  }
  return '<div class="screen"><div class="topbar">'+homeBtnHTML()+'<div class="topbar-title">Locations</div>'+themeBtnHTML()+'</div>'+filterPill+'<div class="scroll">'+items+'</div></div>';
}

}
function renderLocEncs(){
  var encs=S.locEncs;
  // Helper: resolve pokémon slug → national id via S.dexList. Used by the
  // curated path which doesn't have PokéAPI URLs to extract ids from.
  function nameToId(name){
    if(!S.dexList||!S.dexList.length)return 0;
    for(var i=0;i<S.dexList.length;i++)if(S.dexList[i].name===name)return i+1;
    return 0;
  }
  var body=S.locLoading?'<div class="empty">Loading…</div>':
    (!encs||encs.length===0)?'<div class="empty">No encounters here.</div>':
    encs.map(function(e,i){
      // Curated path: e._curated, e.pokemon._curatedRecords is array of {method, rarity, levels, weather, versions, subarea}
      if(e._curated){
        var name=e.pokemon.name;
        var pid=nameToId(name);
        var recs=e.pokemon._curatedRecords||[];
        // Show top-3 variant chips (method · rarity · levels). Many pokémon
        // have multiple rows for different methods (Walking + Surfing etc),
        // we surface the most distinct ones.
        var chips=recs.slice(0,3).map(function(r){
          var lv=r.levels?' Lv'+r.levels:'';
          var rar=r.rarity?(' · '+r.rarity):'';
          var meth=r.method||'';
          return '<span style="font-size:9px;padding:2px 6px;background:var(--card2);border-radius:6px;color:var(--tx2);font-weight:600">'+esc(meth)+rar+lv+'</span>';
        }).join('');
        return '<div onclick="openDexById('+pid+',\''+name+'\')" style="display:flex;align-items:center;gap:11px;padding:9px 14px;border-bottom:0.5px solid var(--border2);background:var(--card);cursor:pointer">'+
          (pid?'<img src="'+spr(pid)+'" width="44" height="44" style="image-rendering:pixelated;flex-shrink:0"/>':'<div style="width:44px;height:44px;flex-shrink:0"></div>')+
          '<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;color:var(--tx);text-transform:capitalize">'+cap(name)+'</div>'+
          '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">'+chips+'</div></div></div>';
      }
      // PokéAPI path
      var id=gid(e.pokemon.url);
      return '<div onclick="openDexById('+id+',\''+e.pokemon.name+'\')" style="display:flex;align-items:center;gap:11px;padding:9px 14px;border-bottom:0.5px solid var(--border2);background:var(--card);cursor:pointer">'+
        '<img src="'+spr(id)+'" width="44" height="44" style="image-rendering:pixelated;flex-shrink:0"/>'+
        '<div><div style="font-size:14px;font-weight:600;color:var(--tx);text-transform:capitalize">'+cap(e.pokemon.name)+'</div>'+
        '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">'+e.version_details.slice(0,3).map(function(v){
          var lv=v.encounter_details&&v.encounter_details[0]?' Lv'+v.encounter_details[0].min_level+'-'+v.encounter_details[0].max_level:'';
          return '<span style="font-size:9px;padding:2px 6px;background:var(--card2);border-radius:6px;color:var(--tx2);font-weight:600;text-transform:capitalize">'+cap(v.version.name)+lv+'</span>';
        }).join('')+'</div></div></div>';
    }).join('');
  return '<div class="screen"><div class="topbar"><button class="back-btn" onclick="locBack(\'locs\')">‹</button>'+homeBtnHTML()+'<div class="topbar-title" style="font-size:14px">'+cap(S.locLoc?S.locLoc.name:'')+'</div></div><div class="scroll">'+body+'</div></div>';
}
function selReg(name,url){
  S.locReg={name:name,url:url};S.locLocs=[];S.locView='locs';pane('locs').innerHTML=renderLocs();

  // Determine which game to use for curated data. If a game is filtered,
  // use that. Otherwise, infer from the region name (e.g. clicking Galar
  // in "All" mode should still show curated SwSh locations, not PokéAPI's
  // incomplete numeric entries).
  var curatedGame=S.game;
  if(!curatedGame){
    var regionToGame={'galar':'sword-shield','paldea':'scarlet-violet','hisui':'legends-arceus','unova':'black-2-white-2','kalos':'x-y'};
    var candidate=regionToGame[name];
    if(candidate && hasCuratedCatchData(candidate))curatedGame=candidate;
  }

  if(curatedGame && hasCuratedCatchData(curatedGame)){
    var curated=curatedLocationsForGame(curatedGame);
    if(curated && curated.length){
      S.locLocs=curated.map(function(l){return {name:l.name, url:'curated://'+curatedGame+'/'+l.slug};});
      pane('locs').innerHTML=renderLocs();
      return;
    }
  }
  af(url).then(function(d){S.locLocs=d.locations||[];pane('locs').innerHTML=renderLocs();});
}
function selLoc(name,url){
  S.locLoc={name:name,url:url};S.locEncs=null;S.locLoading=true;S.locView='encs';pane('locs').innerHTML=renderLocs();
  // Curated path — url like "curated://sword-shield/galar-route-5". Look up
  // encounters from our reverse index, normalize to PokéAPI-ish shape so the
  // existing renderLocEncs works without changes (or with minor tweaks).
  if(url.indexOf('curated://')===0){
    var rest=url.substring('curated://'.length);
    var slash=rest.indexOf('/');
    var gid=rest.substring(0,slash);
    var lslug=rest.substring(slash+1);
    var idx=curatedLocationIndex(gid)||{};
    var recs=idx[lslug]||[];
    // Group by pokémon so each species shows once with all its encounter
    // variants underneath. Each "variant" = a row with method/levels/rarity.
    var byPoke={};
    for(var i=0;i<recs.length;i++){
      var r=recs[i];
      if(!byPoke[r.pokemon])byPoke[r.pokemon]=[];
      byPoke[r.pokemon].push(r);
    }
    var encs=[];
    for(var p in byPoke){
      encs.push({pokemon:{name:p, _curatedRecords:byPoke[p]}, _curated:true});
    }
    S.locEncs=encs;S.locLoading=false;
    pane('locs').innerHTML=renderLocs();
    return;
  }
  // PokéAPI path (Gen 1-7 + games without curated data)
  af(url).then(function(d){var ar=d.areas||[];if(!ar.length){S.locEncs=[];S.locLoading=false;pane('locs').innerHTML=renderLocs();return;}return af(ar[0].url);})
  .then(function(ad){if(!ad)return;var es=ad.pokemon_encounters||[];
    // When a game filter is active, narrow encounters to ONLY entries from
    // that game's versions. PokéAPI's encounter records have version_details
    // keyed by version name (e.g. "sword","shield"); we filter and also
    // narrow each entry's version_details to just our matching versions.
    if(S.game){
      var versions=versionsForGame(S.game)||[];
      var vSet={};for(var vi=0;vi<versions.length;vi++)vSet[versions[vi]]=true;
      es=es.map(function(e){
        var matching=(e.version_details||[]).filter(function(v){return v.version&&vSet[v.version.name];});
        if(!matching.length)return null;
        return {pokemon:e.pokemon,version_details:matching};
      }).filter(Boolean);
    }
    S.locEncs=es;S.locLoading=false;pane('locs').innerHTML=renderLocs();})
  .catch(function(){S.locEncs=[];S.locLoading=false;pane('locs').innerHTML=renderLocs();});
}
function locBack(v){S.locView=v;pane('locs').innerHTML=renderLocs();}

function moveRowHTML(m){
  var c=mvDetCache[m.name];

    '<div class="mv-row-main">'+
      '<div class="mv-row-name">'+cap(m.name)+'</div>'+
      (desc?'<div class="mv-row-desc">'+desc+'</div>':'<div class="mv-row-desc">&nbsp;</div>')+
    '</div>'+
    '<div class="mv-stat-pill">'+
      '<div class="mv-stat-cell">'+power+'</div>'+
      '<div class="mv-stat-cell">'+acc+'</div>'+
    '</div>'+
    typeHTML+dcHTML+
  '</div>';
}
function enrichVisibleMoves(){
  // Fetch move details for visible page so rows populate with stats/type/cat
  var filt=S.mvList;
  if(S.mvQ.trim()){var q=S.mvQ.toLowerCase();filt=filt.filter(function(m){return m.name.indexOf(q)>=0;});}
  var paged=filt.slice(S.mvPage*PER(),(S.mvPage+1)*PER());
  paged.forEach(function(m){
    if(mvDetCache[m.name])return;
    af(m.url).then(function(d){
      var short='';
      if(d.effect_entries){
        var ee=d.effect_entries.filter(function(e){return e.language.name==='en';})[0];
        if(ee)short=(ee.short_effect||ee.effect||'').replace(/\$effect_chance/g,d.effect_chance||'');
      }
      if(!short&&d.flavor_text_entries){
        var fe=d.flavor_text_entries.filter(function(e){return e.language.name==='en';});
        if(fe.length)short=(fe[fe.length-1].flavor_text||'').replace(/[\f\n]/g,' ');
      }
      mvDetCache[m.name]={
        power:d.power,accuracy:d.accuracy,type:d.type.name,
        dmgClass:d.damage_class?d.damage_class.name:'status',
        short:short
      };
      var row=document.getElementById('mvr-'+m.name);
      if(row)row.outerHTML=moveRowHTML(m);
    }).catch(function(){});
  });
}
function renderMoves(){
  if(S.mvView==='detail')return renderMoveDetail();
  if(S.mvView==='learners')return renderMoveLearners();
  var filt=S.mvList;
  if(S.mvQ.trim()){var q=S.mvQ.toLowerCase();filt=filt.filter(function(m){return m.name.indexOf(q)>=0;});}
  // Apply type/category filters (only on moves that have cached data)
  if(S.mvFilterType||S.mvFilterCat){
    filt=filt.filter(function(m){
      var c=mvDetCache[m.name];
      if(!c)return false; // not yet enriched — hide until data loads
      if(S.mvFilterType&&c.type!==S.mvFilterType)return false;
      if(S.mvFilterCat&&c.dmgClass!==S.mvFilterCat)return false;
      return true;
    });
  }
  var maxPg=Math.max(0,Math.ceil(filt.length/PER())-1);
  if(S.mvPage>maxPg)S.mvPage=0;
  var paged=filt.slice(S.mvPage*PER(),(S.mvPage+1)*PER());
  var listHtml=S.mvList.length===0?'<div class="empty">Loading moves…</div>':paged.map(moveRowHTML).join('');
  var g=S.game?gameById(S.game):null;
  var pageInd=S.mvList.length?'<span class="pg-indicator" id="mv-page-ind">'+(S.mvPage+1)+'/'+(maxPg+1)+' · '+filt.length+'</span>':'';
  var hasMvFilter=!!(S.mvFilterType||S.mvFilterCat);
  return '<div class="screen">'+
    '<div class="topbar">'+
      homeBtnHTML()+
      '<div class="topbar-title" style="text-align:left;flex:0 0 auto">Moves</div>'+
      pageInd+
      '<div style="flex:1"></div>'+
      '<button class="icon-btn" onclick="showMoveFilterPanel()" title="Filter" style="padding:4px;position:relative">'+(hasMvFilter?'<span style="position:absolute;top:0;right:0;width:7px;height:7px;background:#5B8DEF;border-radius:50%"></span>':'')+'<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 4h16M5 10h10M8 16h4"/></svg></button>'+
      themeBtnHTML()+
      '<div onclick="openGamePicker()">'+gameBadge(g,34)+'</div>'+
    '</div>'+
    '<div class="search-wrap">'+searchInputHTML('mv-search',S.mvQ,'Search moves…','mvSearch','mvClear()')+'</div>'+
    '<div class="scroll" id="mv-scroll">'+listHtml+'</div>'+
    '<button id="mv-prev" class="pg-float prev"'+(S.mvPage===0?' disabled':'')+' onclick="mvPg(-1)" aria-label="Previous page">‹</button>'+
    '<button id="mv-next" class="pg-float next"'+(S.mvPage>=maxPg?' disabled':'')+' onclick="mvPg(1)" aria-label="Next page">›</button>'+
  '</div>';
}
function mvClear(){S.mvQ='';S.mvPage=0;pane('moves').innerHTML=renderMoves();enrichVisibleMoves();}
function mvSearch(v){
  S.mvQ=v;S.mvPage=0;
  var filt=S.mvList;if(v.trim()){var q=v.toLowerCase();filt=filt.filter(function(m){return m.name.indexOf(q)>=0;});}
  var maxPg=Math.max(0,Math.ceil(filt.length/PER())-1);
  var paged=filt.slice(0,PER());

  enrichVisibleMoves();
  updateSrchClear('mv-search',v,'mvClear()');
}
function mvPg(d){
  var filt=S.mvList;if(S.mvQ.trim()){var q=S.mvQ.toLowerCase();filt=filt.filter(function(m){return m.name.indexOf(q)>=0;});}
  S.mvPage=Math.max(0,Math.min(Math.max(0,Math.ceil(filt.length/PER())-1),S.mvPage+d));
  pane('moves').innerHTML=renderMoves();
  enrichVisibleMoves();
}
function loadMoves(){
  if(S.mvList.length){enrichVisibleMoves();return;}
  af(API+'/move?limit=1000&offset=0').then(function(d){S.mvList=d.results||[];pane('moves').innerHTML=renderMoves();enrichVisibleMoves();});
}

function showMovePopup(name){
  // Check cache first, otherwise fetch

  var renderPopup=function(data){
    var power=data.power!=null?data.power:'—';
    var acc=data.accuracy!=null?data.accuracy+'%':'—';
    var pp=data.pp!=null?data.pp:'—';
    var type=data.type||(data.type_name)||'normal';
    if(typeof type==='object'&&type.name)type=type.name;
    var cat=data.dmgClass||data.damage_class||(data.damage_class_name)||'status';
    if(typeof cat==='object'&&cat.name)cat=cat.name;
    var desc=data.short||data.effect||'';
    var flav=data.flav||'';
    var html='<div class="mv-popup-bd" onclick="if(event.target===this)closeMovePopup()">'+
      '<div class="mv-popup">'+

          '<div class="mv-popup-name">'+cap(name)+'</div>'+

        '</div>'+
        '<div style="display:flex;gap:6px;margin-bottom:8px">'+tpill(type)+
          '<span class="tpill" style="background:rgba(0,0,0,0.3)">'+cap(cat)+'</span></div>'+
        '<div class="mv-popup-stats">'+
          '<div class="mv-popup-stat"><div class="mv-popup-stat-val">'+power+'</div><div class="mv-popup-stat-label">Power</div></div>'+
          '<div class="mv-popup-stat"><div class="mv-popup-stat-val">'+acc+'</div><div class="mv-popup-stat-label">Accuracy</div></div>'+
          '<div class="mv-popup-stat"><div class="mv-popup-stat-val">'+pp+'</div><div class="mv-popup-stat-label">PP</div></div>'+
        '</div>'+
        (desc?'<div class="mv-popup-desc">'+esc(desc)+'</div>':'')+
        (flav&&flav!==desc?'<div class="mv-popup-desc" style="font-style:italic">'+esc(flav)+'</div>':'')+
      '</div></div>';
    document.body.insertAdjacentHTML('beforeend',html);
  };
  if(c){
    renderPopup(c);
    return;
  }
  // Fetch full move data
  af(API+'/move/'+name).then(function(d){
    var short='';
    if(d.effect_entries){var ee=d.effect_entries.filter(function(e){return e.language.name==='en';})[0];if(ee)short=(ee.short_effect||ee.effect||'').replace(/\$effect_chance/g,d.effect_chance||'');}
    var flav='';
    if(d.flavor_text_entries){var fe=d.flavor_text_entries.filter(function(e){return e.language.name==='en';});if(fe.length)flav=(fe[fe.length-1].flavor_text||'').replace(/[\f\n]/g,' ');}
    if(!short)short=flav;
    mvDetCache[name]={power:d.power,accuracy:d.accuracy,type:d.type.name,dmgClass:d.damage_class?d.damage_class.name:'status',short:short,pp:d.pp,flav:flav};
    renderPopup({power:d.power,accuracy:d.accuracy,type:d.type.name,dmgClass:d.damage_class?d.damage_class.name:'status',short:short,pp:d.pp,flav:flav});
  }).catch(function(){
    renderPopup({power:null,accuracy:null,type:'normal',dmgClass:'status',short:'Could not load move data.',pp:null});
  });
}

function loadMoveLearners(){
  var d=S.mvDet;if(!d)return;
  // Learners come from PokéAPI move.learned_by_pokemon
  // Filter by version-group if S.game is set (check if any of their moves in this move's data match)
  var learners=(d.learned_by_pokemon||[]).map(function(p){return {name:p.name,id:gid(p.url)};});
  // If game is filtered, we need to check pokemon move data — too expensive to do for all ~500 learners.
  // Instead: filter by generation of the game (gen >= game.gen and pokemon exists by that gen).
  if(S.game){
    var ids=regionalIdsForGame(S.game);
    if(ids&&ids.length){
      var idSet={};for(var ii=0;ii<ids.length;ii++)idSet[ids[ii]]=true;
      learners=learners.filter(function(p){return idSet[p.id];});
    }
  }
  learners.sort(function(a,b){return a.id-b.id;});
  S.mvLearners=learners;S.mvLoadingLearners=false;
  (S.tab==='tms'?pane('tms'):pane('moves')).innerHTML=S.tab==='tms'?renderTMs():renderMoves();
}

// ── TMs / HMs ──
function loadTMs(){
  if(!S.game)return; // Require a game
  if(S.tmLoaded||S.tmLoading)return;
  S.tmLoading=true;
  var g=gameById(S.game);
  if(!g){S.tmLoading=false;return;}

  af(API+'/item-category/37').then(function(d){
    var itemRefs=d.items||[];
    // Fetch all machine items in parallel (item-category/37 = all-machines, ~200 items)
    return Promise.all(itemRefs.map(function(ref){
      return af(ref.url).then(function(d){return d;},function(){return null;});
    }));
  }).then(function(fulls){
    var tms=[];
    fulls.forEach(function(it){
      if(!it||!it.machines)return;
      var mach=it.machines.filter(function(m){return m.version_group.name===g.id;})[0];
      if(!mach)return;
      tms.push({
        itemName:it.name,
        sprite:it.sprites&&it.sprites.default,
        machineUrl:mach.machine.url
      });
    });
    // Fetch machine details in parallel for move name
    return Promise.all(tms.map(function(t){
      return af(t.machineUrl).then(function(m){
        if(m&&m.move){t.moveName=m.move.name;t.moveUrl=m.move.url;}
        return t;
      },function(){return t;});
    }));
  }).then(function(tms){
    // Keep only successfully resolved TMs
    tms=tms.filter(function(t){return t.moveName;});
    tms.sort(function(a,b){return a.itemName.localeCompare(b.itemName,undefined,{numeric:true});});
    S.tmList=tms;
    S.tmLoaded=true;S.tmLoading=false;
    if(S.tab==='tms'&&S.tmView==='list')pane('tms').innerHTML=renderTMs();
    enrichVisibleTMs();
  }).catch(function(e){
    console.error('TM load error:',e);
    S.tmList=[];S.tmLoaded=true;S.tmLoading=false;
    if(S.tab==='tms')pane('tms').innerHTML=renderTMs();
  });
}
function renderTMs(){
  if(S.tmView==='detail')return renderTMDetail();
  if(S.tmView==='learners')return renderMoveLearners();

  // Require game selection
  if(!S.game){
    return '<div class="screen">'+
      '<div class="topbar">'+
        homeBtnHTML()+
        '<div class="topbar-title">TM &amp; HM</div>'+
        themeBtnHTML()+

      '</div>'+
      '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;gap:12px">'+
        '<div style="font-size:54px">💿</div>'+

        '<div style="font-size:13px;color:var(--tx3);line-height:1.55;max-width:280px">TM &amp; HM lists are different for each game. Choose a game version to see its machines.</div>'+
        '<button onclick="openGamePicker()" style="margin-top:10px;padding:13px 26px;background:#3A8AD6;border:none;border-radius:14px;color:#fff;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(58,138,214,0.45)">Choose Game</button>'+
      '</div></div>';
  }

  var g=gameById(S.game);

  // Loading state
  if(S.tmLoading||!S.tmLoaded){
    return '<div class="screen">'+
      '<div class="topbar">'+
        '<div class="topbar-title">'+(g?g.sh:'TM/HM')+'</div>'+
        themeBtnHTML()+
        '<div onclick="openGamePicker()">'+gameBadge(g,34)+'</div>'+
      '</div>'+
      '<div class="empty">Loading TMs &amp; HMs for '+(g?g.sh:'game')+'…</div></div>';
  }

  // No machines for this game
  if(!S.tmList.length){
    return '<div class="screen">'+
      '<div class="topbar">'+
        '<div class="topbar-title">'+(g?g.sh:'TM/HM')+'</div>'+
        themeBtnHTML()+
        '<div onclick="openGamePicker()">'+gameBadge(g,34)+'</div>'+
      '</div>'+
      '<div class="empty">No TMs or HMs found for '+(g?g.n:'this game')+'.</div></div>';
  }

  // Split HM and TM
  var hms=S.tmList.filter(function(t){return t.itemName.indexOf('hm')===0;});
  var tms=S.tmList.filter(function(t){return t.itemName.indexOf('tm')===0;});
  function tmRow(t){
    if(!t.moveName)return '';
    var c=mvDetCache[t.moveName];
    var power=c?(c.power!=null?String(c.power):'-'):'-';
    var acc=c?(c.accuracy!=null?String(c.accuracy):'-'):'-';
    var desc=c?esc(c.short||''):'';
    var typeHTML=c?tcIcon(c.type):'<div class="mv-ph"></div>';
    var dcHTML=c?dcIcon(c.dmgClass):'<div class="mv-ph"></div>';
    var labelPrefix=t.itemName.slice(0,2).toUpperCase();
    var labelNum=t.itemName.slice(2);
    return '<div class="mv-row" id="tmr-'+t.itemName+'" onclick="openTMByItem(\''+t.itemName+'\')">'+
      '<div class="mv-no"><b>'+labelPrefix+'</b>'+labelNum+'</div>'+
      '<div class="mv-row-main">'+
        '<div class="mv-row-name">'+cap(t.moveName)+'</div>'+
        (desc?'<div class="mv-row-desc">'+desc+'</div>':'<div class="mv-row-desc">&nbsp;</div>')+
      '</div>'+
      '<div class="mv-stat-pill">'+
        '<div class="mv-stat-cell">'+power+'</div>'+
        '<div class="mv-stat-cell">'+acc+'</div>'+
      '</div>'+
      typeHTML+dcHTML+
    '</div>';
  }
  var html='';
  if(hms.length){html+='<div class="section-label">HM</div>'+hms.map(tmRow).join('');}
  if(tms.length){html+='<div class="section-label">TM</div>'+tms.map(tmRow).join('');}
  return '<div class="screen">'+
    '<div class="topbar">'+
      '<div class="topbar-title">'+(g?g.sh:'TM/HM')+'</div>'+
      themeBtnHTML()+
      '<div onclick="openGamePicker()">'+gameBadge(g,34)+'</div>'+
    '</div>'+
    '<div class="scroll">'+html+'</div></div>';
}
function enrichVisibleTMs(){
  // Fetch details for all TM/HM moves
  S.tmList.forEach(function(t){
    if(!t.moveName||mvDetCache[t.moveName])return;
    af(API+'/move/'+t.moveName).then(function(d){
      var short='';
      if(d.effect_entries){
        var ee=d.effect_entries.filter(function(e){return e.language.name==='en';})[0];
        if(ee)short=(ee.short_effect||ee.effect||'').replace(/\$effect_chance/g,d.effect_chance||'');
      }
      if(!short&&d.flavor_text_entries){
        var fe=d.flavor_text_entries.filter(function(e){return e.language.name==='en';});
        if(fe.length)short=(fe[fe.length-1].flavor_text||'').replace(/[\f\n]/g,' ');
      }
      mvDetCache[t.moveName]={
        power:d.power,accuracy:d.accuracy,type:d.type.name,
        dmgClass:d.damage_class?d.damage_class.name:'status',
        short:short
      };
      if(S.tab==='tms'&&S.tmView==='list'){
        var row=document.getElementById('tmr-'+t.itemName);
        if(row){
          // Rebuild the row inline
          pane('tms').innerHTML=renderTMs();
        }
      }
    }).catch(function(){});
  });
}

  if(sc)sc.innerHTML=paged.map(function(it){return '<div class="list-item" onclick="openItem(\''+it.name+'\',\''+it.url+'\')">'+
    '<div style="width:34px;height:34px;background:linear-gradient(135deg,#FF9F0A,#FFCA50);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">🎒</div>'+
    '<span style="flex:1;font-size:14px;font-weight:600;text-transform:capitalize">'+cap(it.name)+'</span>'+
    '<span style="color:var(--tx3);font-size:18px">›</span></div>';}).join('');
  var prev=document.getElementById('item-prev');
  var next=document.getElementById('item-next');
  if(prev)prev.disabled=true;
  if(next)next.disabled=(maxPg===0);
  var pgInd=document.getElementById('item-page-ind');
  if(pgInd)pgInd.textContent='1/'+(maxPg+1)+' · '+filt.length;
  updateSrchClear('item-search',v,'itemClear()');
}
function itemPg(d){var f=S.itemList;if(S.itemQ.trim()){var q=S.itemQ.toLowerCase();f=f.filter(function(i){return i.name.indexOf(q)>=0;});}S.itemPage=Math.max(0,Math.min(Math.max(0,Math.ceil(f.length/PER())-1),S.itemPage+d));pane('items').innerHTML=renderItems();}
function openItem(name,url){S.itemSelName=name;S.itemDet=null;S.itemView='detail';pane('items').innerHTML=renderItems();af(url).then(function(d){S.itemDet=d;pane('items').innerHTML=renderItems();});}
function renderItemDet(){
  var det=S.itemDet;
  if(!det)return '<div class="screen"><div class="topbar"><button class="back-btn" onclick="closeItem()">‹</button>'+homeBtnHTML()+'<div class="topbar-title">'+esc(cap(S.itemSelName||''))+'</div></div><div class="empty">Loading…</div></div>';
  var desc='';
  if(det.effect_entries){var ee=det.effect_entries.filter(function(e){return e.language.name==='en';})[0];if(ee)desc=ee.short_effect||ee.effect||'';}
  if(!desc&&det.flavor_text_entries){var fe2=det.flavor_text_entries.filter(function(e){return e.language.name==='en';})[0];if(fe2)desc=fe2.text||'';}
  desc=desc||'No description.';
  return '<div class="screen"><div class="topbar"><button class="back-btn" onclick="closeItem()">‹</button>'+homeBtnHTML()+'<div class="topbar-title">'+esc(cap(det.name))+'</div></div>'+
    '<div class="scroll" style="padding:14px 14px 100px 14px">'+
      '<div style="display:flex;align-items:center;gap:14px;margin-bottom:13px;background:var(--card);border-radius:16px;padding:14px;border:0.5px solid var(--border)">'+
        (det.sprites&&det.sprites.default?'<img src="'+det.sprites.default+'" width="56" height="56" style="image-rendering:pixelated;flex-shrink:0"/>':'<div style="width:56px;height:56px;background:linear-gradient(135deg,#FF9F0A,#FFCA50);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px">🎒</div>')+
        '<div><div style="font-size:10px;color:var(--tx3);text-transform:uppercase;font-weight:700;margin-bottom:2px">'+esc(cap(det.category&&det.category.name?det.category.name:''))+'</div>'+
        '<div style="font-size:19px;font-weight:800;text-transform:capitalize">'+esc(cap(det.name))+'</div></div></div>'+
      card('Effect','<p style="font-size:13px;color:var(--tx2);line-height:1.7">'+esc(desc)+'</p>')+
      card('Details','<div class="info-grid">'+[iitem('Cost',det.cost>0?String(det.cost.toLocaleString())+' P':'N/A'),iitem('Category',cap(det.category&&det.category.name?det.category.name:'')),iitem('Fling Power',det.fling_power||'—'),iitem('Attributes',(det.attributes||[]).map(function(a){return cap(a.name);}).join(', ')||'—')].join('')+'</div>')+
    '</div></div>';
}
function closeItem(){S.itemView='list';pane('items').innerHTML=renderItems();}

// ── INIT ──
window.onerror=function(msg,src,line,col,err){document.body.innerHTML='<div style="background:#fff;padding:20px;font-family:monospace;font-size:12px;color:red;white-space:pre-wrap;overflow:auto">ERR: '+msg+'\nL'+line+':'+col+'\n'+(err&&err.stack?err.stack:'')+'</div>';return true;};
function retryBootFetch(){
  // Used by the offline error screen — drops the failed entry and re-runs boot.
  delete cache[API+'/pokemon?limit=1500&offset=0'];
  init();
}

function init(){
  loadPrefs();
  applyTheme();
  // Kick the image-cache observer FIRST so every subsequent innerHTML
  // assignment in init gets walked and image URLs swapped to blob: where
  // the IDB cache has them.
  kickImageCacheObserver();
  // Load the curated catch-data manifest (small, fast). Per-game JSONs are
  // fetched lazily once the user filters by that game or opens a pokémon
  // detail with that game active.
  loadCatchManifest();
  setupFloatHideListener();
  // Activate transition gating after first paint. Without body.js-ready, the
  // .bnav-wrap and pokéball-FAB transitions are inert — which is what we
  // want during initial rendering so the nav doesn't animate from default to
  // hidden on launch (looking like a phantom "close" animation). Two rAFs
  // ensure all initial CSS has been applied before transitions activate.
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      document.body.classList.add('js-ready');
    });
  });
  document.body.setAttribute('data-active-tab',S.tab);
  var tc=document.getElementById('tab-content');
  tc.innerHTML=TABS.map(function(t){return '<div class="tab-pane'+(t.id===S.tab?' act':'')+'" data-tab="'+t.id+'"></div>';}).join('');
  renderNav();
  pane('home').innerHTML=renderHome();
  pane('dex').innerHTML=renderDexList();
  pane('types').innerHTML=renderTypes();
  pane('locs').innerHTML=renderLocs();
  pane('moves').innerHTML=renderMoves();
  pane('tms').innerHTML=renderTMs();
  pane('items').innerHTML=renderItems();
  pane('bosses').innerHTML=renderBosses();
  af(API+'/pokemon?limit=1500&offset=0').then(function(d){
    var all=d.results||[];
    S.dexList=[];S.dexVariants=[];
    all.forEach(function(p){
      var id=gid(p.url);
      if(id<=1025)S.dexList.push(p);
      else S.dexVariants.push(p);
    });
    if(S.dexView==='list')pane('dex').innerHTML=renderDexList();setTimeout(bindAllFloatHide,0);}).catch(function(e){
    // List fetch failed (offline + not cached). Build a fallback list from
    // IDs 1-1025 so the dex is browsable offline. Names will be filled in
    // lazily from individual cached /pokemon/{id} records.
    console.warn('Dex list fetch failed, building fallback list');
    S.dexList=[];
    for(var i=1;i<=1025;i++){
      S.dexList.push({name:'pokemon-'+i,url:API+'/pokemon/'+i});
    }
    // Try to populate names from cached individual pokemon records
    var nameFixups=[];
    for(var j=1;j<=1025;j++){
      (function(id){
        nameFixups.push(idbGet(IDB_STORE_KV,API+'/pokemon/'+id).then(function(txt){
          if(!txt)return;
          try{var p=JSON.parse(txt);S.dexList[id-1].name=p.name;}catch(e){}
        }).catch(function(){}));
      })(j);
    }
    Promise.all(nameFixups).then(function(){
      if(S.dexView==='list')pane('dex').innerHTML=renderDexList();
    });
    if(S.dexView==='list')pane('dex').innerHTML=renderDexList();
  });
  setTimeout(bindAllFloatHide,0);
  af(API+'/region?limit=20').then(function(d){S.locRegions=d.results||[];pane('locs').innerHTML=renderLocs();});
  af(API+'/item?limit=500&offset=0').then(function(d){S.itemList=d.results||[];pane('items').innerHTML=renderItems();});
}
init();
</script>
