.prog-dex-card-badges .prog-badge{width:14px;height:14px;font-size:9px}
.prog-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:11px;line-height:1;flex-shrink:0}
.prog-badge-caught{background:transparent}
.prog-badge-shiny{background:rgba(255,179,0,0.18);color:#FFB300;font-weight:900}
.prog-badge-want{background:rgba(229,72,77,0.16);color:#E5484D;font-weight:900;font-size:10px}

/* Grid view — compact card per pokémon, 5 columns on mobile, tap to open detail. */
.prog-dex-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:4px}
.prog-dex-card{background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:5px 3px 7px;text-align:center;cursor:pointer;transition:transform .12s,background .15s;position:relative;overflow:hidden}
.prog-dex-card:active{transform:scale(0.97);background:var(--card2)}
.prog-dex-card.caught{background:linear-gradient(180deg,rgba(34,197,94,0.06),transparent)}
.prog-dex-card-thumbwrap{position:relative;width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.prog-dex-card-thumb{width:88%;height:88%;object-fit:contain;image-rendering:pixelated}
.prog-dex-card-badges{position:absolute;top:0;right:0;flex-direction:row}
.prog-dex-card-num{font-size:8px;color:var(--tx3);font-weight:700;letter-spacing:0.04em}
.prog-dex-card-name{font-size:10px;font-weight:700;color:var(--tx);line-height:1.15;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 2px}

/* Detail view — pokémon hero, type pills, sub-tabs, toggle pills row */
.prog-detail-hero{padding:18px 20px 14px;text-align:center;border-bottom:0.5px solid var(--border2)}
.prog-detail-art{width:160px;height:160px;object-fit:contain;display:block;margin:0 auto 8px;filter:drop-shadow(0 6px 14px rgba(0,0,0,0.25))}
.prog-detail-types{display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
/* "View in Pokédex" pill — sits in the hero, links out to the regular dex
   detail for full evolution chain / encounters. Translucent so it sits over
   the type-coloured hero gradient without clashing. */
.prog-detail-view-link{display:inline-flex;align-items:center;justify-content:center;margin-top:10px;padding:6px 14px;border-radius:99px;border:1px solid rgba(255,255,255,0.4);background:rgba(0,0,0,0.25);color:#fff;font-size:11px;font-weight:700;letter-spacing:0.04em;cursor:pointer;font-family:inherit;transition:background .15s,transform .12s}
.prog-detail-view-link:active{transform:scale(0.96);background:rgba(0,0,0,0.4)}
.prog-detail-toggles{display:flex;gap:8px;padding:12px;flex-wrap:wrap;background:var(--card);border-bottom:0.5px solid var(--border2)}
.prog-detail-pill{flex:1 1 0;min-width:90px;padding:11px 14px;border-radius:12px;border:0.5px solid var(--border);background:var(--card2);color:var(--tx);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;letter-spacing:0.01em}
.prog-detail-pill:active{transform:scale(0.97)}
.prog-detail-pill-caught.on{background:#22C55E;border-color:#16A34A;color:#fff}
.prog-detail-pill-shiny.on{background:#FFB300;border-color:#D69500;color:#fff}
.prog-detail-pill-want.on{background:#E5484D;border-color:#C23036;color:#fff}

/* Sub-tabs inside the detail view (Info / Stats / Evos) */
.dt-tabs{display:flex;gap:8px;padding:10px 12px;border-bottom:0.5px solid var(--border2);background:var(--bg)}
.dt-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--tx2);font-size:13px;font-weight:700;cursor:pointer;border-radius:8px;transition:background .15s}
.dt-tab.on{background:var(--card);color:var(--tx);box-shadow:inset 0 0 0 0.5px var(--border)}

/* Detail-view typography helpers used inside the cards */
.flavor-text{padding:12px 14px;font-size:13px;line-height:1.5;color:var(--tx2);font-style:italic;background:var(--card);border-radius:12px;margin:12px 0;border:0.5px solid var(--border)}
.ability-pill{display:inline-block;padding:4px 10px;background:var(--card2);border-radius:8px;font-size:12px;font-weight:600;margin:2px 4px 2px 0;color:var(--tx)}
.hidden-ab{font-size:10px;color:var(--tx3);font-weight:600}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-grid .info-k{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:0.06em;font-weight:700}
.info-grid .info-v{font-size:13px;color:var(--tx);font-weight:600;margin-top:2px}
.stat-total{margin-top:8px;font-size:12px;font-weight:700;color:var(--tx2);text-align:right}
.link-btn{display:inline-block;margin-top:8px;padding:8px 14px;background:#6366F1;color:#fff;border:none;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer}

/* Toggle buttons (caught/shiny/wanted) */
.prog-toggle{width:36px;height:36px;border-radius:50%;border:0.5px solid var(--border);background:var(--card);color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;padding:0;transition:all .15s}
.prog-toggle:active{transform:scale(0.9)}
.prog-toggle-empty{font-size:22px;line-height:1;color:var(--tx3)}
.prog-toggle.on{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.5)}
.prog-toggle-shiny.on{background:rgba(255,179,0,0.18);border-color:rgba(255,179,0,0.6);color:#FFB300}
.prog-toggle-want{color:#E5484D}
.prog-toggle-want.on{background:rgba(229,72,77,0.15);border-color:rgba(229,72,77,0.5)}
.prog-toggle-big{width:42px;height:42px;font-size:18px;font-weight:900}

/* Boss-tracker rows */
.prog-boss-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:0.5px solid var(--border2);transition:background .12s,opacity .2s;cursor:pointer}
.prog-boss-row:active{background:var(--card2)}
.prog-boss-row.beaten{opacity:0.6}
.prog-boss-row.beaten .prog-boss-name{text-decoration:line-through}
.prog-boss-info{flex:1;min-width:0}
.prog-boss-name{font-size:15px;font-weight:700;color:var(--tx)}
.prog-boss-meta{font-size:11px;color:var(--tx2);margin-top:2px;display:flex;align-items:center;gap:6px}
.prog-boss-type{display:inline-block;padding:1px 7px;border-radius:99px;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em}
.prog-boss-arrow{color:var(--tx3);font-size:22px;font-weight:300;flex-shrink:0;margin:0 4px}

/* Wanted list */
.prog-wanted-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid var(--border2)}
.prog-unwant{padding:6px 12px;border-radius:99px;border:0.5px solid rgba(229,72,77,0.5);background:rgba(229,72,77,0.08);color:#E5484D;font-size:11px;font-weight:700;cursor:pointer}
.prog-unwant:active{transform:scale(0.95)}

/* Confetti overlay (full-screen on completion) */
.confetti-overlay{position:fixed;inset:0;z-index:1000;pointer-events:auto;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;opacity:1;transition:opacity .5s;overflow:hidden}
.confetti-overlay.fade{opacity:0}
.confetti-particle{position:absolute;top:-30px;animation:confetti-fall linear forwards;pointer-events:none}
@keyframes confetti-fall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0.85}
}
.congrats-banner{background:linear-gradient(135deg,#FFD700 0%,#FFA500 100%);color:#fff;padding:24px 36px;border-radius:18px;text-align:center;animation:congrats-pop .6s cubic-bezier(.34,1.56,.64,1) backwards;box-shadow:0 12px 40px rgba(0,0,0,0.5),0 0 60px rgba(255,200,0,0.5);text-shadow:0 2px 4px rgba(0,0,0,0.3);position:relative;z-index:2;border:3px solid rgba(255,255,255,0.6)}
/* Champion variant — blue/indigo palette so the celebration reads differently
   from the gold dex finale. Smaller padding to match the smaller-scale spec. */
.congrats-banner-champ{background:linear-gradient(135deg,#6366F1 0%,#3730A3 50%,#1E1B4B 100%);box-shadow:0 10px 32px rgba(0,0,0,0.5),0 0 50px rgba(99,102,241,0.5);padding:20px 30px;border-color:rgba(255,255,255,0.7)}
.congrats-banner-champ .congrats-title{font-size:30px}
.congrats-banner-champ .congrats-sub{font-size:13px}
.congrats-title{font-size:34px;font-weight:900;letter-spacing:0.06em;line-height:1}
.congrats-sub{font-size:15px;font-weight:800;margin-top:6px;letter-spacing:0.03em}
.congrats-tap{font-size:11px;opacity:0.85;margin-top:14px;font-weight:600;letter-spacing:0.05em}
@keyframes congrats-pop{0%{transform:scale(0.4) rotate(-10deg);opacity:0}60%{transform:scale(1.08) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}

  progDexDetTab:'info',      // 'info' | 'stats' | 'evos' — sub-tab inside the detail view
  progDexDetLoading:false,
  regDexCache:{},            // gameId → [nationalDexIds...] for that game's regional dex (PokéAPI-sourced)
  regDexFetching:{},         // gameId → bool, in-flight fetch guard so we don't double-request
  
  // modal
  modal:null // 'game-picker' | null

var cache={};
var mvDetCache={}; // move name → {power, accuracy, type, dmgClass, short}

// ────────────────────────────────────────────────────────────────────────────
// Offline cache layer (IndexedDB)
//
// Two object stores:
//   - kv     : JSON responses keyed by URL (stored as plain text strings).
//              Used by af() to serve cached PokéAPI replies. Survives app
//              restart and works fully offline.
//   - blobs  : Image blobs keyed by URL. Sprites + artwork from PokéAPI's
//              GitHub mirror are cached as binary blobs and re-served as
//              blob: URLs so <img src> can render them offline.
//
// All paths fail gracefully — if the DB isn't available (private mode, quota
// exceeded, etc.) the network calls just go through normally.
// ────────────────────────────────────────────────────────────────────────────
var IDB_DB_NAME='pokeguide-cache';
var IDB_VERSION=1;
var IDB_STORE_KV='kv';
var IDB_STORE_BLOBS='blobs';
var idbReady=null;
function idbOpen(){
  if(idbReady)return idbReady;
  idbReady=new Promise(function(resolve,reject){
    if(!window.indexedDB){reject(new Error('No IndexedDB'));return;}
    var req=indexedDB.open(IDB_DB_NAME,IDB_VERSION);
    req.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains(IDB_STORE_KV))db.createObjectStore(IDB_STORE_KV);
      if(!db.objectStoreNames.contains(IDB_STORE_BLOBS))db.createObjectStore(IDB_STORE_BLOBS);
    };
    req.onsuccess=function(e){resolve(e.target.result);};
    req.onerror=function(e){idbReady=null;reject(e.target.error);};
  });
  return idbReady;
}
function idbGet(store,key){
  return idbOpen().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction(store,'readonly');
      var req=tx.objectStore(store).get(key);
      req.onsuccess=function(){resolve(req.result);};
      req.onerror=function(){reject(req.error);};
    });
  });
}
function idbPut(store,key,value){
  return idbOpen().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction(store,'readwrite');
      var req=tx.objectStore(store).put(value,key);
      req.onsuccess=function(){resolve();};
      req.onerror=function(){reject(req.error);};
    });
  });
}
function idbCount(store){
  return idbOpen().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction(store,'readonly');
      var req=tx.objectStore(store).count();
      req.onsuccess=function(){resolve(req.result);};
      req.onerror=function(){reject(req.error);};
    });
  });
}
function idbEstimateSize(){
  // Returns an estimated total bytes used by both stores. We sum value sizes
  // (string length × 2 for kv approximating UTF-16, blob.size for blobs).
  return idbOpen().then(function(db){
    return new Promise(function(resolve){
      var total=0;
      var tx=db.transaction([IDB_STORE_KV,IDB_STORE_BLOBS],'readonly');
      tx.objectStore(IDB_STORE_KV).openCursor().onsuccess=function(e){
        var c=e.target.result;
        if(c){if(typeof c.value==='string')total+=c.value.length*2;c.continue();}
      };
      tx.objectStore(IDB_STORE_BLOBS).openCursor().onsuccess=function(e){
        var c=e.target.result;
        if(c){if(c.value&&c.value.size)total+=c.value.size;c.continue();}
      };
      tx.oncomplete=function(){resolve(total);};
      tx.onerror=function(){resolve(total);};
    });
  });
}
function idbClearAll(){
  return idbOpen().then(function(db){
    return new Promise(function(resolve){
      var tx=db.transaction([IDB_STORE_KV,IDB_STORE_BLOBS],'readwrite');
      tx.objectStore(IDB_STORE_KV).clear();
      tx.objectStore(IDB_STORE_BLOBS).clear();
      tx.oncomplete=function(){resolve();};
      tx.onerror=function(){resolve();};
    });
  });
}

// ── JSON fetch with cache: IDB → memory → network ──────────────────────────
// af() is the single entry point used by every API call. We layer:
//   1. memory cache (in-flight + recent — prevents duplicate concurrent fetches)
//   2. IndexedDB persistent cache (offline + cross-session)
//   3. network (writes back to IDB on success)
// On a failed network fetch we surface the failure clearly so callers don't
// stall forever in a "Loading…" state — they can render an error or retry.
function af(url){
  var normUrl=url.replace(/\/$/,'');
  if(cache[normUrl])return cache[normUrl];
  cache[normUrl]=idbGet(IDB_STORE_KV,normUrl).then(function(cached){
    if(cached){
      try{return JSON.parse(cached);}catch(e){/* corrupted — refetch */}
    }
    // Fallback: try with trailing slash (old downloads stored some keys this way)
    return idbGet(IDB_STORE_KV,normUrl+'/').then(function(cached2){
      if(cached2){
        try{
          // Migrate: re-store under normalized key so future reads hit directly
          idbPut(IDB_STORE_KV,normUrl,cached2).catch(function(){});
          return JSON.parse(cached2);
        }catch(e){}
      }
      return fetch(normUrl).then(function(r){
        if(!r.ok)throw new Error('HTTP '+r.status);
        return r.text();
      }).then(function(txt){
        idbPut(IDB_STORE_KV,normUrl,txt).catch(function(){});
        return JSON.parse(txt);
      }).catch(function(netErr){
        return idbGet(IDB_STORE_KV,normUrl).then(function(retry){
          if(retry){try{return JSON.parse(retry);}catch(e){}}
          return idbGet(IDB_STORE_KV,normUrl+'/').then(function(retry2){
            if(retry2){try{return JSON.parse(retry2);}catch(e){}}
            throw netErr;
          });
        });
      });
    });
  }).catch(function(e){
    delete cache[normUrl];
    throw e;
  });
  return cache[normUrl];
}

// ── Image cache: blob: URLs from IDB, transparent fetch + store on miss ────
// blobUrlCache maps original URL → object URL we created. Object URLs need to
// stay alive for the page lifetime; we never revoke them since the user is
// browsing back-and-forth between the same images constantly.
var blobUrlCache={};
var blobFetchInflight={};
function getCachedImageUrl(url){
  if(blobUrlCache[url])return blobUrlCache[url];
  return null;
}
// Throttled image loading — limits concurrent IDB reads to prevent
// overwhelming the database when a page with 100+ sprites renders at once.
// Without this, WebView's IDB can abort transactions under heavy load.
var _imgQueue=[];
var _imgActive=0;
var _IMG_CONCURRENCY=6;
var _imgMissCache={}; // URLs that we know aren't in IDB — skip retries

function fetchAndCacheImage(url){
  if(blobFetchInflight[url])return blobFetchInflight[url];
  // If we already know this URL isn't cached, fail fast
  if(_imgMissCache[url])return Promise.reject(new Error('not cached'));
  blobFetchInflight[url]=new Promise(function(resolve,reject){
    _imgQueue.push({url:url,resolve:resolve,reject:reject});
    _drainImgQueue();
  });
  return blobFetchInflight[url];
}
function _drainImgQueue(){
  while(_imgActive<_IMG_CONCURRENCY&&_imgQueue.length>0){
    var job=_imgQueue.shift();
    _imgActive++;
    _doImageFetch(job.url).then(job.resolve).catch(job.reject)
      .finally(function(){_imgActive--;_drainImgQueue();});
  }
}
function _doImageFetch(url){
  return idbGet(IDB_STORE_BLOBS,url).then(function(blob){
    if(blob){
      var u=URL.createObjectURL(blob);
      blobUrlCache[url]=u;
      return u;
    }
    return fetch(url).then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.blob();
    }).then(function(b){
      idbPut(IDB_STORE_BLOBS,url,b).catch(function(){});
      var u=URL.createObjectURL(b);
      blobUrlCache[url]=u;
      return u;
    });
  }).catch(function(e){
    delete blobFetchInflight[url];
    _imgMissCache[url]=true; // don't retry this URL on next render
    throw e;
  });
}
// Walk the DOM after render and rewrite <img data-src="..."> + <img src="...">
// (for sprite hosts only) so they serve from cache when available, with a
// transparent network fallback that ALSO populates the cache for next time.
//
// Called automatically after every render via a passive MutationObserver — see
// kickImageCacheObserver() below.
var SPRITE_HOSTS=['raw.githubusercontent.com/PokeAPI'];
function isSpriteUrl(u){
  if(!u||u.indexOf('blob:')===0||u.indexOf('data:')===0)return false;
  for(var i=0;i<SPRITE_HOSTS.length;i++)if(u.indexOf(SPRITE_HOSTS[i])>=0)return true;
  return false;
}
function processImageNode(img){
  var origUrl=img.getAttribute('data-cache-src')||img.getAttribute('src');
  if(!origUrl||!isSpriteUrl(origUrl))return;
  if(img._cacheProcessed)return;
  if(img.getAttribute('data-no-cache'))return; // handled directly by caller
  img._cacheProcessed=true;
  if(!img.getAttribute('data-cache-src'))img.setAttribute('data-cache-src',origUrl);

  // 1. In-memory cache hit (fastest)
  var hit=getCachedImageUrl(origUrl);
  if(hit){img.src=hit;return;}

  // 2. Async IDB check. While waiting, set a tiny transparent placeholder so
  //    the browser doesn't fire a network request for the original URL (which
  //    would fail offline and trigger onerror before IDB responds).
  var origOnerror=img.getAttribute('onerror');
  img.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
  img.removeAttribute('onerror'); // suppress onerror on placeholder

  fetchAndCacheImage(origUrl).then(function(blobUrl){
    if(img.getAttribute('data-cache-src')===origUrl){
      img.src=blobUrl;
      if(origOnerror)img.setAttribute('onerror',origOnerror);
    }
  }).catch(function(){
    // IDB miss + network down. Set onerror FIRST so the fallback fires
    // when the network URL fails. _imgMissCache prevents future retries.
    if(img.getAttribute('data-cache-src')===origUrl){
      if(origOnerror)img.setAttribute('onerror',origOnerror);
      img.src=origUrl;
    }
  });
}
function processAllImages(root){
  var r=root||document.body;
  if(!r||!r.querySelectorAll)return;
  var imgs=r.querySelectorAll('img');
  for(var i=0;i<imgs.length;i++)processImageNode(imgs[i]);
}
// Mutation observer that re-runs the image processor on DOM updates. We
// attach it once at app start. Throttled with rAF so a flurry of innerHTML
// rewrites doesn't trigger N walks.
var _imgProcPending=false;
function scheduleImageProcess(){
  if(_imgProcPending)return;
  _imgProcPending=true;
  requestAnimationFrame(function(){_imgProcPending=false;processAllImages();});
}

// ── Curated catchability data (Gen 8/9) ────────────────────────────────────
// PokéAPI's encounter data stops at Gen 7. For Gen 8+ games we ship our own
// scraped catchability data (from PokémonDB) bundled in
// app/src/main/assets/data/catch/<game>.json. The app loads it lazily — only
// when the user filters by a Gen 8/9 game or opens a pokémon's Catch sub-tab
// while one of those games is the active filter.
//
// On launch we also fetch the manifest so we know which games have curated
// data; this drives the "use curated data?" decision in the dex filter and
// detail view. Falls back to PokéAPI for any game we don't have a curated
// file for.
var catchManifest=null;        // { version, games: { 'sword-shield': {...} } }
var catchData={};              // gameId → parsed JSON, cached after first load
var catchLoading={};           // gameId → Promise (in-flight load)

function hasCuratedCatchData(gameId){
  return !!(catchManifest && catchManifest.games && catchManifest.games[gameId]);
}

// Catch data is loaded synchronously at boot via <script> tags in index.html
// (see lines around `data/catch/manifest.js`). This function just promotes
// the global state into our existing catchManifest variable. Kept as a
// function (rather than inlining) so the rest of the code is unchanged.
function loadCatchManifest(){
  if(typeof window.CATCH_MANIFEST!=='undefined'){
    catchManifest=window.CATCH_MANIFEST;
  } else {
    catchManifest={version:0,games:{}};
  }
  // Promote per-game data registered by the bundled <script> tags.
  if(window.CATCH_DATA){
    for(var k in window.CATCH_DATA){
      catchData[k]=window.CATCH_DATA[k];
    }
  }
  return Promise.resolve(catchManifest);
}

function loadCatchData(gameId){
  // Data already loaded at boot — just return it. Promise wrapper kept for
  // call-site compatibility with the previous async API.
  if(catchData[gameId])return Promise.resolve(catchData[gameId]);
  return Promise.resolve(null);
}

// Synchronous helpers used by render functions. Returns null if not yet
// loaded — the render function falls back to its non-curated path.
function curatedAvailableSet(gameId){
  var d=catchData[gameId];
  if(!d)return null;
  if(d._availableSet)return d._availableSet;
  var s={};for(var i=0;i<d.available.length;i++)s[d.available[i]]=true;
  d._availableSet=s;
  return s;
}
function curatedRecordsFor(gameId,pokemonName){
  var d=catchData[gameId];
  if(!d)return null;
  return d.pokemon[pokemonName]||null;
}
function curatedNoteFor(gameId,pokemonName){
  var d=catchData[gameId];
  if(!d||!d.notes)return null;
  return d.notes[pokemonName]||null;
}

// Build (and cache) a reverse index keyed by locationSlug → array of encounter
// records merged across all pokémon in this game. Used by the Locations tab
// when curated data is available (SwSh, BDSP, LA, SV, LGPE) — lets us show
// real per-location encounter lists with method/rarity/levels for those games
// instead of relying on PokéAPI's incomplete Gen-8/9 encounter data.
function curatedLocationIndex(gameId){
  var d=catchData[gameId];
  if(!d)return null;
  if(d._locIndex)return d._locIndex;
  var idx={};
  for(var poke in d.pokemon){
    var recs=d.pokemon[poke];
    for(var i=0;i<recs.length;i++){
      var r=recs[i];
      var slug=r.locationSlug;
      if(!slug)continue;
      if(!idx[slug])idx[slug]=[];
      // Inline pokemon name onto the record so callers don't need to thread it
      idx[slug].push({pokemon:poke, locationName:r.location, method:r.method,
                      weather:r.weather, rarity:r.rarity, levels:r.levels,
                      versions:r.versions, subarea:r.subarea});
    }
  }
  d._locIndex=idx;
  return idx;
}
// Returns the curated location list for a game (array of {slug, name}) or null
// if curated data isn't available. Locations are deduped and sorted.
function curatedLocationsForGame(gameId){
  var idx=curatedLocationIndex(gameId);
  if(!idx)return null;
  var out=[];var seen={};
  for(var slug in idx){
    var first=idx[slug][0];
    if(seen[slug])continue;seen[slug]=true;
    out.push({slug:slug, name:first.locationName||slug});
  }
  out.sort(function(a,b){return a.name.localeCompare(b.name);});
  return out;
}

function kickImageCacheObserver(){
  if(!window.MutationObserver)return;
  // Initial pass for whatever's already in the DOM.
  processAllImages();
  var obs=new MutationObserver(function(muts){
    for(var i=0;i<muts.length;i++){
      var m=muts[i];
      if(m.addedNodes&&m.addedNodes.length){scheduleImageProcess();return;}
    }
  });
  obs.observe(document.body,{childList:true,subtree:true});
}

// ── Persistent preferences (localStorage) ──
var PREF_KEY='pokeguide.prefs.v1';
function loadPrefs(){
  try{
    var raw=localStorage.getItem(PREF_KEY);

    var p=JSON.parse(raw);
    if(p.theme==='dark'||p.theme==='light')S.theme=p.theme;
    if(p.dexViewMode==='list'||p.dexViewMode==='grid')S.dexViewMode=p.dexViewMode;
    if(p.cmpViewMode==='list'||p.cmpViewMode==='grid')S.cmpViewMode=p.cmpViewMode;
    if(typeof p.perPage==='number'&&PER_OPTIONS.indexOf(p.perPage)>=0)S.perPage=p.perPage;
    // Note: S.game is intentionally NOT restored. Each launch starts on
    // "All" so the user gets the full pokédex by default; if they want to
    // filter, they pick a game in-session.
    if(typeof p.glass==='boolean')S.glass=p.glass;
  }catch(e){}
}
function savePrefs(){
  try{
    localStorage.setItem(PREF_KEY,JSON.stringify({
      theme:S.theme,
      dexViewMode:S.dexViewMode,
      cmpViewMode:S.cmpViewMode,
      perPage:S.perPage,
      game:S.game,
      glass:S.glass
    }));

}
// ── Progress tracker (per-game catch/boss/wanted state, single slot per game) ──
// Stored in localStorage under PROG_KEY. Schema:
//   { lastViewed:'red-blue'|null, games:{ <gameId>: { caught:{ <pokeName>:{n:bool,s:bool} },
//                                                     beaten:[<bossId>...],
//                                                     wanted:[<pokeName>...],
//                                                     currentRoute:string|null,
//                                                     completedAt:number|null } } }
// `caught[name].n` = regular caught, `.s` = shiny caught. Treated as separate ticks.
// `completedAt` is set the first time the regular pokédex hits 100% — drives the
// permanent certificate banner and the one-time confetti celebration.
var PROG_KEY='pokeguide.progress.v1';
var PROG=null;
function progLoad(){
  if(PROG)return PROG;
  try{var raw=localStorage.getItem(PROG_KEY);if(raw)PROG=JSON.parse(raw);}catch(e){}
  if(!PROG||typeof PROG!=='object')PROG={lastViewed:null,games:{},pinnedToLaunchpad:null};
  if(!PROG.games)PROG.games={};
  // pinnedToLaunchpad is the gameId (or null) of the game whose progress
  // gets surfaced on the launchpad's "Currently Playing" strip + glass
  // Progress tile. Optional — null means the launchpad shows only the
  // generic "Track your progress" tile with no game-specific stats.
  if(PROG.pinnedToLaunchpad===undefined)PROG.pinnedToLaunchpad=null;
  return PROG;
}
function progSave(){try{localStorage.setItem(PROG_KEY,JSON.stringify(PROG));}catch(e){}}
function progSetPinned(gameId){
  progLoad();
  // Toggle: if already pinned to this game, unpin. Otherwise pin to this one.
  PROG.pinnedToLaunchpad=(PROG.pinnedToLaunchpad===gameId)?null:gameId;
  progSave();
}
function progIsPinned(gameId){
  progLoad();
  return PROG.pinnedToLaunchpad===gameId;
}
function progFor(gameId){
  progLoad();
  if(!PROG.games[gameId])PROG.games[gameId]={caught:{},beaten:[],wanted:[],currentRoute:null,completedAt:null,championedAt:null,inProgress:false};
  // Backfill in case schema evolved
  var g=PROG.games[gameId];
  if(!g.caught)g.caught={};if(!g.beaten)g.beaten=[];if(!g.wanted)g.wanted=[];
  if(g.currentRoute===undefined)g.currentRoute=null;
  if(g.completedAt===undefined)g.completedAt=null;
  if(g.championedAt===undefined)g.championedAt=null;
  // inProgress is the user's "I'm currently playing this" flag. Set once, by
  // either an explicit toggle or by catching one pokémon / beating one boss.
  // It persists across save/load so the game stays in the In Progress section
  // even if the user clears their progress (until they manually un-mark).
  if(g.inProgress===undefined)g.inProgress=false;
  return g;
}
function progReset(gameId){
  progLoad();delete PROG.games[gameId];progSave();
}

// Region a game takes place in (used for the "Champion of [Region]" badge).
// regionForGame is defined later in the Locations section (line ~5760).
// Returns lowercase region name like 'galar', 'kanto', etc.

// All games support the full feature set (catch + bosses + wanted). Routes
// were never a separate feature; the old "support level" gating only existed
// to hide the Wanted card for gen 6+ games, but there's no real reason to —
// wanted lists are just user-curated favourites, game-agnostic.
function progSupportLevel(gameId){
  return 'full';
}

// ── Regional Pokédex ────────────────────────────────────────────────────────
// Each game's "true" regional pokédex is a specific (often non-contiguous) set
// of national-dex IDs — Hoenn is 202 entries scattered through #001-386, not
// the whole range. The actual game's in-game completion banner triggers when
// you've caught everything in the regional list.
//
// PokéAPI exposes these as numbered "pokedex" resources. We map each game we
// support to the right one, then fetch+cache the resolved ID list (in
// localStorage so we only do it once per device).
//
// For unmapped or fetch-failed games we fall back to "national dex up through
// that game's generation cap" — close enough that the user can still tick
// catches off, just with an inflated total. Gen 1-2 are intentionally given
// pokedex IDs whose results match 1..N exactly, so the fallback and the real
// list agree.
var GAME_POKEDEX = {
  // Gen 1 — Kanto regional dex IS 1-151; mapping or fallback both work.
  'red-blue':2, 'yellow':2, 'firered-leafgreen':2,
  // Gen 2 — Johto dex IS 1-251.
  'gold-silver':3, 'crystal':3,
  // Updated Johto (HGSS) is a different ordering of 256 species
  'heartgold-soulsilver':7,
  // Gen 3 — Hoenn = 202 specific entries
  'ruby-sapphire':4, 'emerald':4,
  // Updated Hoenn (ORAS)
  'omega-ruby-alpha-sapphire':14,
  // Gen 4
  'diamond-pearl':5,            // Original Sinnoh 151
  'platinum':6,                 // Extended Sinnoh 210
  'brilliant-diamond-and-shining-pearl':5,
  // Gen 5
  'black-white':8,              // Original Unova 155
  'black-2-white-2':9,          // Updated Unova 301
  // Gen 6+ — catch-only support; mappings best-effort.
  // If a fetch fails the gen-cap fallback kicks in.
  'x-y':[12,13,14],              // Kalos central+coastal+mountain ≈457
  'sun-moon':16,
  'ultra-sun-ultra-moon':21,
  'lets-go-pikachu-lets-go-eevee':26,
  'sword-shield':27,
  'legends-arceus':30,
  'scarlet-violet':31
};

// Fallback: national-dex range up through the game's generation cap.
// Used only when the regional list isn't yet cached AND no fetch has succeeded.
function dexRangeFallback(gameId){
  var g=gameById(gameId);if(!g)return [1,151];
  var GEN_MAX={1:151,2:251,3:386,4:493,5:649,6:721,7:809,8:898,9:1025};
  return [1,GEN_MAX[g.gen]||151];
}

// Synchronous: returns the array of national IDs in this game's regional dex.
//
// Gen 1-5: PokéAPI's /pokedex/N resource is accurate and complete — we use it.
// Gen 6+:  PokéAPI's regional dex resources are "curated lists" that omit
//          many pokémon that ARE catchable in those games (returning species
//          via DLC, transfer-only Pokémon, etc.). For these games we use the
//          gen-cap range (1..gen-max) which is over-inclusive but never
//          incorrectly HIDES a catchable pokémon. The catch sub-tab inside
//          each pokémon's detail view is where per-game catchability lives,
//          so the dex list just needs to surface every plausibly-relevant
//          species.
function regionalIdsForGame(gameId){
  // Memory cache — fastest path. We only populate this AFTER successfully
  // resolving against curated data (or PokéAPI's regional dex for Gen 1-5),
  // never with the gen-cap fallback. Caching the fallback would freeze us
  // on the over-inclusive list even after the real data has arrived.
  if(S.regDexCache[gameId])return S.regDexCache[gameId];
  // Prefer curated catchability data when bundled. The "available" list in
  // the curated JSON is an authoritative set of catchable species for this
  // game, so the dex filter shows exactly that set — neither hiding catchable
  // pokémon (the original gen-cap problem) nor over-including (the curated
  // list is hand-built from PokémonDB's per-game pokédex).
  if(hasCuratedCatchData(gameId)){
    var d=catchData[gameId];
    if(d&&d.available&&d.available.length&&S.dexList&&S.dexList.length){
      // Map species slugs → national IDs by looking up against S.dexList.
      var idsFromCurated=[];
      var nameToId={};
      for(var li=0;li<S.dexList.length;li++)nameToId[S.dexList[li].name]=li+1;
      for(var ci=0;ci<d.available.length;ci++){
        var nid=nameToId[d.available[ci]];
        if(nid)idsFromCurated.push(nid);
      }
      if(idsFromCurated.length){
        idsFromCurated.sort(function(a,b){return a-b;});
        S.regDexCache[gameId]=idsFromCurated;
        return idsFromCurated;
      }
    }
    // Curated data exists but S.dexList isn't populated yet (happens during
    // boot, before the /pokemon?limit=1025 fetch resolves). Return an
    // empty-ish set so the dex shows nothing rather than the wrong everything.
    // The caller (renderDexList) re-renders when S.dexList arrives, at which
    // point this function will resolve correctly. DO NOT cache this — we want
    // to retry next call once dexList is loaded.
    if(!S.dexList||!S.dexList.length)return [];
    // Curated data has no entries for this game (shouldn't happen, but defensive)
    // → fall through to gen-cap below.
  }
  // Gen 8/9 use curated catch data when available. For Gen 6 (X/Y, ORAS) and
  // Gen 7 (SuMo, USUM, LGPE), we have entries in GAME_POKEDEX pointing at
  // PokéAPI regional dex resources (Kalos, Hoenn, Alola, Updated Alola) which
  // ARE accurate. So we drop down to the GAME_POKEDEX path below for those.
  // Only games with no GAME_POKEDEX entry AND no curated catch data fall
  // through to the gen-cap range as a last-resort safety net.
  var g=gameById(gameId);
  // Gen 1-5 (and Gen 6/7 games with PokéAPI regional dex entries) — use
  // localStorage-cached or freshly-fetched PokéAPI /pokedex resource.
  var pdId=GAME_POKEDEX[gameId];
  if(pdId){
    var pdIds=Array.isArray(pdId)?pdId:[pdId];
    var cacheKey='pokeguide.regdex.'+pdIds.join('-');
    try{
      var raw=localStorage.getItem(cacheKey);
      if(raw){
        var parsed=JSON.parse(raw);
        if(parsed&&parsed.length){S.regDexCache[gameId]=parsed;return parsed;}
      }
      // Also check old single-ID key for backward compat
      if(pdIds.length===1){
        var rawOld=localStorage.getItem('pokeguide.regdex.'+pdIds[0]);
        if(rawOld){
          var parsedOld=JSON.parse(rawOld);
          if(parsedOld&&parsedOld.length){S.regDexCache[gameId]=parsedOld;return parsedOld;}
        }
      }
    }catch(e){}
    // Cache miss — kick off async fetch in the background and return a
    // minimal fallback. Once the fetch resolves, the next call gets the real
    // list. We don't cache the fallback so the next render after fetch
    // completion sees the real data.
    fetchRegionalDex(gameId);
  }
  // Last-resort gen-cap range (for games we have no curated data and no
  // PokéAPI regional dex for). NOT cached.
  if(g&&g.gen>=6){
    var range=dexRangeFallback(gameId);
    var out=[];for(var i=range[0];i<=range[1];i++)out.push(i);
    return out;
  }
  // Gen 1-5 with no PokéAPI hit yet — return gen-cap as fallback (also not cached).
  var range2=dexRangeFallback(gameId);
  var out2=[];for(var i=range2[0];i<=range2[1];i++)out2.push(i);
  return out2;
}

function fetchRegionalDex(gameId){
  if(S.regDexFetching[gameId])return;
  var pdId=GAME_POKEDEX[gameId];if(!pdId)return;
  S.regDexFetching[gameId]=true;

  // Support single ID or array of IDs (e.g. X/Y = [12,13,14])
  var pdIds=Array.isArray(pdId)?pdId:[pdId];
  var cacheKey='pokeguide.regdex.'+pdIds.join('-');

  Promise.all(pdIds.map(function(id){
    return fetch(API+'/pokedex/'+id)
      .then(function(r){if(!r.ok)throw 0;return r.json();})
      .then(function(d){
        return d.pokemon_entries.map(function(e){
          var m=e.pokemon_species.url.match(/\/(\d+)\/?$/);
          return m?parseInt(m[1],10):0;
        }).filter(function(x){return x>0;});
      });
  })).then(function(arrays){
    // Merge and deduplicate
    var idSet={};
    arrays.forEach(function(arr){arr.forEach(function(id){idSet[id]=true;});});
    var ids=Object.keys(idSet).map(Number).sort(function(a,b){return a-b;});
    try{localStorage.setItem(cacheKey,JSON.stringify(ids));}catch(e){}
    S.regDexCache[gameId]=ids;
    S.regDexFetching[gameId]=false;
    if(S.tab==='progress'&&S.progGame===gameId)pane('progress').innerHTML=renderProgress();
    if(S.tab==='home')pane('home').innerHTML=renderHome();
  }).catch(function(){S.regDexFetching[gameId]=false;});
}

// Pokédex count for this game = size of the regional dex. For games with
// curated catch data we use the authoritative `available` list (so the count
// matches PokémonDB's pokédex listing exactly, including DLC-only species
// that don't map cleanly to PokéAPI national IDs). Other games fall back to
// the regionalIds array length.
function dexCountForGame(gameId){
  if(hasCuratedCatchData(gameId)){
    var d=catchData[gameId];
    if(d&&d.available)return d.available.length;
  }
  return regionalIdsForGame(gameId).length;
}

// PokéAPI uses lowercase canonical names like 'mr-mime', 'nidoran-f', etc.
// Pokédex IDs are sequential 1..1025 (national). For tracking purposes we use
// the integer ID as the primary key (string-form) so we don't need the names.
function pokeIdToName(id){
  // We don't have a bundled name list. Use the ID itself as the storage key; the
  // checklist UI fetches the name from PokéAPI lazily as it renders rows.
  return ''+id;
}

// Dedupe bosses by (role, n, name) — variant champions (e.g. Blue with three
// starter-dependent teams in Red/Blue, or three Eevee-evolution teams in
// Yellow) share the same id in the scraped data, so they semantically refer
// to the same encounter (the player only fights one of them, picked at game
// start). We collapse them into a single canonical entry for display +
// progression-counting. The boss detail view re-discovers all variants when
// rendering so the user can still see all three teams side by side.
function uniqueBossesForGame(gameId){
  var seen={};
  return bossesForGame(gameId).filter(function(b){
    var key=b.role+'|'+(b.n||'')+'|'+b.name;
    if(seen[key])return false;
    seen[key]=true;
    return true;
  });
}
// All variants of the given boss (matching role+n+name) that appear in any
// game `b` is registered under. Used by renderBossDetail to show all teams
// when a boss has multiple starter-dependent rosters.
function bossVariants(b){
  return BOSSES.filter(function(other){
    if(other.role!==b.role||other.n!==b.n||other.name!==b.name)return false;
    // must share at least one game with `b`
    for(var i=0;i<b.games.length;i++)if(other.games.indexOf(b.games[i])>=0)return true;
    return false;
  });
}

// Find the next un-beaten boss in progression order for a given game.
function progNextBoss(gameId){
  var bs=uniqueBossesForGame(gameId);if(!bs.length)return null;
  var beaten=progFor(gameId).beaten;
  var ROLE_ORDER={gym:0,kahuna:1,e4:2,champion:3};
  bs=bs.slice().sort(function(a,b){
    if(ROLE_ORDER[a.role]!==ROLE_ORDER[b.role])return ROLE_ORDER[a.role]-ROLE_ORDER[b.role];
    return (a.n||0)-(b.n||0);
  });
  for(var i=0;i<bs.length;i++)if(beaten.indexOf(bs[i].id)<0)return bs[i];
  return null;
}

// Mark a game as actively in-progress. Idempotent — once set, it stays set
// until the user manually clears it via progSetInProgress(gameId, false).
// Auto-called any time the user does a meaningful progress action (catches a
// pokémon, marks a shiny, beats a boss, hearts a wanted entry) so the game
// surfaces in the picker's "In Progress" section the next time they open it.
function progMarkInProgress(gameId){
  var g=progFor(gameId);
  if(g.inProgress)return;
  g.inProgress=true;progSave();
}
function progSetInProgress(gameId,value){
  var g=progFor(gameId);
  g.inProgress=!!value;progSave();
}

// Caught/shiny/wanted/beaten toggles. `kind` is 'n' (caught) or 's' (shiny).
function progToggleCaught(gameId,id,kind){
  var g=progFor(gameId);
  var key=''+id;
  if(!g.caught[key])g.caught[key]={n:false,s:false};
  g.caught[key][kind]=!g.caught[key][kind];
  // Marking as shiny automatically marks as caught — you can't have a shiny
  // you haven't caught. (Un-marking shiny does NOT un-mark caught though.)
  if(kind==='s'&&g.caught[key].s)g.caught[key].n=true;
  if(!g.caught[key].n&&!g.caught[key].s)delete g.caught[key];
  // Marking as caught (regular OR shiny) implies the user has acquired this
  // pokémon, so it shouldn't still appear in their "wanted" list. Auto-clean.
  // We only do this when toggling ON — toggling caught OFF leaves wanted alone
  // (the user might have marked themselves caught by mistake and is undoing).
  if(g.caught[key]&&(g.caught[key].n||g.caught[key].s)){
    var wi=g.wanted.indexOf(key);
    if(wi>=0)g.wanted.splice(wi,1);
    // First catch in this game → promote to In Progress.
    progMarkInProgress(gameId);
  }
  progSave();
  // Pokédex completion check — only triggers on regular catches, not shinies.
  // 200ms delay so the toggle's checkmark renders before the celebration fires —
  // gives a nice "tick → BOOM" sequence rather than cutting off the tap feedback.
  if(kind==='n'&&!g.completedAt&&progDexCaughtCount(gameId)>=dexCountForGame(gameId)){
    g.completedAt=Date.now();progSave();
    setTimeout(fireConfetti,200);
  }
  return g.caught[key]||{n:false,s:false};
}
function progToggleWanted(gameId,id){
  var g=progFor(gameId);var key=''+id;
  var i=g.wanted.indexOf(key);
  if(i<0){g.wanted.push(key);progMarkInProgress(gameId);}
  else g.wanted.splice(i,1);
  progSave();
  return i<0;
}
function progToggleBeaten(gameId,bossId){
  var g=progFor(gameId);
  var i=g.beaten.indexOf(bossId);
  if(i<0){g.beaten.push(bossId);progMarkInProgress(gameId);}
  else g.beaten.splice(i,1);
  progSave();
  // Champion celebration — fires on the FIRST time any boss with role:'champion'
  // gets toggled on. Some games have multiple champion entries (e.g. Blue's three
  // starter-dependent variants in Red/Blue) — beating any one counts as becoming
  // the regional champion. 200ms delay matches the dex completion celebration.
  if(i<0 && !g.championedAt){
    var boss=null;
    var bs=bossesForGame(gameId);
    for(var k=0;k<bs.length;k++){if(bs[k].id===bossId){boss=bs[k];break;}}
    if(boss && boss.role==='champion'){
      g.championedAt=Date.now();progSave();
      setTimeout(function(){fireChampionConfetti(gameId);},200);
    }
  }
  return i<0;
}
function progDexCaughtCount(gameId){
  var g=progFor(gameId);
  var ids=regionalIdsForGame(gameId);
  var n=0;
  for(var i=0;i<ids.length;i++){var k=''+ids[i];if(g.caught[k]&&g.caught[k].n)n++;}
  return n;
}
function progShinyCaughtCount(gameId){
  var g=progFor(gameId);
  var ids=regionalIdsForGame(gameId);
  var n=0;
  for(var i=0;i<ids.length;i++){var k=''+ids[i];if(g.caught[k]&&g.caught[k].s)n++;}
  return n;
}

// Move metadata icons
function dcIcon(dc){
  var cols={physical:'#E86A33',special:'#5C9EFF',status:'#9B9BA8'};

  var svg={
    physical:'<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M6 3l4 4-4 4 4 4-4 4 4 4M14 3l4 4-4 4 4 4-4 4 4 4" stroke="white" stroke-width="2" fill="none"/></svg>',
    special:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3" fill="white"/></svg>',
    status:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>'
  };

function tcIcon(t){
  return '<div class="mv-tc" style="background:'+TC[t]+'"><span>'+t.slice(0,3).toUpperCase()+'</span></div>';
}
function cap(s){return s?s.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();}):''}
function gid(url){return parseInt(url.split('/').filter(Boolean).pop())}
function spr(id){return'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/'+id+'.png'}
function artN(id){return'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/'+id+'.png'}
function artSh(id){return'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/'+id+'.png'}
function esc(s){var x=String(s);x=x.replace(/&/g,'[AMP]');x=x.replace(/</g,'[LT]');x=x.replace(/>/g,'[GT]');x=x.replace(/"/g,'[QT]');x=x.replace(/\[AMP\]/g,'&amp;');x=x.replace(/\[LT\]/g,'&lt;');x=x.replace(/\[GT\]/g,'&gt;');x=x.replace(/\[QT\]/g,'&quot;');return x;}
function ge(a,d){return(EFF[a]&&EFF[a][d]!==undefined)?EFF[a][d]:1}
function calcMu(types){var e={};TYPES.forEach(function(a){var m=1;types.forEach(function(d){m*=ge(a,d);});if(m!==1)e[a]=m;});return e;}
function multLbl(v){return v===0?'x0':v===.25?'x1/4':v===.5?'x1/2':v===2?'x2':'x4'}
function tpill(t){return '<span class="tpill" style="background:'+TC[t]+'">'+t+'</span>'}
function tcir(t,v){return '<div class="tcir"><div class="tcir-d" style="background:'+TC[t]+'"><span class="tcir-l">'+t.slice(0,3)+'</span></div><span class="tcir-m">'+multLbl(v)+'</span></div>'}
function sbar(name,val){
  var L={hp:'HP',attack:'ATK',defense:'DEF','special-attack':'SATK','special-defense':'SDEF',speed:'SPE'};
  return '<div class="sbar"><span class="sbar-l">'+(L[name]||name.slice(0,4).toUpperCase())+'</span><span class="sbar-v">'+val+'</span><div class="sbar-t"><div class="sbar-f" style="width:'+Math.min(100,(val/255)*100)+'%"></div></div></div>';
}

function iitem(k,v){return '<div><div class="info-k">'+k+'</div><div class="info-v">'+esc(String(v))+'</div></div>'}

function toggleQuickNav(){
  var w=document.getElementById('bnav-wrap');
  if(!w)return;
  var isOpen=w.classList.toggle('visible');
  document.body.classList.toggle('qnav-open',isOpen);
  if(isOpen){
    setTimeout(function(){
      document.addEventListener('pointerdown',outsideTap,true);
    },0);
  } else {
    document.removeEventListener('pointerdown',outsideTap,true);
  }
}
function closeQuickNav(){
  var w=document.getElementById('bnav-wrap');

}

}

// ── LAUNCHPAD / HOME ──
// ── FAVORITES (Trophy Showcase) ─────────────────────────────────────
// Up to 5 pokémon displayed as trophies on the launchpad. Stored as an
// array of {id, name} objects in localStorage. Empty slots are null.
var FAV_KEY='pokeguide.favorites.v1';
var _favs=null; // [null|{id,name}, ...] length 5

function favsLoad(){
  if(_favs)return _favs;
  try{var raw=localStorage.getItem(FAV_KEY);if(raw)_favs=JSON.parse(raw);}catch(e){}
  if(!Array.isArray(_favs)||_favs.length!==5)_favs=[null,null,null,null,null];
  return _favs;
}
function favsSave(){try{localStorage.setItem(FAV_KEY,JSON.stringify(_favs));}catch(e){}}

function favIsFavorite(pokemonId){
  favsLoad();
  for(var i=0;i<5;i++)if(_favs[i]&&_favs[i].id===pokemonId)return true;
  return false;
}
function favNextEmpty(){
  favsLoad();
  for(var i=0;i<5;i++)if(!_favs[i])return i;
  return -1; // all full
}
function favAdd(pokemonId,pokemonName,slot){
  favsLoad();
  // Remove from any existing slot first (prevent duplicates)
  for(var i=0;i<5;i++)if(_favs[i]&&_favs[i].id===pokemonId)_favs[i]=null;
  _favs[slot]={id:pokemonId,name:pokemonName};
  favsSave();
}
function favRemove(pokemonId){
  favsLoad();
  for(var i=0;i<5;i++)if(_favs[i]&&_favs[i].id===pokemonId)_favs[i]=null;
  favsSave();
}

// Toggle favorite from the detail hero ★ button
function favToggle(pokemonId,pokemonName){
  favsLoad();
  if(favIsFavorite(pokemonId)){
    favRemove(pokemonId);
    // Re-render the detail view to update the star button
    if(S.tab==='dex'&&S.dexView==='detail')pane('dex').innerHTML=renderDexDetail();
    return;
  }
  var slot=favNextEmpty();
  if(slot>=0){
    favAdd(pokemonId,pokemonName,slot);
    if(S.tab==='dex'&&S.dexView==='detail')pane('dex').innerHTML=renderDexDetail();
  } else {
    // All 5 full — show slot picker
    favShowPicker(pokemonId,pokemonName);
  }
}

// Slot picker modal — "Which slot do you want to replace?"
function favShowPicker(pokemonId,pokemonName){
  favsLoad();
  var slotsHtml='';
  for(var i=0;i<5;i++){
    var f=_favs[i];
    var inner=f?'<img src="'+spr(f.id)+'" alt="'+cap(f.name)+'"/>':'<span class="fav-pick-empty">+</span>';
    slotsHtml+='<div class="fav-pick-slot" onclick="favPickSlot('+i+','+pokemonId+',\''+pokemonName.replace(/'/g,"\\'")+'\')" title="'+(f?cap(f.name):'Empty')+'">'+inner+'</div>';
  }
  var html='<div class="fav-pick-overlay" onclick="if(event.target===this)favClosePicker()">'+
    '<div class="fav-pick-card">'+
      '<div class="fav-pick-title">Replace which favorite?</div>'+
      '<div style="font-size:12px;color:var(--tx2);margin-bottom:12px">All 5 slots are full. Tap one to replace it with '+cap(pokemonName)+'.</div>'+
      '<div class="fav-pick-slots">'+slotsHtml+'</div>'+
      '<button class="fav-pick-cancel" onclick="favClosePicker()">Cancel</button>'+
    '</div>'+
  '</div>';
  document.body.insertAdjacentHTML('beforeend',html);
}
function favPickSlot(slot,pokemonId,pokemonName){
  favAdd(pokemonId,pokemonName,slot);
  favClosePicker();
  if(S.tab==='dex'&&S.dexView==='detail')pane('dex').innerHTML=renderDexDetail();
}
function favClosePicker(){
  var el=document.querySelector('.fav-pick-overlay');

}

// Render the favorites showcase for the launchpad
function renderFavsShowcase(){
  favsLoad();

    if(f){
      slots+='<div class="lp-fav-slot" onclick="openDexById('+f.id+',\''+f.name.replace(/'/g,"\\'")+'\')" title="'+cap(f.name)+'">'+

          '<div class="lp-fav-ball-btn"></div>'+

        '</div>'+

function renderHome(){
  var g=S.game?gameById(S.game):null;
  progLoad();

  // ── Pinned-game strip ────────────────────────────────────────
  // Only renders if the user has explicitly pinned a game's progress to the
  // launchpad (via the "Pin to launchpad" toggle in that game's progress
  // dashboard). Otherwise omitted entirely — keeping the launchpad clean for
  // users who don't engage with the progress checker.
  var pinHtml='';
  var pinnedId=PROG.pinnedToLaunchpad;
  var pinnedGame=pinnedId?gameById(pinnedId):null;
  var pinnedPct=null, pinnedCaught=null, pinnedMax=null;
  if(pinnedGame){
    pinnedCaught=progDexCaughtCount(pinnedId);
    pinnedMax=dexCountForGame(pinnedId);
    pinnedPct=pinnedMax?Math.round(pinnedCaught/pinnedMax*100):0;
    var pinBg='linear-gradient(135deg,'+pinnedGame.c1+','+pinnedGame.c2+')';
    pinHtml=
      '<div class="lp-pin" onclick="goTab(\'progress\')">'+
        '<div class="lp-pin-badge" style="background:'+pinBg+'">'+esc(pinnedGame.ic||pinnedGame.sh)+'</div>'+
        '<div class="lp-pin-text">'+
          '<div class="lp-pin-eyebrow">Currently Playing</div>'+
          '<div class="lp-pin-name">'+esc(pinnedGame.n)+'</div>'+

        '<div class="lp-pin-pct">'+pinnedPct+'%</div>'+
        '<span class="lp-pin-chevron">›</span>'+

  // ── Pokédex hero (pokéball anatomy) ──────────────────────────
  // Red gradient card with a horizontal black equator and a black/white
  // centre button drawn on top — visually says "pokéball" without literally
  // being one. Just BROWSE / Pokédex; no live caught count (that belongs in
  // the progress hub).
  var hero=
    '<div class="lp-hero-ball" onclick="goTab(\'dex\')">'+
      '<div class="lp-hero-ball-eq"></div>'+
      '<div class="lp-hero-ball-btn"></div>'+
      '<div class="lp-hero-ball-text">'+
        '<div class="lp-hero-ball-eyebrow">Browse</div>'+
        '<div class="lp-hero-ball-title">Pokédex</div>'+
      '</div>'+
    '</div>';

  // ── 2x2 tile grid ───────────────────────────────────────────
  // Square tiles with minimalist white outline-style icons — the look the
  // mockup nailed. Solid color backgrounds (no busy illustrated icons),
  // chunky labels, optional small subtitles.
  function squareTile(opts){
    return '<div class="lp-square" onclick="'+opts.onClick+'" style="background:'+opts.bg+'">'+
      '<div class="lp-square-icon">'+opts.icon+'</div>'+
      '<div>'+

  var grid=
    '<div class="lp-grid">'+

        '</svg>'

      squareTile({
        label:'Locations',

        icon:'<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="2.4">'+

          '<circle cx="18" cy="14" r="4.5" fill="currentColor"/>'+
        '</svg>'
      })+

      squareTile({

        icon:'<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="2.4">'+
          '<circle cx="18" cy="18" r="14"/>'+
          '<circle cx="18" cy="18" r="5" fill="currentColor"/>'+
          '<circle cx="18" cy="18" r="1.5" fill="#15803D"/>'+
        '</svg>'
      })+
    '</div>';

  // ── Glass Progress tile ─────────────────────────────────────
  // Frosted dark surface with a ring chart on the left. If a game is pinned,
  // the ring shows that game's dex completion %; otherwise generic "Track
  // your progress" with no ring (just an icon).
  var progRingPct=pinnedPct!==null?pinnedPct:0;
  var progRingCirc=2*Math.PI*22; // radius 22, viewBox 54

  var progEyebrow=pinnedGame?'Progress':'Progress Checker';

        '<circle cx="27" cy="27" r="22" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4"/>'+
        '<circle cx="27" cy="27" r="22" fill="none" stroke="#5B8DEF" stroke-width="4" stroke-dasharray="'+progRingDash+' '+progRingCirc+'" stroke-linecap="round" transform="rotate(-90 27 27)"/>'+
      '</svg>'

  var progRingNum=pinnedGame?'<div class="lp-prog-ring-num">'+progRingPct+'</div>':'';
  // ── Guides section ───────────────────────────────────────────────
  // Shows a pinned guide (if one is pinned) and a "Guides" tile that opens
  // the full guides screen. If no guides exist at all, shows a subtle
  // placeholder. Between the 2x2 tile grid and the Progress tile.
  guidesLoad();
  var pinnedGuide=guidePinned();
  // Pinned guide card — goes at the TOP of the launchpad, stacked with
  // the "Currently Playing" strip (if present). Both can show simultaneously.
  var pinnedGuideHtml='';
  if(pinnedGuide){
    pinnedGuideHtml=
      '<div class="lp-guide-pinned" onclick="guideOpen(\''+pinnedGuide.id+'\')">'+
        '<div class="lp-guide-pinned-icon">'+guideIconHTML(pinnedGuide.icon,38)+'</div>'+
        '<div class="lp-guide-pinned-text">'+
          '<div class="lp-guide-pinned-eyebrow">Pinned Guide</div>'+
          '<div class="lp-guide-pinned-title">'+esc(pinnedGuide.title)+'</div>'+
        '</div>'+
        '<span class="lp-guide-pinned-chevron">›</span>'+
      '</div>';
  }
  // Guides tile — stays between the grid and progress tile
  var guideCount=guideList.length;
  var guidesTileHtml=
    '<div class="lp-prog-glass lp-guides-tile" onclick="showGuides()">'+
      '<div class="lp-prog-ring" style="width:48px;height:48px">'+
        '<svg viewBox="0 0 48 48" fill="none" stroke="#A78BFA" stroke-width="2.5">'+
          '<rect x="8" y="4" width="32" height="40" rx="3"/>'+
          '<line x1="14" y1="14" x2="34" y2="14"/>'+
          '<line x1="14" y1="22" x2="34" y2="22"/>'+
          '<line x1="14" y1="30" x2="28" y2="30"/>'+
        '</svg>'+
      '</div>'+
      '<div class="lp-prog-text">'+
        '<div class="lp-prog-eyebrow">Guides</div>'+
        '<div class="lp-prog-title">'+(guideCount?guideCount+' saved guide'+(guideCount>1?'s':''):'Add a walkthrough')+'</div>'+
      '</div>'+
      '<span class="lp-prog-arrow">›</span>'+
    '</div>';

  var fullProgRow=
    '<div class="lp-prog-glass" onclick="goTab(\'progress\')">'+
      '<div class="lp-prog-ring">'+progIcon+progRingNum+'</div>'+
      '<div class="lp-prog-text">'+
        '<div class="lp-prog-eyebrow">'+progEyebrow+'</div>'+
        '<div class="lp-prog-title">'+esc(progTitle)+'</div>'+
      '</div>'+

  // ── Bottom list (Compare + Type Chart + Items) ──────────────
  var listSection=
    '<div class="lp-list">'+
      '<div class="lp-list-row" onclick="startCompareFromHome()">'+
        '<div class="lp-list-ic" style="background:linear-gradient(135deg,#8B5CF6,#5B21B6)">'+
          '<span style="font-size:18px">⚖️</span>'+
        '</div>'+
        '<div class="lp-list-label">Compare</div>'+
        '<span class="lp-list-arrow">›</span>'+
      '</div>'+

        '<div class="lp-list-ic" style="background:linear-gradient(135deg,#FF6B6B,#4ECDC4,#FFE66D);font-size:0">'+
          '<span style="display:flex;gap:-8px"><span style="width:14px;height:14px;border-radius:50%;background:#FF6B6B;display:inline-block"></span><span style="width:14px;height:14px;border-radius:50%;background:#4ECDC4;margin-left:-6px"></span><span style="width:14px;height:14px;border-radius:50%;background:#FFE66D;margin-left:-6px"></span></span>'+

        '<div class="lp-list-label">Items</div>'+
        '<span class="lp-list-arrow">›</span>'+
      '</div>'+

  var favsHtml=renderFavsShowcase();

  return '<div class="screen lp-screen">'+
    '<div class="topbar lp-topbar">'+
      '<div class="topbar-title" style="text-align:left;flex:1;font-size:22px">PokéGuide</div>'+
      settingsBtnHTML()+

    '</div>'+

      favsHtml+pinHtml+pinnedGuideHtml+hero+grid+guidesTileHtml+fullProgRow+listSection+
    '</div>'+

}

// ── GUIDES (Wiki/Walkthrough Bookmarks) ────────────────────────────
var GUIDE_KEY='pokeguide.guides.v1';
var guideList=null; // Array of guide objects
var guideView=null; // null=not showing, 'grid'=grid screen, 'create'=modal, 'edit'=modal
var guideEditing=null; // guide id being edited (for edit mode)
var guideIconTab='games'; // icon picker tab

// Popular pokémon sprite IDs for the icon picker
var GUIDE_SPRITES=[25,6,133,150,94,143,448,282,658,778]; // Pikachu,Charizard,Eevee,Mewtwo,Gengar,Snorlax,Lucario,Gardevoir,Greninja,Mimikyu

// Gradient color presets (pairs for linear-gradient)
var GUIDE_GRADIENTS=[
  '#EE3D44,#A0151B','#FFB300,#E08800','#5B8DEF,#2E59C0','#22C55E,#15803D',
  '#A855F7,#7E22CE','#EC4899,#BE185D','#06B6D4,#0E7490','#737373,#404040'
];

function guidesLoad(){
  if(guideList!==null)return guideList;
  try{var raw=localStorage.getItem(GUIDE_KEY);if(raw)guideList=JSON.parse(raw);}catch(e){}
  if(!Array.isArray(guideList))guideList=[];
  return guideList;
}
function guidesSave(){try{localStorage.setItem(GUIDE_KEY,JSON.stringify(guideList));}catch(e){}}

function guideById(id){
  guidesLoad();
  for(var i=0;i<guideList.length;i++)if(guideList[i].id===id)return guideList[i];
  return null;
}
function guidePinned(){
  guidesLoad();
  for(var i=0;i<guideList.length;i++)if(guideList[i].pinned)return guideList[i];
  return null;
}
function guideSetPinned(id){
  guidesLoad();
  for(var i=0;i<guideList.length;i++)guideList[i].pinned=(guideList[i].id===id&&!guideList[i].pinned);
  guidesSave();
}
function guideDelete(id){
  guidesLoad();
  guideList=guideList.filter(function(g){return g.id!==id;});
  guidesSave();
}
function guideCreate(data){
  guidesLoad();
  data.id='g-'+Date.now()+'-'+Math.random().toString(36).substr(2,5);
  data.createdAt=Date.now();
  data.lastUrl=data.url;
  data.lastScrollY=0;
  data.pinned=false;
  guideList.push(data);
  guidesSave();
  return data;
}
function guideUpdate(id,data){
  var g=guideById(id);
  if(!g)return;
  if(data.title!==undefined)g.title=data.title;
  if(data.url!==undefined){g.url=data.url;g.lastUrl=data.url;g.lastScrollY=0;}
  if(data.icon!==undefined)g.icon=data.icon;
  if(data.gameGroup!==undefined)g.gameGroup=data.gameGroup;
  guidesSave();
}

// Called from Java's hideGuideBrowser to persist current URL + scroll position
function guideSaveState(guideId,state){
  var g=guideById(guideId);
  if(!g||!state)return;
  if(state.url)g.lastUrl=state.url;
  if(state.scrollY!==undefined)g.lastScrollY=Math.round(state.scrollY);
  if(state.scrollPct!==undefined)g.lastScrollPct=state.scrollPct;
  guidesSave();
}

// Open a guide in the native overlay browser
function guideOpen(id){
  var g=guideById(id);
  if(!g)return;
  var url=g.lastUrl||g.url;
  var scrollY=g.lastScrollY||0;
  if(typeof Android!=='undefined'&&Android.openGuide){
    Android.openGuide(id,url,scrollY);
  } else {
    // Fallback for browser testing — open in new tab
    window.open(url,'_blank');
  }
}

// ── Guide icon rendering ──
function guideIconHTML(icon,size){
  size=size||44;
  var s='width:'+size+'px;height:'+size+'px;border-radius:'+(size*0.22)+'px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;';
  if(!icon)return '<div style="'+s+'background:#333;font-size:'+(size*0.5)+'px;color:#888">📖</div>';
  if(icon.type==='game'){
    var g=gameById(icon.value);
    if(g)return '<div style="'+s+'background:linear-gradient(135deg,'+g.c1+','+g.c2+');font-size:'+(size*0.26)+'px;font-weight:900;color:#fff;border:0.5px solid rgba(255,255,255,0.15)">'+esc(g.ic||g.sh)+'</div>';
    return '<div style="'+s+'background:#555;font-size:'+(size*0.26)+'px;font-weight:900;color:#fff">?</div>';
  }
  if(icon.type==='sprite')return '<div style="'+s+'background:var(--card2)"><img src="'+spr(icon.value)+'" style="width:80%;height:80%;image-rendering:pixelated;object-fit:contain"/></div>';
  if(icon.type==='gradient'){
    var cols=icon.value.split(',');
    return '<div style="'+s+'background:linear-gradient(135deg,'+cols[0]+','+cols[1]+')"></div>';
  }
  if(icon.type==='custom')return '<div style="'+s+'"><img src="'+icon.value+'" style="width:100%;height:100%;object-fit:cover"/></div>';
  return '<div style="'+s+'background:#333;font-size:'+(size*0.5)+'px;color:#888">📖</div>';
}

// ── Guide screen ──
function showGuides(){
  guideView='grid';
  pane('home').innerHTML=renderGuideScreen();
}
function closeGuides(){
  guideView=null;guideEditing=null;
  pane('home').innerHTML=renderHome();
}

function renderGuideScreen(){
  guidesLoad();
  // Group by gameGroup
  var groups={};var ungrouped=[];
  guideList.forEach(function(g){
    if(g.gameGroup){
      if(!groups[g.gameGroup])groups[g.gameGroup]=[];
      groups[g.gameGroup].push(g);
    } else {ungrouped.push(g);}
  });
  var html='';
  // Grouped
  var groupNames=Object.keys(groups).sort();
  groupNames.forEach(function(name){
    html+='<div class="guide-group-header">'+esc(name)+'</div>';
    html+='<div class="guide-grid">';
    groups[name].forEach(function(g){html+=guideGridCell(g);});
    html+='</div>';
  });
  // Ungrouped
  if(ungrouped.length){
    if(groupNames.length)html+='<div class="guide-group-header">Other</div>';
    html+='<div class="guide-grid">';
    ungrouped.forEach(function(g){html+=guideGridCell(g);});
    html+='</div>';
  }
  // Add button (always at the end in its own grid)
  html+='<div class="guide-grid" style="margin-top:'+(guideList.length?'4':'0')+'px">';
  html+='<div class="guide-cell guide-cell-add" onclick="guideShowCreate()">'+
    '<div class="guide-cell-icon">+</div>'+
    '<div class="guide-cell-title" style="color:var(--tx3)">Add guide</div>'+
  '</div>';
  html+='</div>';

  return '<div class="screen"><div class="topbar">'+
    '<button class="back-btn" onclick="closeGuides()">‹</button>'+
    homeBtnHTML()+
    '<div class="topbar-title">Guides</div>'+
  '</div><div class="scroll">'+html+'</div></div>';
}

function guideGridCell(g){
  var pinBadge=g.pinned?'<div class="guide-cell-pin">✓</div>':'';
  return '<div class="guide-cell" onclick="guideOpen(\''+g.id+'\')">'+
    pinBadge+
    '<div class="guide-cell-icon">'+guideIconHTML(g.icon,48)+'</div>'+
    '<div class="guide-cell-title">'+esc(g.title)+'</div>'+
    '<div class="guide-cell-actions">'+
      '<button class="guide-cell-act-edit" onclick="event.stopPropagation();guideShowEdit(\''+g.id+'\')">✎ Edit</button>'+
      '<button class="guide-cell-act-pin'+(g.pinned?' pinned':'')+'" onclick="event.stopPropagation();guideSetPinned(\''+g.id+'\');pane(\'home\').innerHTML=renderGuideScreen()">'+(g.pinned?'✓ Pinned':'📌 Pin')+'</button>'+
    '</div>'+
  '</div>';
}

// State for the icon picker — stored temporarily during modal
var _guideSelectedIcon=null;
var _guideSelectedGroup=null; // Tracks game group selection across modal re-renders

function guideSelectIcon(type,value){
  _guideSelectedIcon={type:type,value:value};
  guideRefreshModal();
}
function guideRefreshModal(){
  // Re-render the modal keeping form values
  var titleEl=document.getElementById('guide-title-input');
  var urlEl=document.getElementById('guide-url-input');
  var groupEl=document.getElementById('guide-group-input');
  // Read game group from DOM input first, fall back to JS variable
  var groupVal=(groupEl&&groupEl.value.trim())?groupEl.value.trim():(_guideSelectedGroup||'');
  // Sync back to the JS variable so it survives the DOM destruction below
  if(groupVal)_guideSelectedGroup=groupVal;
  var temp={
    title:titleEl?titleEl.value:'',
    url:urlEl?urlEl.value:'',
    gameGroup:groupVal,
    icon:_guideSelectedIcon
  };
  if(guideEditing){
    var existing=guideById(guideEditing);
    if(existing){
      existing._tempTitle=temp.title;existing._tempUrl=temp.url;
      existing._tempGroup=temp.gameGroup;existing._tempIcon=temp.icon||existing.icon;
    }
  }
  // Remove old modal, re-render
  var overlay=document.querySelector('.guide-modal-overlay');
  if(overlay)overlay.remove();
  var existing=guideEditing?guideById(guideEditing):null;
  var mockExisting=existing?{
    id:existing.id,
    title:existing._tempTitle||existing.title,
    url:existing._tempUrl||existing.url,
    gameGroup:existing._tempGroup||existing.gameGroup,
    icon:existing._tempIcon||existing.icon
  }:{title:temp.title,url:temp.url,gameGroup:temp.gameGroup,icon:temp.icon};
  var paneEl=pane('home');
  paneEl.insertAdjacentHTML('beforeend',renderGuideModal(guideEditing?mockExisting:
    (temp.title||temp.url?{title:temp.title,url:temp.url,gameGroup:temp.gameGroup,icon:temp.icon}:null)));
}

function guideHandleCustomIcon(input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  var reader=new FileReader();
  reader.onload=function(e){
    _guideSelectedIcon={type:'custom',value:e.target.result};
    guideRefreshModal();
  };
  reader.readAsDataURL(file);
}

// Tap a game chip in the guide modal — sets the group input and toggles
// chip highlight WITHOUT re-rendering the entire modal (which would break
// form state and kill the Save button's onclick).
function guidePickGameChip(el){
  var name=el.getAttribute('data-gn');
  var tmp=document.createElement('span');tmp.innerHTML=name;name=tmp.textContent;
  _guideSelectedGroup=name;
  var inp=document.getElementById('guide-group-input');
  if(inp)inp.value=name;
  var chips=el.parentElement.querySelectorAll('.guide-game-chip');
  for(var i=0;i<chips.length;i++)chips[i].classList.remove('selected');
  el.classList.add('selected');
}

function guideSaveForm(editId){
  var titleEl=document.getElementById('guide-title-input');
  var urlEl=document.getElementById('guide-url-input');
  var groupEl=document.getElementById('guide-group-input');
  var title=(titleEl?titleEl.value:'').trim();
  var url=(urlEl?urlEl.value:'').trim();
  // Prefer the text input (user may have typed a ROM hack name), fall back
  // to the JS variable (set when tapping an official game chip).
  var gameGroup=(groupEl&&groupEl.value.trim())?groupEl.value.trim():(_guideSelectedGroup||'');
  if(!title){uiAlert('Missing Title','Please enter a title for this guide.');return;}
  if(!url){uiAlert('Missing URL','Please enter a URL for this guide.');return;}
  if(!/^https?:\/\//i.test(url))url='https://'+url;
  var icon=_guideSelectedIcon||null;
  if(editId){
    guideUpdate(editId,{title:title,url:url,icon:icon,gameGroup:gameGroup});
  } else {
    guideCreate({title:title,url:url,icon:icon,gameGroup:gameGroup});
  }
  _guideSelectedIcon=null;
  _guideSelectedGroup=null;
  guideView='grid';guideEditing=null;
  pane('home').innerHTML=renderGuideScreen();
}

function guideConfirmDelete(id){
  uiConfirm({

// ── Back navigation (hardware back button + swipe gesture) ─────────
// Called from Java when the user swipes back or presses the back button.
// Returns true if the app handled the back action internally (navigated
// within the UI), or false if the app should exit. This gives the SPA
// a proper back stack without real WebView history entries.
function handleBack(){
  // Move popup open → close it
  var mvPopup=document.querySelector('.mv-popup-bd');
  if(mvPopup){closeMovePopup();return true;}
  // Dex filter open → close it
  var dexFilter=document.querySelector('.dex-filter-bd');
  if(dexFilter){closeDexFilter();return true;}
  // Fav slot picker open → close it
  var favPickEl=document.querySelector('.fav-pick-overlay');
  if(favPickEl){favClosePicker();return true;}
  // Guide modal open → close modal
  if(guideView==='create'||guideView==='edit'){guideCloseModal();return true;}
  // Guide grid open → close guides, go home
  if(guideView==='grid'){closeGuides();return true;}
  // Settings modal open → close it
  if(S.modal){S.modal=null;renderModal();return true;}
  // Confirm dialog open → cancel it
  var confirmEl=document.querySelector('.ui-confirm-bd');
  if(confirmEl){uiConfirmCancel();return true;}
  // Dex: boss detail → close boss
  if(S.tab==='bosses'&&S.bossSelId){closeBoss();return true;}
  // Dex: compare view → close compare
  if(S.tab==='dex'&&S.cmpView){S.cmpView=null;S.dexView='list';pane('dex').innerHTML=renderDexList();return true;}
  // Dex: detail view → back to list
  if(S.tab==='dex'&&S.dexView==='detail'){S.dexView='list';S.dexSelName=null;pane('dex').innerHTML=renderDexList();return true;}
  // Dex: grid view → back to list (or stay — grid is a mode not a depth)
  // Locations: encounters → locations list → regions
  if(S.tab==='locs'&&S.locView==='encs'){locBack('locs');return true;}
  if(S.tab==='locs'&&S.locView==='locs'){locBack('regions');return true;}
  // Progress: sub-views → dashboard → picker → home
  if(S.tab==='progress'){
    if(S.progView==='pokedex'||S.progView==='bosses'||S.progView==='wanted'){progSetView('dashboard');return true;}
    if(S.progView==='dashboard'){S.progView='picker';S.progGame=null;pane('progress').innerHTML=renderProgress();return true;}
  }
  // Any tab other than home → go home
  if(S.tab!=='home'){goTab('home');return true;}
  // Already on home → let Android exit
  return false;
}

function renderNav(){
  // Skip 'home' — there's a dedicated home button in every topbar instead
  // Nav strip excludes:
  //  - 'home' (the launchpad — shown via the Home button instead)
  //  - 'progress' and 'bosses' (now reached only via launchpad tiles)
  document.getElementById('bnav').innerHTML=TABS.filter(function(t){return t.id!=='home'&&t.id!=='progress'&&t.id!=='bosses';}).map(function(t){
    return '<button class="bnb'+(S.tab===t.id?' act':'')+'" onclick="goTab(\''+t.id+'\')">'+
      '<span class="bnb-ic">'+t.ic+'</span>'+t.l+'</button>';
  }).join('');
}
function pane(id){return document.querySelector('[data-tab="'+id+'"]')}
function goTab(id){
  closeQuickNav();
  // Leaving an in-progress compare? Wipe its state AND re-render the dex pane
  // so the stale picker DOM doesn't reappear when the user comes back to Pokédex later.
  if(S.cmpView){
    S.cmpView=null;S.cmpA=null;S.cmpB=null;
    S.cmpADet=null;S.cmpBDet=null;S.cmpASp=null;S.cmpBSp=null;
    S.cmpReturnTo=null;
    S.dexView='list';S.dexSelName=null;
    pane('dex').innerHTML=renderDexList();
  }
  if(S.tab===id){
    if(id==='dex'&&(S.dexView!=='list'||S.cmpView)){S.dexView='list';S.dexSelName=null;S.cmpView=null;pane('dex').innerHTML=renderDexList();setTimeout(bindAllFloatHide,0);}
    else if(id==='locs'&&S.locView!=='regions'){S.locView='regions';pane('locs').innerHTML=renderLocs();}
    else if(id==='items'&&S.itemView!=='list'){S.itemView='list';pane('items').innerHTML=renderItems();setTimeout(bindAllFloatHide,0);}
    else if(id==='moves'&&S.mvView!=='list'){S.mvView='list';pane('moves').innerHTML=renderMoves();setTimeout(bindAllFloatHide,0);}
    else if(id==='tms'&&S.tmView!=='list'){S.tmView='list';pane('tms').innerHTML=renderTMs();}
    return;
  }
  S.tab=id;renderNav();
  document.body.setAttribute('data-active-tab',id);
  document.querySelectorAll('.tab-pane').forEach(function(p){p.className='tab-pane'+(p.dataset.tab===id?' act':'');});
  if(id==='home')pane('home').innerHTML=renderHome();
  if(id==='locs')pane('locs').innerHTML=renderLocs();
  if(id==='items')pane('items').innerHTML=renderItems();
  if(id==='moves'){pane('moves').innerHTML=renderMoves();loadMoves();}
  if(id==='tms'){pane('tms').innerHTML=renderTMs();loadTMs();}
  if(id==='bosses')pane('bosses').innerHTML=renderBosses();
  if(id==='progress')pane('progress').innerHTML=renderProgress();
  setTimeout(bindAllFloatHide,0);
}

// In-app confirm dialog — replaces the native window.confirm() for in-app
// destructive actions. Renders a centered glass card with title, message,
// and two buttons (cancel/confirm). The confirm action is destructive-styled
// (red) by default; pass opts.danger=false for a neutral confirm.
//
// Usage:  uiConfirm({title:'Reset progress?', message:'This cannot be undone.',
//                    confirmLabel:'Reset', onConfirm:function(){…}})
//
// Stored in S so renderModal can pick it up and re-render through the same
// pipeline as the other modals.
function uiConfirm(opts){
  S.confirmDlg={
    title: opts.title||'Confirm',
    message: opts.message||'',
    confirmLabel: opts.confirmLabel||'OK',
    cancelLabel: 'cancelLabel' in opts?opts.cancelLabel:'Cancel',
    danger: opts.danger!==false,
    onConfirm: opts.onConfirm||function(){}
  };
  S.modal='confirm';
  renderModal();
}
// Simple alert — glass card with a message and a single OK button.
// Used instead of window.alert() so we never get the ugly "The page at
// file:// says:" Chrome dialog.
function uiAlert(title,message){
  uiConfirm({
    title:title,
    message:message||'',
    confirmLabel:'OK',
    cancelLabel:null, // hides the cancel button
    danger:false,
    onConfirm:function(){}
  });
}
function uiConfirmOk(){
  // Capture the callback before clearing so destructive logic still runs
  // even if it itself triggers a re-render that wipes S.
  var cb=S.confirmDlg&&S.confirmDlg.onConfirm;
  S.modal=null;S.confirmDlg=null;
  renderModal();
  if(cb)cb();
}
function uiConfirmCancel(){
  S.modal=null;S.confirmDlg=null;
  renderModal();
}

// ── Offline cache UI ──────────────────────────────────────────────────────
// Tracks the in-flight bulk download so the modal can re-render with progress.
var offlineDl={running:false,phase:'',done:0,total:0,bytes:0,errors:0,cancel:false};

function fmtBytes(n){
  if(n<1024)return n+' B';
  if(n<1024*1024)return (n/1024).toFixed(1)+' KB';
  if(n<1024*1024*1024)return (n/1024/1024).toFixed(1)+' MB';
  return (n/1024/1024/1024).toFixed(2)+' GB';
}
function refreshOfflineStatusLine(){
  // Update the small status line under "Offline data" in Settings.
  var el=document.getElementById('offline-status');
  if(!el)return;
  Promise.all([idbCount(IDB_STORE_KV),idbCount(IDB_STORE_BLOBS),idbEstimateSize()])
    .then(function(r){
      var k=r[0],b=r[1],sz=r[2];
      if(!k&&!b)el.textContent='Nothing cached yet. Download to use offline.';
      else el.textContent=k+' API responses, '+b+' images cached · '+fmtBytes(sz);
    })
    .catch(function(){el.textContent='Cache unavailable.';});
}
function openOfflineModal(){S.modal='offline';renderOfflineModal();}
function renderOfflineModal(){
  var mr=document.getElementById('modal-root');
  var dl=offlineDl;
  // Two states: idle (show estimate + Download button) and downloading (show
  // progress + Cancel button). After completion we drop back to idle but the
  // status line will reflect the now-larger cache.
  var bodyHtml;
  if(dl.running){
    var pct=dl.total?Math.round(dl.done/dl.total*100):0;
    bodyHtml=
      '<div class="off-card">'+
        '<div class="off-card-title">Downloading offline data…</div>'+
        '<div class="off-phase">'+esc(dl.phase||'')+'</div>'+
        '<div class="off-bar"><div class="off-bar-fill" style="width:'+pct+'%"></div></div>'+
        '<div class="off-stats">'+
          '<span><strong>'+dl.done+'</strong> / '+dl.total+'</span>'+
          '<span><strong>'+pct+'%</strong></span>'+
          '<span>'+fmtBytes(dl.bytes)+'</span>'+
        '</div>'+
        (dl.errors?'<div class="off-warn">'+dl.errors+' files failed (will retry on next download)</div>':'')+
        '<button class="off-btn off-btn-cancel" onclick="cancelOfflineDownload()">Cancel</button>'+
      '</div>';
  } else {
    // Check if we have a previous download
    var dlState=null;
    try{var raw=localStorage.getItem('pokeguide.offline.state');if(raw)dlState=JSON.parse(raw);}catch(e){}
    var hasDownloaded=!!dlState;

    var downloadCard;
    if(hasDownloaded){
      var dlDate=new Date(dlState.downloadedAt);
      var dateStr=dlDate.toLocaleDateString()+' at '+dlDate.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

      '</div>'+

        '<div class="off-card-title" style="font-size:14px">Check for updates</div>'+

        '<div id="off-update-status"></div>'+

      '</div>';
  }
  mr.innerHTML='<div class="modal-backdrop">'+
    '<div class="modal-head">'+
      '<button class="icon-btn" style="background:rgba(255,255,255,0.1);color:var(--tx);font-size:22px" onclick="backToSettings()" aria-label="Back">‹</button>'+
      '<div class="modal-title">Offline data</div>'+
      '<button class="icon-btn" style="background:rgba(255,255,255,0.1);font-size:18px;color:var(--tx)" onclick="closeModal()">×</button>'+
    '</div>'+
    '<div class="modal-body" style="padding:14px">'+bodyHtml+'</div></div>';
  // Refresh the cache-info line on the idle screen.
  if(!dl.running){
    Promise.all([idbCount(IDB_STORE_KV),idbCount(IDB_STORE_BLOBS),idbEstimateSize()])
      .then(function(r){
        var el=document.getElementById('off-cache-info');
        if(!el)return;
        if(!r[0]&&!r[1])el.textContent='Cache is empty.';
        else el.innerHTML=r[0]+' API responses · '+r[1]+' images · '+fmtBytes(r[2])+' on disk';
